<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6C5CE7">
<title>KidQuest — Where Learning Becomes an Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KIDQUEST — CSS Theme & Layout
   ============================================================ */
:root {
  --bg: #F0EEFF;
  --card: #FFFFFF;
  --ink: #1A1035;
  --ink2: #5B5580;
  --ink3: #9B95B0;
  --line: rgba(26,16,53,.08);
  --primary: #6C5CE7;
  --primary-dark: #5a4bd1;
  --primary2: #A29BFE;
  --sky: #74B9FF;
  --mint: #00CEC9;
  --sun: #FDCB6E;
  --coral: #FF7675;
  --pink: #FD79A8;
  --coin: #FFD700;
  --akshayan: #FF7675;
  --rushan: #00CEC9;
  --akaran: #A29BFE;
  --nishan: #74B9FF;
  --isaiah: #F39C12;
  /* Bumped radii and shadows for a more playful, dimensional feel */
  --r: 22px;
  --r-lg: 32px;
  --shadow: 0 6px 24px rgba(26,16,53,.08), 0 2px 4px rgba(26,16,53,.04);
  --shadow-lg: 0 20px 50px rgba(108,92,231,.18), 0 8px 20px rgba(26,16,53,.1);
  --shadow-xl: 0 30px 70px rgba(108,92,231,.25);
  --pop-press: inset 0 -4px 0 rgba(0,0,0,.14);
  --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-display: 'DM Sans', system-ui, -apple-system, sans-serif;
  --spring: cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;scroll-behavior:smooth}
body{font-family:var(--font);color:var(--ink);background:var(--bg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:3px solid var(--primary);outline-offset:3px}
h1,h2,h3,h4,p{margin:0}
h1,h2,h3{font-family:var(--font-display);letter-spacing:-.01em;font-weight:700}
img{max-width:100%}

/* Background */
.bg-mesh{position:fixed;inset:0;z-index:-1;background:
  radial-gradient(ellipse 80% 60% at 10% 10%, rgba(108,92,231,.18), transparent 55%),
  radial-gradient(ellipse 70% 50% at 90% 5%, rgba(253,203,110,.2), transparent 55%),
  radial-gradient(ellipse 75% 55% at 85% 90%, rgba(0,206,201,.15), transparent 55%),
  radial-gradient(ellipse 80% 60% at 5% 85%, rgba(116,185,255,.18), transparent 55%),
  var(--bg);animation:bgDrift 20s ease-in-out infinite alternate}
@keyframes bgDrift{to{filter:hue-rotate(12deg)}}

/* Floating decorative shapes */
/* Blobs sit BEHIND all content (z:-1). The white cards cover what's directly under them,
   so blobs only peek through in the gutters/edges — visible but never obscuring text. */
.bg-shapes{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
.bg-shapes .blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;animation:floatBlob 18s ease-in-out infinite}
.bg-shapes .b1{width:160px;height:160px;background:radial-gradient(circle at 30% 30%,#A29BFE,#6C5CE7);top:6%;left:2%;animation-delay:0s}
.bg-shapes .b2{width:120px;height:120px;background:radial-gradient(circle at 30% 30%,#FFD89B,#FDCB6E);top:14%;right:3%;animation-delay:-4s;animation-duration:22s}
.bg-shapes .b3{width:180px;height:180px;background:radial-gradient(circle at 30% 30%,#81ECEC,#00CEC9);bottom:8%;left:2%;animation-delay:-8s;animation-duration:24s;border-radius:45% 55% 60% 40% / 50% 45% 55% 50%}
.bg-shapes .b4{width:110px;height:110px;background:radial-gradient(circle at 30% 30%,#FFD0D8,#FF7675);bottom:22%;right:3%;animation-delay:-12s;animation-duration:20s}
.bg-shapes .b5{width:85px;height:85px;background:radial-gradient(circle at 30% 30%,#A5DFFF,#74B9FF);top:48%;right:1%;animation-delay:-6s;animation-duration:17s}
@keyframes floatBlob{
  0%,100%{transform:translate(0,0) rotate(0)}
  25%{transform:translate(20px,-30px) rotate(8deg)}
  50%{transform:translate(-15px,-40px) rotate(-6deg)}
  75%{transform:translate(25px,-15px) rotate(10deg)}
}
/* 4-point "twinkle" sparkles — pure CSS, no emojis. Each one is a small
   div with a 4-armed star drawn via pseudo-elements (two rotated rectangles).
   Sparkles twinkle in, grow, rotate, and fade out on a loop. */
.bg-shapes .sparkle{position:absolute;width:18px;height:18px;opacity:0;animation:twinkle 3s ease-in-out infinite;pointer-events:none}
.bg-shapes .sparkle::before,
.bg-shapes .sparkle::after{content:'';position:absolute;inset:0;background:currentColor;border-radius:2px}
.bg-shapes .sparkle::before{clip-path:polygon(50% 0%, 58% 42%, 100% 50%, 58% 58%, 50% 100%, 42% 58%, 0% 50%, 42% 42%)}
.bg-shapes .sparkle::after{clip-path:polygon(50% 0%, 58% 42%, 100% 50%, 58% 58%, 50% 100%, 42% 58%, 0% 50%, 42% 42%);transform:rotate(45deg);opacity:.7}
.bg-shapes .sparkle.sm{width:12px;height:12px}
.bg-shapes .sparkle.lg{width:26px;height:26px}
.bg-shapes .s1 {top:10%;left:42%;color:#FDCB6E;animation-delay:0s}
.bg-shapes .s2 {top:68%;left:23%;color:#6C5CE7;animation-delay:-1s}
.bg-shapes .s3 {top:28%;right:28%;color:#00CEC9;animation-delay:-2s}
.bg-shapes .s4 {bottom:18%;left:55%;color:#FF7675;animation-delay:-1.5s}
.bg-shapes .s5 {top:8%; left:12%;color:#FD79A8;animation-delay:-.7s}
.bg-shapes .s6 {top:40%;left:6%; color:#00B894;animation-delay:-2.4s}
.bg-shapes .s7 {top:58%;right:8%; color:#A29BFE;animation-delay:-.4s}
.bg-shapes .s8 {bottom:8%;right:22%;color:#FFD700;animation-delay:-1.9s}
.bg-shapes .s9 {top:22%;right:6%; color:#74B9FF;animation-delay:-2.7s}
.bg-shapes .s10{bottom:32%;left:35%;color:#FDCB6E;animation-delay:-1.1s}
.bg-shapes .s11{top:50%;right:42%;color:#FF7675;animation-delay:-.6s}
.bg-shapes .s12{bottom:45%;left:72%;color:#00CEC9;animation-delay:-2.1s}
@keyframes twinkle{
  0%,100%{opacity:0; transform:scale(.4) rotate(0)}
  50%    {opacity:1; transform:scale(1.15) rotate(180deg)}
}

/* App shell */
.app{max-width:960px;margin:0 auto;padding:16px 18px 120px}

/* ---- TOPBAR ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;background:rgba(255,255,255,.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r-lg);box-shadow:var(--shadow);position:sticky;top:10px;z-index:40;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:22px;letter-spacing:-.01em;font-family:var(--font-display)}
.brand .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--pink) 60%,var(--sun));display:grid;place-items:center;color:#fff;box-shadow:0 8px 18px rgba(108,92,231,.4),inset 0 -3px 0 rgba(0,0,0,.12);border:2px solid #fff;transition:transform .3s var(--spring)}
.brand .logo svg{filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))}
.brand:hover .logo{transform:rotate(-6deg) scale(1.08)}
.brand-text{background:linear-gradient(135deg,var(--primary),#4834d4);-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar nav{display:flex;gap:6px;flex-wrap:wrap}
.nav-btn{padding:9px 16px;border-radius:999px;font-size:14px;font-weight:700;color:var(--ink2);transition:all .25s var(--spring)}
.nav-btn:hover{background:rgba(108,92,231,.1);color:var(--ink);transform:translateY(-1px)}
.nav-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 6px 16px rgba(108,92,231,.4),inset 0 -2px 0 rgba(0,0,0,.12)}
.pills{display:flex;gap:8px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-weight:700;font-size:14px;border:2px solid rgba(255,255,255,.8);transition:transform .2s var(--spring)}
.pill:hover{transform:translateY(-1px) scale(1.03)}
.pill-star{background:linear-gradient(135deg,#fff5cc,#ffe08a);color:#a06a00;box-shadow:0 4px 10px rgba(255,215,0,.25),inset 0 -2px 0 rgba(160,106,0,.15)}
.pill-coin{background:linear-gradient(135deg,#fff4cf,#ffd966);color:#8b5a00;box-shadow:0 4px 10px rgba(255,215,0,.25),inset 0 -2px 0 rgba(139,90,0,.18)}

/* ---- SCREEN TRANSITIONS ---- */
#screen{animation:screenIn .5s var(--spring)}
@keyframes screenIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.85)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,0)}50%{box-shadow:0 0 0 12px rgba(108,92,231,.12)}}
@keyframes bounce{0%,20%,60%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}80%{transform:translateY(-4px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}

/* ---- HERO (homepage) — kid-friendly, modern, big and bold ---- */
.hero{margin-top:32px;padding:clamp(36px,7vw,72px) clamp(24px,4vw,48px);
  background:
    radial-gradient(circle at 20% 0%,rgba(162,155,254,.25),transparent 55%),
    radial-gradient(circle at 95% 100%,rgba(253,121,168,.18),transparent 55%),
    linear-gradient(180deg,#fff 0%,#faf8ff 100%);
  border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r-lg);
  box-shadow:var(--shadow-xl);position:relative;overflow:hidden;text-align:center}
/* Hero corner sparkles — 4-point stars drawn in CSS, no emojis.
   Two rotating/twinkling accents that frame the title. */
.hero::before,.hero::after{content:'';position:absolute;width:28px;height:28px;background:currentColor;pointer-events:none;opacity:0;animation:heroStar 3.4s ease-in-out infinite;clip-path:polygon(50% 0%, 58% 42%, 100% 50%, 58% 58%, 50% 100%, 42% 58%, 0% 50%, 42% 42%)}
.hero::before{top:12%;left:8%;color:#FDCB6E;animation-delay:0s}
.hero::after{top:18%;right:10%;width:22px;height:22px;color:#FD79A8;animation-delay:1.2s}
@keyframes heroStar{0%,100%{opacity:0;transform:scale(.5) rotate(0)}50%{opacity:1;transform:scale(1.15) rotate(180deg)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{rotate:360deg}}
.hero h1{font-family:var(--font-display);font-size:clamp(44px,9vw,76px);font-weight:700;letter-spacing:-.02em;line-height:.95;background:linear-gradient(135deg,var(--primary) 0%,var(--pink) 45%,var(--sun) 75%,var(--mint) 100%);background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradShift 6s ease infinite,popIn .7s var(--spring);text-shadow:0 2px 0 rgba(255,255,255,.5)}
@keyframes gradShift{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.hero .sub{margin-top:16px;font-size:clamp(16px,2vw,21px);color:var(--ink2);font-weight:600;animation:fadeIn .6s ease .15s backwards}
.hero .cta{margin-top:32px;display:inline-flex;align-items:center;gap:10px;padding:18px 36px;border-radius:999px;
  background:linear-gradient(180deg,var(--primary) 0%,var(--primary-dark) 100%);
  color:#fff;font-weight:700;font-size:18px;font-family:var(--font-display);letter-spacing:.01em;
  box-shadow:0 12px 28px rgba(108,92,231,.45),inset 0 -5px 0 rgba(0,0,0,.18),0 0 0 4px rgba(255,255,255,.7);
  border:2px solid rgba(255,255,255,.8);
  transition:all .3s var(--spring);animation:fadeIn .6s ease .3s backwards, wobble 3s ease-in-out 2s infinite;position:relative;overflow:hidden}
@keyframes wobble{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-4px) rotate(-1deg)}75%{transform:translateY(-2px) rotate(1deg)}}
.hero .cta::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transform:translateX(-100%);animation:shimmer 3s ease-in-out 2s infinite}
.hero .cta:hover{transform:translateY(-4px) scale(1.04);box-shadow:0 18px 40px rgba(108,92,231,.55),inset 0 -5px 0 rgba(0,0,0,.18),0 0 0 4px rgba(255,255,255,.8);animation-play-state:paused}
.hero .cta:active{transform:translateY(2px) scale(.98);box-shadow:0 4px 10px rgba(108,92,231,.4),inset 0 -1px 0 rgba(0,0,0,.12),0 0 0 4px rgba(255,255,255,.7)}

/* Feature cards — tile shingles with color pops */
.features{margin-top:32px;display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.feat{background:var(--card);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);transition:all .35s var(--spring);text-align:left;position:relative;overflow:hidden}
.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0;opacity:.65}
.feat:nth-child(1)::before{background:linear-gradient(90deg,var(--primary),var(--primary2))}
.feat:nth-child(2)::before{background:linear-gradient(90deg,var(--sky),#0984e3)}
.feat:nth-child(3)::before{background:linear-gradient(90deg,var(--sun),var(--coral))}
.feat:nth-child(4)::before{background:linear-gradient(90deg,var(--mint),#55efc4)}
.feat::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(108,92,231,.08),transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
.feat:hover{transform:translateY(-8px) rotate(-.5deg);box-shadow:var(--shadow-lg)}
.feat:hover::after{opacity:1}
.feat:hover .ico{transform:scale(1.18) rotate(-8deg)}
.feat .ico{font-size:32px;margin-bottom:12px;transition:all .4s var(--spring);display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:18px;line-height:1;border:2px solid #fff;box-shadow:0 6px 14px rgba(26,16,53,.08)}
.feat:nth-child(1) .ico{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff}
.feat:nth-child(2) .ico{background:linear-gradient(135deg,#74b9ff,#0984e3);color:#fff}
.feat:nth-child(3) .ico{background:linear-gradient(135deg,#fdcb6e,#e17055);color:#fff}
.feat:nth-child(4) .ico{background:linear-gradient(135deg,#55efc4,#00b894);color:#fff}
.feat h3{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.feat p{font-size:13.5px;color:var(--ink2);margin-top:6px;line-height:1.5}

/* Stagger animation */
.stagger>*{animation:cardUp .5s var(--spring) backwards}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}
.stagger>*:nth-child(6){animation-delay:.3s}
.stagger>*:nth-child(7){animation-delay:.35s}
.stagger>*:nth-child(8){animation-delay:.4s}
@keyframes cardUp{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:none}}

/* ---- PROFILE CARDS — kid-friendly doorways ---- */
.profiles{margin-top:28px;display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.profile-card{background:var(--card);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r-lg);padding:30px 22px;text-align:center;box-shadow:var(--shadow);transition:all .35s var(--spring);position:relative;overflow:hidden;width:100%}
.profile-card::after{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.6),transparent 70%);transform:translateX(-120%);transition:transform .7s;pointer-events:none}
.profile-card:hover{transform:translateY(-12px) rotate(-.8deg) scale(1.02);box-shadow:var(--shadow-lg)}
.profile-card:hover::after{transform:translateX(120%)}
.profile-card:hover .avatar{transform:scale(1.1) rotate(-6deg)}
.profile-card:active{transform:translateY(-4px) scale(.99)}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:8px;border-radius:calc(var(--r-lg) - 2px) calc(var(--r-lg) - 2px) 0 0}
/* Per-student .profile-card::before and .c-<id> .avatar backgrounds are
   AUTO-GENERATED at runtime from the STUDENTS array (see injectStudentStyles
   in the JS). Add a student = add one object, no CSS edit needed. */
.profile-card .avatar-wrap{position:relative;display:inline-block;margin:0 auto 16px}
.profile-card .avatar{width:88px;height:88px;border-radius:26px;display:grid;place-items:center;font-size:42px;color:#fff;font-weight:700;font-family:var(--font-display);border:3px solid #fff;box-shadow:0 10px 24px rgba(26,16,53,.18),inset 0 -4px 0 rgba(0,0,0,.18);transition:transform .4s var(--spring);position:relative;z-index:1}
.profile-card .avatar-chip{position:absolute;bottom:-4px;right:-6px;width:36px;height:36px;border-radius:50%;background:#fff;display:grid;place-items:center;font-size:19px;box-shadow:0 4px 12px rgba(26,16,53,.2);border:3px solid #fff;z-index:2;transition:transform .4s var(--spring)}
.profile-card:hover .avatar-chip{transform:rotate(-15deg) scale(1.2)}
.profile-card h3{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-.01em}
.profile-card .grade{margin-top:4px;display:inline-block;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(108,92,231,.08);color:var(--primary)}
.profile-card .stats{margin-top:14px;display:flex;gap:10px;justify-content:center;font-size:13px;color:var(--ink2);font-weight:700}
.teacher-link{margin-top:28px;text-align:center}
.teacher-link a{color:var(--primary);font-weight:700;font-size:15px;text-decoration:none;padding:12px 22px;border-radius:999px;border:2px solid var(--primary);display:inline-block;transition:all .3s var(--spring);background:rgba(108,92,231,.04)}
.teacher-link a:hover{background:var(--primary);color:#fff;transform:translateY(-2px);box-shadow:0 8px 20px rgba(108,92,231,.35)}

/* ---- PIN SCREEN ---- */
.pin-screen{margin-top:28px;text-align:center}
.pin-screen .who{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.pin-screen .who .av{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;font-size:32px;color:#fff;font-weight:800;border:3px solid #fff;box-shadow:var(--shadow)}
.pin-screen h2{font-size:24px;font-weight:800}
.pin-hint{margin:8px 0 18px;font-size:15px;color:var(--ink2);font-weight:600}
.pin-hint code{background:rgba(108,92,231,.1);padding:4px 10px;border-radius:8px;font-family:var(--font);font-size:14px;color:var(--primary)}
.emoji-pad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;margin:0 auto}
.emoji-btn{font-size:36px;padding:16px;background:var(--card);border:2px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);transition:all .25s var(--spring);line-height:1;animation:popIn .4s var(--spring) backwards}
.emoji-btn:nth-child(1){animation-delay:.05s}.emoji-btn:nth-child(2){animation-delay:.1s}.emoji-btn:nth-child(3){animation-delay:.15s}.emoji-btn:nth-child(4){animation-delay:.2s}
.emoji-btn:nth-child(5){animation-delay:.25s}.emoji-btn:nth-child(6){animation-delay:.3s}.emoji-btn:nth-child(7){animation-delay:.35s}.emoji-btn:nth-child(8){animation-delay:.4s}
.emoji-btn:nth-child(9){animation-delay:.45s}.emoji-btn:nth-child(10){animation-delay:.5s}.emoji-btn:nth-child(11){animation-delay:.55s}.emoji-btn:nth-child(12){animation-delay:.6s}
.emoji-btn:hover{transform:scale(1.12) translateY(-3px);border-color:var(--primary);box-shadow:0 10px 24px rgba(108,92,231,.3)}
.emoji-btn:active{transform:scale(.92)}
.emoji-btn.wrong{animation:shake .5s;border-color:var(--coral);background:#fff0f0}
.emoji-btn.correct{animation:correctBounce .6s var(--spring);border-color:var(--mint);background:#e6fffa;box-shadow:0 0 0 4px rgba(0,206,201,.25)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-6px)}}
@keyframes correctBounce{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(6deg)}60%{transform:scale(.95) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}
.pin-msg{margin-top:16px;font-size:16px;font-weight:700;min-height:28px}
.pin-msg.ok{color:#00b894}
.pin-msg.no{color:var(--coral)}
.pin-back{margin-top:18px;color:var(--ink3);font-weight:700;font-size:14px;text-decoration:underline}

/* ---- TEACHER LOGIN ---- */
.teacher-form{margin-top:28px;max-width:380px;margin-left:auto;margin-right:auto;text-align:center}
.teacher-form h2{font-size:24px;font-weight:800;margin-bottom:20px}
.t-field{display:block;width:100%;padding:14px 18px;border:2px solid var(--line);border-radius:var(--r);font-family:var(--font);font-size:16px;font-weight:600;margin-bottom:12px;transition:border-color .2s}
.t-field:focus{outline:none;border-color:var(--primary)}
.t-submit{width:100%;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:16px;font-weight:800;box-shadow:0 6px 18px rgba(108,92,231,.35);transition:all .2s}
.t-submit:hover{transform:translateY(-2px)}
.t-msg{margin-top:12px;font-size:14px;font-weight:700;color:var(--coral);min-height:22px}
.t-reset{margin-top:18px;padding:10px 18px;border-radius:var(--r);background:transparent;color:var(--coral);font-size:13px;font-weight:700;border:1.5px dashed var(--coral);transition:all .2s;display:inline-block}
.t-reset:hover{background:rgba(255,118,117,.08);transform:translateY(-1px)}

/* ---- STUDENT DASHBOARD ---- */
/* ---- DASHBOARD ---- */
.dash-hero{margin-top:24px;padding:30px;
  background:
    radial-gradient(circle at 95% 10%,rgba(253,121,168,.15),transparent 60%),
    radial-gradient(circle at 5% 100%,rgba(162,155,254,.15),transparent 55%),
    linear-gradient(180deg,#fff,#faf8ff);
  border:1.5px solid rgba(255,255,255,.9);
  border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:22px;flex-wrap:wrap;position:relative;overflow:hidden}
/* Nova (inline SVG mascot) replaces the old '👋' emoji on the dashboard hero.
   We keep @keyframes wave in case other screens still reference it. */
@keyframes wave{0%,100%{transform:translateY(-50%) rotate(0)}25%{transform:translateY(-50%) rotate(15deg)}75%{transform:translateY(-50%) rotate(-15deg)}}
.dash-hero .mascot-wrap{margin-left:auto;align-self:center}
@media(max-width:640px){.dash-hero .mascot-wrap{margin-left:0;width:100%;justify-content:flex-start}.dash-hero .mascot-wrap .speech-bubble{max-width:none}}

/* ==========================================================================
   AVATAR PICKER — grid of emoji choices kids can pick for their tile
   ========================================================================== */
.av-emoji{font-family:'Apple Color Emoji','Segoe UI Emoji',system-ui,sans-serif!important;font-weight:normal!important}
.dash-hero .av.av-emoji{font-size:56px}
.avatar.av-emoji{font-size:38px}
.avatar-preview{display:flex;align-items:center;gap:18px;margin:24px 0 8px;padding:20px 22px;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,.9)}
.avatar-preview .av{width:88px;height:88px;border-radius:24px;display:grid;place-items:center;font-size:48px;color:#fff;font-weight:700;font-family:var(--font-display);border:3px solid #fff;box-shadow:0 10px 22px rgba(26,16,53,.18);flex-shrink:0}
.avatar-preview .av.av-emoji{font-size:48px}
.avatar-preview-info{flex:1;min-width:0}
.avatar-preview .ap-name{font-size:22px;font-weight:800;color:var(--ink)}
.avatar-preview .ap-hint{font-size:14px;color:var(--ink2);margin-top:4px}
.avatar-grid{margin-top:18px;display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(68px,1fr))}
.avatar-choice{background:#fff;border:2px solid var(--line);border-radius:18px;padding:10px;cursor:pointer;display:grid;place-items:center;min-height:68px;font-size:36px;line-height:1;transition:all .25s var(--spring);font-family:inherit;color:var(--ink);position:relative;box-shadow:var(--shadow)}
.avatar-choice:hover{transform:translateY(-3px) scale(1.05);border-color:var(--primary);box-shadow:0 10px 22px rgba(108,92,231,.2)}
.avatar-choice:active{transform:translateY(0) scale(.97)}
.avatar-choice.active{border-color:var(--primary);background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(253,121,168,.08));box-shadow:0 0 0 3px rgba(108,92,231,.3),0 10px 22px rgba(108,92,231,.25)}
.avatar-choice.active::after{content:'✓';position:absolute;top:4px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:900;display:grid;place-items:center}
.avatar-choice.reset{background:linear-gradient(135deg,#fafaff,#eeeaff)}
.avatar-choice .ac-letter{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--primary)}
.avatar-choice .ac-emoji{font-family:'Apple Color Emoji','Segoe UI Emoji',system-ui,sans-serif;font-size:36px}

/* "Change avatar" button on the dashboard hero */
.dash-hero .change-avatar-btn{margin-top:6px;background:rgba(108,92,231,.12);color:var(--primary);border:1.5px solid rgba(108,92,231,.2);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s ease;font-family:inherit}
.dash-hero .change-avatar-btn:hover{background:rgba(108,92,231,.22);transform:translateY(-1px)}
.dash-hero .av{width:100px;height:100px;border-radius:28px;display:grid;place-items:center;font-size:52px;color:#fff;font-weight:700;font-family:var(--font-display);border:3px solid #fff;box-shadow:0 12px 26px rgba(26,16,53,.2),inset 0 -4px 0 rgba(0,0,0,.18);flex-shrink:0;transition:transform .4s var(--spring)}
.dash-hero:hover .av{transform:rotate(-4deg) scale(1.04)}
.dash-hero .info{flex:1;min-width:200px}
.dash-hero h1{font-family:var(--font-display);font-size:clamp(26px,4vw,36px);font-weight:700;letter-spacing:-.01em}
.dash-hero .grade-pill{display:inline-block;margin-top:6px;padding:5px 14px;border-radius:999px;font-size:13px;font-weight:700;background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(253,121,168,.12));color:var(--primary);border:1.5px solid rgba(108,92,231,.15)}
.dash-stats{margin-top:20px;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.d-stat{background:var(--card);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--shadow);transition:all .35s var(--spring);position:relative;overflow:hidden}
.d-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.d-stat:nth-child(1)::before{background:linear-gradient(90deg,#fdcb6e,#ffd700)}
.d-stat:nth-child(2)::before{background:linear-gradient(90deg,#ffd966,#f5a623)}
.d-stat:nth-child(3)::before{background:linear-gradient(90deg,#ff9f9f,#ff7675)}
.d-stat:nth-child(4)::before{background:linear-gradient(90deg,#a29bfe,#6c5ce7)}
.d-stat:hover{transform:translateY(-6px) rotate(-.8deg);box-shadow:var(--shadow-lg)}
.d-stat .num{font-family:var(--font-display);font-size:32px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;z-index:1;letter-spacing:-.01em}
.d-stat .stat-emoji{font-size:28px;display:inline-block;transition:transform .35s var(--spring);filter:drop-shadow(0 2px 4px rgba(0,0,0,.1))}
.d-stat:hover .stat-emoji{transform:scale(1.25) rotate(-10deg)}
.d-stat .lbl{font-size:12px;color:var(--ink2);font-weight:700;margin-top:4px;position:relative;z-index:1;text-transform:uppercase;letter-spacing:.5px}

/* Subject cards */
.subjects{margin-top:24px;display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
.subj-card{background:var(--card);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);transition:all .35s var(--spring);display:flex;align-items:center;gap:14px;width:100%;position:relative;overflow:hidden}
.subj-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:5px;transform:scaleY(0);transform-origin:top;transition:transform .3s;border-radius:5px 0 0 5px}
.subj-card:hover{transform:translateY(-7px) rotate(-.4deg);box-shadow:var(--shadow-lg)}
.subj-card:hover::before{transform:scaleY(1)}
.subj-card:hover .s-ico{transform:scale(1.15) rotate(-8deg)}
.subj-card .s-ico{transition:transform .4s var(--spring);width:60px;height:60px;border-radius:18px;display:grid;place-items:center;font-size:32px;flex-shrink:0;line-height:1;border:2px solid #fff;box-shadow:0 8px 18px rgba(26,16,53,.12),inset 0 -3px 0 rgba(0,0,0,.15)}
.subj-card .s-ico.reading{background:linear-gradient(135deg,#91c4f5,#0984e3);color:#fff}
.subj-card .s-ico.writing{background:linear-gradient(135deg,#b6adff,#6c5ce7);color:#fff}
.subj-card .s-ico.math{background:linear-gradient(135deg,#ffd68a,#e17055);color:#fff}
.subj-card .s-ico.logic{background:linear-gradient(135deg,#81ecec,#00b894);color:#fff}
.subj-card .s-ico.french{background:linear-gradient(135deg,#ffb8d1,#e84393);color:#fff}
.subj-card .s-ico.science{background:linear-gradient(135deg,#5eead4,#16a085);color:#fff}
.subj-card .s-ico.social{background:linear-gradient(135deg,#ff9f9f,#c0392b);color:#fff}
.subj-card.reading::before{background:linear-gradient(180deg,#74b9ff,#0984e3)}
.subj-card.writing::before{background:linear-gradient(180deg,#a29bfe,#6c5ce7)}
.subj-card.math::before{background:linear-gradient(180deg,#fdcb6e,#e17055)}
.subj-card.logic::before{background:linear-gradient(180deg,#55efc4,#00b894)}
.subj-card.french::before{background:linear-gradient(180deg,#fd79a8,#e84393)}
.subj-card.science::before{background:linear-gradient(180deg,#5eead4,#16a085)}
.subj-card.social::before{background:linear-gradient(180deg,#ff9f9f,#c0392b)}
.subj-card .s-info{flex:1;min-width:0}
.subj-card .s-name{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em}
.subj-card .s-prog{font-size:13px;color:var(--ink3);font-weight:600;margin-top:3px}
.subj-card .s-bar{margin-top:9px;height:9px;border-radius:99px;background:rgba(0,0,0,.06);overflow:hidden}
.subj-card .s-bar i{display:block;height:100%;border-radius:99px;transition:width .8s var(--spring);position:relative;overflow:hidden}
.subj-card .s-bar i::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-100%);animation:shimmer 2s ease-in-out infinite}
.s-bar i.reading{background:linear-gradient(90deg,#74b9ff,#0984e3)}
.s-bar i.writing{background:linear-gradient(90deg,#a29bfe,#6c5ce7)}
.s-bar i.math{background:linear-gradient(90deg,#ffeaa7,#e17055)}
.s-bar i.logic{background:linear-gradient(90deg,#55efc4,#00b894)}
.s-bar i.french{background:linear-gradient(90deg,#fd79a8,#e84393)}
.s-bar i.science{background:linear-gradient(90deg,#5eead4,#16a085)}
.s-bar i.social{background:linear-gradient(90deg,#ff9f9f,#c0392b)}

/* ---- WEEK VIEW (level cards) ---- */
.week-head{margin-top:24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.week-head h2{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px}
.week-head .back-btn{padding:8px 16px;border-radius:999px;background:rgba(0,0,0,.05);font-weight:700;font-size:14px;color:var(--ink2);transition:all .2s}
.week-head .back-btn:hover{background:rgba(0,0,0,.1)}
.levels{margin-top:16px;display:flex;flex-direction:column;gap:12px}
.level-card{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);transition:all .35s var(--spring);width:100%}
.level-card:hover:not(.locked){transform:translateX(8px) scale(1.01);box-shadow:var(--shadow-lg)}
.level-card:hover:not(.locked) .l-emoji{transform:scale(1.15) rotate(-5deg)}
.level-card .l-emoji{transition:transform .3s var(--spring)}
.level-card.current .l-num{animation:pulse 2s ease-in-out infinite}
.level-card.locked{opacity:.55;cursor:not-allowed}
.level-card.done{border-left:4px solid #00b894}
.level-card.current{border-left:4px solid var(--primary);background:linear-gradient(90deg,rgba(108,92,231,.04),transparent)}
.level-card .l-num{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.level-card .l-num.done{background:#00b894}
.level-card .l-num.current{background:var(--primary)}
.level-card .l-num.locked{background:#ccc;color:#999}
.level-card .l-info{flex:1;min-width:0}
.level-card .l-title{font-size:16px;font-weight:700}
.level-card .l-status{font-size:12px;color:var(--ink3);font-weight:600;margin-top:2px}
.level-card .l-emoji{font-size:28px;flex-shrink:0}

/* ---- QUIZ ---- */
.quiz{background:var(--card);border-radius:var(--r-lg);padding:clamp(20px,3vw,32px);box-shadow:var(--shadow);margin-top:16px;border:1px solid var(--line)}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.quiz-head .qt{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.quiz-head .qc{background:rgba(0,0,0,.05);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;color:var(--ink2)}
.q-progress{margin:14px 0 20px;height:10px;border-radius:99px;background:rgba(0,0,0,.06);overflow:hidden}
.q-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--mint),var(--sun));background-size:200%;border-radius:99px;transition:width .5s var(--spring);animation:shimmer 3s linear infinite}
@keyframes shimmer{from{background-position:0}to{background-position:200%}}
.q-card{background:linear-gradient(180deg,#faf9ff,#fff);border:1px solid var(--line);border-radius:var(--r);padding:clamp(20px,3vw,32px);text-align:center}
.q-text{font-size:clamp(18px,2.5vw,24px);font-weight:700;line-height:1.3;max-width:640px;margin:0 auto}
.q-visual{margin:16px 0 8px;font-size:clamp(48px,8vw,72px);letter-spacing:4px;line-height:1}
.q-passage{margin:16px auto;max-width:640px;background:#fff;padding:22px 26px;border-radius:var(--r);font-size:clamp(18px,2.4vw,22px);color:var(--ink);line-height:1.55;text-align:left;border-left:4px solid var(--sky);box-shadow:var(--shadow);font-weight:500}
.choices{margin-top:18px;display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));max-width:640px;margin-left:auto;margin-right:auto}
.choice{background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:16px;font-size:16px;font-weight:700;transition:all .25s var(--spring);word-break:break-word;min-height:56px}
.choice:hover:not(.locked){transform:translateY(-2px);border-color:var(--primary);box-shadow:0 6px 16px rgba(108,92,231,.2)}
.choice.correct{border-color:#00b894;background:#e6fff5;color:#00855a;animation:pop .4s var(--spring)}
.choice.wrong{border-color:var(--coral);background:#fff0f0;color:#c0392b;animation:shake .4s}
.choice.locked{cursor:not-allowed;opacity:.7}
@keyframes pop{50%{transform:scale(1.06)}}
.choices-big{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
.choice-big{font-size:clamp(36px,6vw,48px);min-height:90px;display:flex;align-items:center;justify-content:center;padding:18px}

/* Match game */
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:14px;font-size:16px;font-weight:700;text-align:center;transition:all .2s var(--spring);box-shadow:var(--shadow)}
.match-item:hover:not(.done){border-color:var(--primary);transform:translateY(-2px)}
.match-item.selected{border-color:var(--sun);background:#fff8e1}
.match-item.done{background:#e6fff5;border-color:#00b894;opacity:.7;cursor:default}

/* Order game */
.order-pool,.order-slots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.order-slots{min-height:60px;padding:10px;background:rgba(0,0,0,.03);border-radius:var(--r);border:2px dashed rgba(0,0,0,.1)}
.order-chip{background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 14px;font-weight:700;font-size:15px;box-shadow:var(--shadow);transition:all .2s var(--spring)}
.order-chip:hover{transform:translateY(-2px);border-color:var(--primary)}
.order-chip.placed{background:#fff8e1;border-color:var(--sun)}

/* Feedback */
.feedback{margin-top:14px;min-height:28px;text-align:center;font-weight:700;font-size:16px}
.feedback.ok{color:#00b894}
.feedback.no{color:var(--coral)}
.controls{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:999px;font-weight:700;font-size:15px;transition:all .25s var(--spring);position:relative;overflow:hidden;border:2px solid transparent}
.btn:active{transform:translateY(2px) scale(.97);box-shadow:0 2px 6px rgba(108,92,231,.3),inset 0 -1px 0 rgba(0,0,0,.1)!important}
.btn-primary{background:linear-gradient(180deg,var(--primary) 0%,var(--primary-dark) 100%);color:#fff;border-color:#fff;box-shadow:0 8px 22px rgba(108,92,231,.4),inset 0 -4px 0 rgba(0,0,0,.2)}
.btn-primary:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 30px rgba(108,92,231,.5),inset 0 -4px 0 rgba(0,0,0,.2)}
.btn-ghost{background:rgba(108,92,231,.08);color:var(--primary);border-color:rgba(108,92,231,.15)}
.btn-ghost:hover{background:rgba(108,92,231,.15);transform:translateY(-2px);border-color:rgba(108,92,231,.25)}

/* Choice buttons animations */
.choice{transition:all .25s var(--spring)}
.choice:hover:not(.locked){transform:translateY(-3px) scale(1.02);border-color:var(--primary);box-shadow:0 8px 20px rgba(108,92,231,.2)}
.choice.correct{animation:correctPop .6s var(--spring)}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.08)}80%{transform:scale(.98)}100%{transform:scale(1)}}

/* ---- Write (typing) question ---- */
.write-area{max-width:600px;margin:16px auto 0}
.write-prompt{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:10px;line-height:1.4}
.write-textarea{width:100%;min-height:120px;padding:14px 16px;border:2px solid var(--line);border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:600;color:var(--ink);resize:vertical;transition:border-color .2s;line-height:1.5}
.write-textarea:focus{outline:none;border-color:var(--primary)}
.write-textarea::placeholder{color:var(--ink3)}
.write-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:13px;color:var(--ink3);font-weight:600}
.write-submit{margin-top:12px;width:100%;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:16px;font-weight:800;box-shadow:0 6px 18px rgba(108,92,231,.35);transition:all .2s}
.write-submit:hover{transform:translateY(-2px)}
.write-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.rubric{margin-top:16px;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);animation:cardUp .4s var(--spring)}
.rubric-level{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rubric-badge{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:14px;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.rubric-badge.lv1{background:var(--coral)}
.rubric-badge.lv2{background:var(--sun);color:#7a5e00}
.rubric-badge.lv3{background:var(--mint)}
.rubric-badge.lv4{background:var(--primary)}
.rubric-title{font-size:18px;font-weight:800}
.rubric-fb{font-size:14px;color:var(--ink2);margin-top:4px;line-height:1.5}
.rubric-details{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.rubric-tag{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.rubric-tag.pass{background:rgba(0,206,201,.15);color:#00855a}
.rubric-tag.miss{background:rgba(255,118,117,.12);color:#c0392b}

/* Timer */
.timer-bar{position:relative;height:6px;border-radius:99px;background:rgba(0,0,0,.06);margin:0 0 16px;overflow:hidden}
.timer-bar i{display:block;height:100%;border-radius:99px;background:var(--mint);transition:width .25s linear,background .3s}
.timer-bar i.warn{background:var(--sun)}
.timer-bar i.danger{background:var(--coral);animation:timerPulse .5s infinite}
@keyframes timerPulse{50%{opacity:.6}}
.timer-text{position:absolute;right:0;top:-20px;font-size:12px;font-weight:800;color:var(--ink3);font-variant-numeric:tabular-nums}
.timer-text.warn{color:#b8860b}
.timer-text.danger{color:var(--coral)}

/* Lesson card */
.lesson-card{background:linear-gradient(180deg,#faf9ff,#fff)!important;border:2px dashed rgba(253,203,110,.5)!important;text-align:left!important;padding:clamp(22px,3vw,32px)!important}
.lesson-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:linear-gradient(135deg,#ffeaa7,var(--sun));color:#5b3e00;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.06em}
/* Nova cameo on the lesson card — small, top-right */
.lesson-mascot{margin-top:10px;display:flex;justify-content:flex-start}
.lesson-mascot .speech-bubble{font-size:13px;padding:9px 13px;max-width:180px}
@media(max-width:640px){.lesson-mascot{flex-wrap:wrap}}
.lesson-title{font-size:clamp(20px,3vw,26px);font-weight:800;margin-top:12px}
/* Big emoji visual at the top of every lesson. Tight vertical rhythm so
   the emoji sits close to the title below without awkward floating space. */
.lesson-visual{font-size:clamp(56px,9vw,78px);text-align:center;line-height:1;margin:0 0 2px;padding:0;filter:drop-shadow(0 4px 10px rgba(26,16,53,.12));animation:popIn .5s var(--spring);letter-spacing:0;word-spacing:.1em}
.lesson-intro{font-size:15px;color:var(--ink);line-height:1.5;margin:10px 0}
.lesson-example{margin-top:14px;padding:14px 16px;background:#fff;border:1px solid rgba(116,185,255,.2);border-left:4px solid var(--sky);border-radius:var(--r);box-shadow:var(--shadow)}
.lesson-example-label{font-size:11px;font-weight:800;color:var(--sky);letter-spacing:.06em;margin-bottom:6px}
.lesson-example-text{font-size:16px;font-weight:700;line-height:1.4}

/* ---- PICTURE CARD GRID ----
   Used in lesson.pictures for vocab-style lessons (French words, science terms,
   social-studies symbols). Big emoji + word + optional label/translation. */
.pic-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));margin-top:10px}
.pic-card{position:relative;background:linear-gradient(180deg,#fff,#fafaff);border:2px solid var(--line);border-radius:14px;padding:14px 10px 12px;text-align:center;transition:all .25s var(--spring);cursor:pointer;overflow:hidden}
.pic-card:hover{transform:translateY(-4px) scale(1.03);border-color:var(--primary);box-shadow:0 10px 24px rgba(108,92,231,.18)}
.pic-card:active{transform:translateY(1px) scale(.98)}
.pic-card .pc-emoji{font-size:44px;line-height:1;display:block;margin-bottom:8px;filter:drop-shadow(0 3px 6px rgba(26,16,53,.08))}
.pic-card .pc-img{display:block;width:100%;height:84px;object-fit:cover;border-radius:10px;margin-bottom:8px;background:#f0eeff;box-shadow:0 2px 6px rgba(26,16,53,.12)}
.pic-card .pc-img.loading{opacity:0}
.pic-card .pc-img.loaded{opacity:1;transition:opacity .4s ease}

/* Lesson hero image — banner above the lesson title */
.lesson-hero{display:block;width:100%;max-height:220px;object-fit:cover;border-radius:var(--r);margin-bottom:14px;background:linear-gradient(135deg,#e3f2ff,#ede7f6);box-shadow:0 8px 22px rgba(26,16,53,.14)}
.lesson-hero.loaded{animation:heroFade .5s ease}
@keyframes heroFade{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}

/* Question illustration — smaller banner above a question */
.q-image{display:block;margin:8px auto 16px;max-width:100%;max-height:180px;object-fit:contain;border-radius:14px;box-shadow:0 6px 16px rgba(26,16,53,.1)}
.pic-card .pc-word{font-weight:800;color:var(--ink);font-size:14px;line-height:1.2}
.pic-card .pc-sub{font-size:11.5px;color:var(--ink3);font-weight:600;margin-top:3px}
.pic-card .pc-speaker{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(108,92,231,.12);color:var(--primary);display:grid;place-items:center;font-size:12px;opacity:.6;transition:all .2s}
.pic-card:hover .pc-speaker{opacity:1;background:var(--primary);color:#fff;transform:scale(1.1)}
.pic-card.speaking{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,92,231,.2)}
.pic-card.speaking .pc-speaker{opacity:1;background:var(--primary);color:#fff;animation:pulse 1s ease-in-out infinite}

/* ---- READ-ALOUD BUTTON on reading passages ---- */
.passage-audio{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:rgba(108,92,231,.1);color:var(--primary);font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid rgba(108,92,231,.15);margin-bottom:10px;transition:all .2s;letter-spacing:.02em}
.passage-audio:hover{background:rgba(108,92,231,.18);transform:translateY(-1px)}
.passage-audio.speaking{background:var(--primary);color:#fff;border-color:#fff;box-shadow:0 4px 12px rgba(108,92,231,.3)}
.passage-audio .pa-ico{font-size:14px}

/* ---- STACKED MATH COLUMN DISPLAY ----
   Used for vertical arithmetic (addition, subtraction, multiplication).
   Each digit is a fixed-width cell so they line up under each other.
   Optional "carry" row shows small regrouped numbers above the top row. */
.math-stack-wrap{margin-top:10px;display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start}
.math-stack{display:inline-block;padding:14px 20px;background:linear-gradient(180deg,#fafaff,#fff);border:2px solid rgba(108,92,231,.15);border-radius:var(--r);box-shadow:var(--shadow);font-family:'DM Sans',system-ui,sans-serif;font-variant-numeric:tabular-nums;flex-shrink:0}
.math-row{display:flex;justify-content:flex-end;align-items:flex-end;gap:4px}
.math-row .op{margin-right:6px;color:var(--primary);font-weight:800;font-size:28px;align-self:center}
.math-row .cell{min-width:32px;width:32px;text-align:center;font-size:32px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:0}

/* Column headers (ones / tens / hundreds / thousands) — light gray labels */
.math-row.heads .cell{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;height:14px;line-height:14px}

/* Carry row — small red digits above the top number */
.math-row.carry .cell{font-size:15px;font-weight:800;color:#d63031;height:20px;line-height:20px}
.math-row.carry .cell.has{background:rgba(255,118,117,.12);border-radius:6px}
.math-row.carry{margin-bottom:2px}

/* Borrow row — shows both the crossed-out original AND the new value stacked */
.math-row.borrow .cell{font-size:13px;font-weight:800;color:#d63031;height:20px;line-height:20px;background:rgba(255,118,117,.12);border-radius:6px;position:relative}
.math-row.borrow .cell.has::after{content:'';position:absolute;left:4px;right:4px;top:50%;height:2px;background:#d63031;opacity:.75;transform:rotate(-8deg)}

.math-line{height:3px;background:var(--ink);border-radius:2px;margin:6px 0;width:100%}
.math-stack-note{margin-top:8px;font-size:12px;font-weight:600;color:var(--ink3);text-align:center;max-width:220px;margin-left:auto;margin-right:auto;line-height:1.4}
.math-stack-answer .cell{color:var(--primary);animation:popIn .5s var(--spring)}

/* Side-by-side step list — plain-language breakdown */
.math-steps{flex:1;min-width:200px;max-width:340px;padding:14px 16px;background:rgba(108,92,231,.05);border:1.5px solid rgba(108,92,231,.12);border-radius:var(--r)}
.math-steps-title{font-size:11px;font-weight:800;color:var(--primary);letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase}
.math-step{display:flex;gap:10px;align-items:flex-start;padding:6px 0;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.45}
.math-step + .math-step{border-top:1px dashed rgba(108,92,231,.18)}
.math-step .math-step-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;margin-top:1px}
.math-step .math-step-body{flex:1}
.math-step .math-step-body b{color:var(--primary);font-weight:800}
.lesson-hint{margin-top:12px;padding:10px 14px;background:rgba(0,206,201,.1);border-radius:var(--r);font-size:14px;color:#00855a;display:flex;align-items:center;gap:8px}
/* Inline YouTube embed — kid-safe (privacy-enhanced domain, no related
   videos, no YouTube branding). Kids stay IN the app, don't get sent to
   YouTube's recommendation feed. Use videoIds[] on an activity to curate
   1-2 specific videos per lesson. */
.lesson-videos{margin:0 0 4px;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.lesson-video-wrap{position:relative;padding-top:56.25%;border-radius:14px;overflow:hidden;background:#000;box-shadow:0 8px 20px rgba(26,16,53,.18)}
.lesson-video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
.lesson-videos-title{font-size:12px;font-weight:800;color:var(--primary);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 6px}

/* ---- MAINTENANCE SCREEN ----
   Shown when MAINTENANCE_MODE = true in the script section.
   Teacher can bypass with ?admin=1 to continue working normally. */
.maintenance-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#6C5CE7 0%,#A29BFE 50%,#FD79A8 100%);display:flex;align-items:center;justify-content:center;padding:24px;font-family:inherit;color:#fff;text-align:center}
.maintenance-card{max-width:520px;width:100%;background:rgba(255,255,255,.12);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:44px 32px;box-shadow:0 20px 60px rgba(26,16,53,.35)}
.maintenance-rocket{font-size:88px;display:inline-block;animation:rocketBob 2.4s ease-in-out infinite}
@keyframes rocketBob{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-10px) rotate(8deg)}}
.maintenance-gear{font-size:48px;display:inline-block;animation:gearSpin 4s linear infinite;margin-left:6px}
@keyframes gearSpin{to{transform:rotate(360deg)}}
.maintenance-title{font-size:clamp(26px,4vw,36px);font-weight:900;margin:18px 0 10px;letter-spacing:-.02em}
.maintenance-msg{font-size:clamp(16px,2.2vw,19px);line-height:1.55;opacity:.92;margin:0 0 22px}
.maintenance-footer{font-size:13px;opacity:.7;margin-top:26px;letter-spacing:.02em}
.maintenance-dots{display:inline-flex;gap:6px;margin-top:10px}
.maintenance-dots span{width:10px;height:10px;border-radius:50%;background:#fff;opacity:.55;animation:dotPulse 1.4s ease-in-out infinite}
.maintenance-dots span:nth-child(2){animation-delay:.2s}
.maintenance-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.maint-unlock{margin-top:28px;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:10px 20px;border-radius:999px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.02em}
.maint-unlock:hover{background:rgba(255,255,255,.3);transform:translateY(-1px)}
.maint-unlock:active{transform:translateY(0)}
/* Teacher maintenance controls (in dashboard) */
.t-maint{background:#fff;border-radius:16px;padding:22px 22px 18px;margin-top:24px;box-shadow:var(--shadow);border:2px dashed rgba(108,92,231,.25)}
.t-maint-title{font-size:18px;font-weight:800;margin:0 0 4px;color:var(--ink)}
.t-maint-sub{font-size:13px;color:var(--ink3);margin:0 0 14px;font-weight:600}
.t-maint-pill{display:inline-block;padding:6px 14px;border-radius:999px;font-weight:800;font-size:13px;margin-bottom:14px}
.t-maint-pill.on{background:#ffe5e5;color:#c0392b}
.t-maint-pill.off{background:#d7f8e8;color:#0b8c56}
.t-maint-label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin:8px 0 6px}
.t-maint-textarea{width:100%;min-height:70px;padding:12px;border:2px solid #e8e6f0;border-radius:12px;font-family:inherit;font-size:14px;resize:vertical;box-sizing:border-box}
.t-maint-textarea:focus{outline:none;border-color:var(--primary)}
.t-maint-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.t-maint-foot{font-size:11px;color:var(--ink3);margin-top:10px;font-weight:600}
.btn-danger{background:linear-gradient(180deg,#ff6b6b 0%,#c0392b 100%);color:#fff;border-color:#fff;box-shadow:0 8px 22px rgba(192,57,43,.35),inset 0 -4px 0 rgba(0,0,0,.2)}
.btn-danger:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 30px rgba(192,57,43,.5),inset 0 -4px 0 rgba(0,0,0,.2)}

/* ==========================================================================
   NOVA — the KidQuest alien mascot
   --------------------------------------------------------------------------
   Pure inline SVG. Renders anywhere via createMascot({size, message, tone}).
   Cheeks pulse, antenna bobs, arm waves — CSS-only, no JS animation loops.
   ========================================================================== */
.mascot-wrap{display:inline-flex;align-items:flex-end;gap:14px;position:relative}
.mascot{display:inline-block;flex-shrink:0;filter:drop-shadow(0 10px 18px rgba(108,92,231,.25));animation:novaBob 3.2s ease-in-out infinite}
@keyframes novaBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
.mascot .nova-antenna-tip{animation:novaAntenna 2.2s ease-in-out infinite;transform-origin:60px 12px}
@keyframes novaAntenna{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.75}}
.mascot .nova-arm{animation:novaWave 2.6s ease-in-out infinite;transform-origin:20px 70px}
@keyframes novaWave{0%,100%{transform:rotate(0)}30%{transform:rotate(-18deg) translateY(-4px)}60%{transform:rotate(14deg)}}
.mascot .nova-cheek{animation:novaCheek 3.2s ease-in-out infinite}
@keyframes novaCheek{0%,100%{opacity:.45}50%{opacity:.75}}
.mascot .nova-eye-pupil{animation:novaBlink 5s ease-in-out infinite;transform-origin:center}
@keyframes novaBlink{0%,94%,100%{transform:scaleY(1)}97%{transform:scaleY(.05)}}
.speech-bubble{position:relative;background:#fff;color:var(--ink);padding:14px 18px;border-radius:18px;box-shadow:0 8px 22px rgba(26,16,53,.12);font-weight:700;font-size:15px;max-width:260px;border:2px solid rgba(108,92,231,.12);animation:bubbleIn .6s var(--spring)}
@keyframes bubbleIn{0%{opacity:0;transform:translateY(6px) scale(.92)}100%{opacity:1;transform:translateY(0) scale(1)}}
.speech-bubble::before{content:'';position:absolute;bottom:16px;left:-10px;width:0;height:0;border-style:solid;border-width:8px 12px 8px 0;border-color:transparent #fff transparent transparent;filter:drop-shadow(-2px 0 0 rgba(108,92,231,.12))}
.speech-bubble .sb-small{display:block;font-size:12px;font-weight:600;color:var(--ink3);margin-top:2px}

/* ==========================================================================
   DAILY MISSION — highlighted card on the dashboard
   --------------------------------------------------------------------------
   2 hand-picked activities per day. Elevated with animated border glow.
   ========================================================================== */
.daily-mission{margin-top:22px;padding:24px;position:relative;border-radius:var(--r-lg);background:linear-gradient(135deg,#fff6e0 0%,#ffe3f1 55%,#e7e4ff 100%);box-shadow:var(--shadow-lg);overflow:hidden;border:2px solid rgba(255,255,255,.9)}
.daily-mission::before{content:'';position:absolute;inset:-2px;background:conic-gradient(from 0deg,#6C5CE7,#FD79A8,#FDCB6E,#00CEC9,#6C5CE7);border-radius:var(--r-lg);z-index:-1;animation:missionSpin 8s linear infinite;opacity:.55}
@keyframes missionSpin{to{transform:rotate(360deg)}}
.daily-mission::after{content:'';position:absolute;inset:2px;background:linear-gradient(135deg,#fff6e0 0%,#ffe3f1 55%,#e7e4ff 100%);border-radius:calc(var(--r-lg) - 2px);z-index:-1}
.dm-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.dm-title{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.dm-title-emoji{font-size:26px;animation:targetPulse 2s ease-in-out infinite;display:inline-block}
@keyframes targetPulse{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.12) rotate(-8deg)}}
.dm-reset{font-size:12px;font-weight:700;color:var(--ink3);background:rgba(255,255,255,.7);padding:6px 12px;border-radius:999px;border:1.5px solid rgba(108,92,231,.15)}
.dm-progress-wrap{height:10px;border-radius:999px;background:rgba(108,92,231,.15);overflow:hidden;margin-bottom:14px}
.dm-progress{height:100%;border-radius:999px;background:linear-gradient(90deg,#6C5CE7,#FD79A8,#FDCB6E);transition:width .6s var(--spring);box-shadow:0 0 14px rgba(253,121,168,.5)}
.dm-tasks{display:grid;gap:10px}
.dm-task{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.85);border:1.5px solid rgba(108,92,231,.12);cursor:pointer;transition:all .3s var(--spring);text-align:left;font-family:inherit;font-weight:700;color:var(--ink);font-size:14px;width:100%}
.dm-task:hover:not(.done){transform:translateY(-3px);box-shadow:0 10px 24px rgba(108,92,231,.18);border-color:var(--primary)}
.dm-task.done{opacity:.55;background:rgba(0,206,201,.12);border-color:rgba(0,206,201,.3);cursor:default}
.dm-task .dm-task-emoji{font-size:28px;flex-shrink:0}
.dm-task .dm-task-info{flex:1;min-width:0}
.dm-task .dm-task-sub{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.dm-task .dm-task-name{font-size:15px;font-weight:800;color:var(--ink);margin-top:2px}
.dm-task .dm-task-check{width:28px;height:28px;border-radius:50%;border:2px solid rgba(108,92,231,.25);display:grid;place-items:center;flex-shrink:0;font-weight:900;font-size:14px;color:transparent}
.dm-task.done .dm-task-check{background:var(--mint);color:#fff;border-color:var(--mint);box-shadow:0 4px 10px rgba(0,206,201,.4)}
.dm-complete{margin-top:14px;padding:14px;border-radius:16px;background:linear-gradient(135deg,#fff,rgba(0,206,201,.12));border:2px dashed rgba(0,206,201,.35);text-align:center;font-weight:800;color:var(--ink)}
.dm-complete-emoji{font-size:32px;display:block;margin-bottom:4px}

/* ---- REWARD OVERLAY ---- */
.reward-overlay{position:fixed;inset:0;z-index:100;background:rgba(26,16,53,.45);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px}
.reward-overlay.show{display:flex;animation:fadeIn .3s}
.reward-card{background:#fff;border-radius:var(--r-lg);padding:36px 28px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow-lg);animation:rewardIn .7s var(--spring);position:relative;overflow:hidden}
.reward-card::before{content:'';position:absolute;inset:-30px;background:radial-gradient(circle,rgba(253,203,110,.25),transparent 60%);animation:glow 2s ease-in-out infinite;pointer-events:none}
@keyframes rewardIn{0%{opacity:0;transform:scale(.6) rotate(-6deg)}50%{transform:scale(1.05) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.reward-card h2{font-size:28px;font-weight:800;margin-top:8px;position:relative;z-index:1}
.reward-card .big-emoji{font-size:72px;line-height:1;margin:8px 0;animation:bounce 1s ease infinite;display:inline-block;position:relative;z-index:1}
.reward-card .msg{color:var(--ink2);font-size:15px;margin-top:6px}
/* Nova's cameo inside the reward card — smaller size, centered, bubble
   sits to the right. Hidden when empty. */
.reward-card .rw-mascot{display:flex;justify-content:center;margin-bottom:10px;min-height:0}
.reward-card .rw-mascot:empty{display:none}
.reward-card .rw-mascot .mascot-wrap{align-items:center}
.reward-card .rw-mascot .speech-bubble{font-size:14px;padding:10px 14px;max-width:200px}
.reward-stats{display:flex;justify-content:center;gap:12px;margin:18px 0;font-weight:700}
.reward-stats span{background:rgba(0,0,0,.05);padding:8px 14px;border-radius:12px;font-size:14px}

/* ---- TEACHER DASHBOARD ---- */
.t-dash{margin-top:24px}
.t-dash h2{font-size:22px;font-weight:800;margin-bottom:16px}
.t-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.t-student{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.t-student h3{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
.t-student .t-grade{font-size:12px;font-weight:700;color:var(--ink3)}
.t-student .t-stats{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;font-size:13px;font-weight:700;color:var(--ink2)}
.t-student .t-stats span{background:rgba(0,0,0,.05);padding:4px 10px;border-radius:999px}
.t-subj-bars{margin-top:12px}
.t-subj-bar{margin-top:6px}
.t-subj-bar .t-bar-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--ink2)}
.t-subj-bar .t-bar{height:6px;border-radius:99px;background:rgba(0,0,0,.06);overflow:hidden;margin-top:3px}
.t-subj-bar .t-bar i{display:block;height:100%;border-radius:99px;transition:width .5s}
.t-controls{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}

/* ---- REPORT CARD ---- */
.report-card{margin-top:28px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:clamp(18px,3vw,28px);box-shadow:var(--shadow);position:relative;overflow:hidden}
.report-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#6c5ce7,#0984e3,#00b894,#fdcb6e,#e84393);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite}
.rc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.rc-title{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px}
.rc-title .rc-emoji{font-size:26px}
.rc-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:18px}
.rc-overall{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(9,132,227,.08));border-radius:14px;margin-bottom:20px;flex-wrap:wrap}
.rc-overall-lbl{font-size:13px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.rc-overall-lvl{font-size:16px;font-weight:800;display:flex;align-items:center;gap:6px}
.rc-subjects{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.rc-subject{background:#fafaff;border:1px solid var(--line);border-radius:16px;padding:16px;transition:all .3s var(--spring);position:relative;overflow:hidden}
.rc-subject:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.rc-subj-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.rc-subj-name{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px}
.rc-subj-name .rc-sicon{font-size:20px}
.rc-badge{font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.rc-badge.lv1{background:#fff5ec;color:#b56820;border:1px solid #ffe0c0}
.rc-badge.lv2{background:#fff9db;color:#96690b;border:1px solid #ffe89e}
.rc-badge.lv3{background:#e3f2ff;color:#0970c0;border:1px solid #b8ddf7}
.rc-badge.lv4{background:#e0f7f0;color:#0a7b5a;border:1px solid #a8e6ce}
.rc-bar{height:10px;border-radius:99px;background:rgba(0,0,0,.06);overflow:hidden;margin-top:10px}
.rc-bar i{display:block;height:100%;border-radius:99px;transition:width 1s var(--spring);position:relative;overflow:hidden}
.rc-bar i::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-100%);animation:shimmer 2.5s ease-in-out infinite}
.rc-bar i.lv1{background:linear-gradient(90deg,#ffa94d,#e17055)}
.rc-bar i.lv2{background:linear-gradient(90deg,#ffd43b,#fdcb6e)}
.rc-bar i.lv3{background:linear-gradient(90deg,#74b9ff,#0984e3)}
.rc-bar i.lv4{background:linear-gradient(90deg,#55efc4,#00b894)}
.rc-skills{margin-top:10px;font-size:12.5px;color:var(--ink2);font-weight:600;line-height:1.5}
.rc-skills li{margin-top:3px;list-style:none;padding-left:16px;position:relative}
.rc-skills li::before{content:'✓';position:absolute;left:0;color:#00b894;font-weight:800}
.rc-comment{margin-top:10px;font-size:13px;color:var(--ink);font-style:normal;font-weight:500;line-height:1.5;padding:10px 12px;background:rgba(108,92,231,.05);border-left:3px solid var(--primary);border-radius:8px}
.rc-encourage{margin-top:18px;text-align:center;padding:14px;background:linear-gradient(135deg,#fff8e1,#ffe4ef);border-radius:14px;font-size:14px;font-weight:700;color:#e84393}
.rc-encourage .rc-en-emoji{font-size:20px;margin-right:6px}

/* Report card: teacher-detailed extras */
.rc-teacher{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;font-size:11px;font-weight:700;color:var(--ink3)}
.rc-teacher span{background:rgba(0,0,0,.05);padding:3px 8px;border-radius:999px}

/* Legend */
.rc-legend{margin-top:16px;border:1px dashed var(--line);border-radius:14px;overflow:hidden;background:#fafaff}
.rc-legend-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;font-weight:800;font-size:14px;color:var(--ink);user-select:none;transition:background .2s}
.rc-legend-head:hover{background:rgba(108,92,231,.05)}
.rc-legend-head .rc-chevron{transition:transform .3s;font-size:12px;color:var(--ink3)}
.rc-legend.open .rc-chevron{transform:rotate(180deg)}
.rc-legend-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.rc-legend.open .rc-legend-body{max-height:500px}
.rc-legend-inner{padding:4px 16px 16px}
.rc-legend-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:10px;margin-top:6px;transition:background .2s}
.rc-legend-item:hover{background:#fff}
.rc-legend-item .rc-li-em{font-size:22px;flex-shrink:0;line-height:1}
.rc-legend-item .rc-li-body{flex:1;min-width:0}
.rc-legend-item .rc-li-name{font-size:14px;font-weight:800}
.rc-legend-item .rc-li-desc{font-size:12.5px;color:var(--ink2);font-weight:500;line-height:1.4;margin-top:1px}
.rc-legend-item.lv1 .rc-li-name{color:#b56820}
.rc-legend-item.lv2 .rc-li-name{color:#96690b}
.rc-legend-item.lv3 .rc-li-name{color:#0970c0}
.rc-legend-item.lv4 .rc-li-name{color:#0a7b5a}

/* ==========================================================================
   KIDQUEST STORE — catalog cards, item detail, challenge modal, order list
   ========================================================================== */
.store-head{margin-top:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.store-head h2{font-size:24px;font-weight:800;display:flex;align-items:center;gap:10px}
.store-head .coin-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;background:linear-gradient(135deg,#ffe58a,#fdcb6e);color:#7a4a00;font-weight:800;font-size:15px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.08),var(--shadow);border:2px solid #fff0b8}
.store-head .coin-pill .coin-emoji{font-size:18px;animation:coinSpin 4s ease-in-out infinite}
.store-sub{font-size:14px;color:var(--ink3);font-weight:600;margin-top:4px}
.store-tabs{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.store-tab{padding:8px 16px;border-radius:999px;background:rgba(108,92,231,.08);color:var(--ink2);font-weight:800;font-size:13px;cursor:pointer;transition:all .25s var(--spring);border:2px solid transparent;display:inline-flex;align-items:center;gap:6px}
.store-tab:hover{background:rgba(108,92,231,.15);transform:translateY(-1px)}
.store-tab.active{background:linear-gradient(135deg,var(--primary),#8b7bff);color:#fff;box-shadow:0 6px 14px rgba(108,92,231,.35);border-color:#fff}
.store-grid{margin-top:16px;display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.store-item{position:relative;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow);transition:all .35s var(--spring);cursor:pointer;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.store-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(108,92,231,.05),transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
.store-item:hover{transform:translateY(-6px) rotate(-.5deg);box-shadow:var(--shadow-lg)}
.store-item:hover::before{opacity:1}
.store-item:hover .si-emoji{transform:scale(1.15) rotate(-6deg)}
.store-item .si-thumb{height:120px;border-radius:14px;background:linear-gradient(135deg,#fff0d9,#ffe0ec);display:grid;place-items:center;position:relative;overflow:hidden}
.store-item .si-thumb img{width:100%;height:100%;object-fit:cover;border-radius:14px}
.store-item .si-emoji{font-size:58px;line-height:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.08));transition:transform .35s var(--spring)}
.store-item .si-name{font-size:15px;font-weight:800;line-height:1.25}
.store-item .si-cat{font-size:11px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.store-item .si-coin{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:linear-gradient(135deg,#ffe58a,#fdcb6e);color:#7a4a00;font-weight:800;font-size:13px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.1);align-self:flex-start}
.store-item .si-reqs{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.store-item .si-req{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.06);color:var(--ink2);display:inline-flex;align-items:center;gap:3px}
.store-item .si-req.ok{background:rgba(0,184,148,.12);color:#0a7b5a}
.store-item .si-req.no{background:rgba(225,112,85,.12);color:#b54a2f}
.store-item.special{background:linear-gradient(135deg,#fff8f0,#fff0f6);border:2px solid #ffd166}
.store-item.special::after{content:'✨';position:absolute;top:10px;right:12px;font-size:22px;animation:pulse 2s ease-in-out infinite;pointer-events:none}
.store-item.locked{opacity:.6;cursor:not-allowed}
.store-item.locked:hover{transform:none;box-shadow:var(--shadow)}
.store-item .si-lock{position:absolute;bottom:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;font-size:14px;backdrop-filter:blur(4px);z-index:2;box-shadow:0 4px 10px rgba(0,0,0,.2)}
.store-item.locked.special::after{content:''}

/* Modal backdrop + detail/challenge panels */
.store-modal{position:fixed;inset:0;background:rgba(20,20,35,.55);backdrop-filter:blur(6px);z-index:200;display:grid;place-items:center;padding:20px;animation:modalFade .2s ease}
@keyframes modalFade{from{opacity:0}to{opacity:1}}
.store-modal .sm-panel{background:var(--card);border-radius:24px;padding:26px;max-width:520px;width:100%;box-shadow:0 30px 70px rgba(0,0,0,.3);border:1px solid var(--line);animation:modalUp .35s var(--spring);max-height:90vh;overflow:auto}
@keyframes modalUp{from{opacity:0;transform:translateY(30px) scale(.94)}to{opacity:1;transform:none}}
.store-modal .sm-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.06);display:grid;place-items:center;font-size:18px;color:var(--ink2);cursor:pointer;transition:all .2s;border:none}
.store-modal .sm-close:hover{background:rgba(0,0,0,.12);transform:rotate(90deg)}
.sm-panel{position:relative}
.sm-hero{display:flex;align-items:center;gap:16px;padding:20px;border-radius:16px;background:linear-gradient(135deg,#fff0d9,#ffe0ec);margin-bottom:14px}
.sm-hero .sh-emoji{font-size:64px;line-height:1;flex-shrink:0}
.sm-hero .sh-info{flex:1;min-width:0}
.sm-hero .sh-name{font-size:20px;font-weight:800}
.sm-hero .sh-cat{font-size:12px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sm-hero .sh-coin{margin-top:6px;display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:linear-gradient(135deg,#ffe58a,#fdcb6e);color:#7a4a00;font-weight:800;font-size:14px}
.sm-desc{font-size:14px;color:var(--ink2);line-height:1.5;margin-bottom:14px}
.sm-check-head{font-size:13px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:10px;margin-bottom:8px}
.sm-checklist{display:flex;flex-direction:column;gap:8px}
.sm-check{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;font-size:13.5px;font-weight:700;transition:all .3s}
.sm-check.ok{background:rgba(0,184,148,.1);color:#0a7b5a}
.sm-check.no{background:rgba(225,112,85,.1);color:#b54a2f}
.sm-check .sm-icon{font-size:18px;flex-shrink:0}
.sm-actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.sm-actions button{flex:1;min-width:140px;padding:14px 20px;border-radius:14px;font-weight:800;font-size:15px;cursor:pointer;transition:all .25s var(--spring);border:none}
.sm-btn-primary{background:linear-gradient(135deg,var(--primary),#8b7bff);color:#fff;box-shadow:0 8px 20px rgba(108,92,231,.35)}
.sm-btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 26px rgba(108,92,231,.45)}
.sm-btn-primary:disabled{opacity:.5;cursor:not-allowed}
.sm-btn-ghost{background:rgba(0,0,0,.05);color:var(--ink2)}
.sm-btn-ghost:hover{background:rgba(0,0,0,.1)}

/* Challenge modal */
.ch-head{text-align:center;margin-bottom:14px}
.ch-head .ch-title{font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px}
.ch-head .ch-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-top:4px}
.ch-progress{display:flex;gap:6px;justify-content:center;margin:12px 0}
.ch-dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.1);transition:all .3s}
.ch-dot.active{background:var(--primary);transform:scale(1.3)}
.ch-dot.ok{background:#00b894}
.ch-dot.no{background:#e17055}
.ch-q{font-size:17px;font-weight:800;text-align:center;margin:12px 0 16px;line-height:1.4}
.ch-choices{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.ch-choice{padding:14px;border-radius:14px;background:#fafaff;border:2px solid var(--line);font-weight:800;font-size:15px;cursor:pointer;transition:all .2s var(--spring)}
.ch-choice:hover:not(:disabled){transform:translateY(-2px);border-color:var(--primary);background:rgba(108,92,231,.05)}
.ch-choice:disabled{cursor:not-allowed}
.ch-choice.correct{background:rgba(0,184,148,.15);border-color:#00b894;color:#0a7b5a}
.ch-choice.wrong{background:rgba(225,112,85,.15);border-color:#e17055;color:#b54a2f}
.ch-result{text-align:center;padding:20px}
.ch-result .ch-emoji{font-size:72px;margin-bottom:10px;animation:scaleIn .5s var(--spring)}
.ch-result .ch-msg{font-size:20px;font-weight:800;margin-bottom:6px}
.ch-result .ch-sub2{font-size:14px;color:var(--ink3);font-weight:600;margin-bottom:16px;line-height:1.5}
.ch-result .ch-bonus{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:linear-gradient(135deg,#ffe58a,#fdcb6e);color:#7a4a00;font-weight:800;font-size:13px;margin-bottom:10px}

/* Success burst */
.success-burst{text-align:center;padding:10px}
.success-burst .sb-emoji{font-size:84px;margin:10px 0;animation:burstPop .7s var(--spring)}
@keyframes burstPop{0%{transform:scale(.3) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg);opacity:1}100%{transform:scale(1)}}
.success-burst .sb-title{font-size:24px;font-weight:800;margin-bottom:6px}
.success-burst .sb-line{font-size:15px;color:var(--ink2);font-weight:700;margin-bottom:4px}
.success-burst .sb-line-soft{font-size:14px;color:var(--ink3);font-weight:600;margin-bottom:14px}

/* Student orders history */
.orders-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.order-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.order-row .or-emoji{font-size:32px;flex-shrink:0}
.order-row .or-info{flex:1;min-width:0}
.order-row .or-name{font-size:15px;font-weight:800}
.order-row .or-meta{font-size:12px;color:var(--ink3);font-weight:600;margin-top:2px}
.order-row .or-status{font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.or-status.pending{background:#fff5ec;color:#b56820}
.or-status.approved{background:#e0f2ff;color:#0970c0}
.or-status.ordered{background:#ede7f6;color:#5a4dc7}
.or-status.delivered{background:#e0f7f0;color:#0a7b5a}
.or-status.declined{background:#fee5e5;color:#b04040}

/* Teacher: orders management */
.t-orders{margin-top:30px}
.t-orders h2{font-size:20px;font-weight:800;margin-bottom:6px}
.t-orders .t-orders-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:14px}
.t-orders-stats{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:16px}
.t-stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);text-align:center}
.t-stat-card .tsc-num{font-size:22px;font-weight:800}
.t-stat-card .tsc-lbl{font-size:11px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.t-order-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:8px}
.t-order-row .tor-emoji{font-size:30px}
.t-order-row .tor-info{min-width:0}
.t-order-row .tor-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.t-order-row .tor-student{font-size:14px;font-weight:800}
.t-order-row .tor-item{font-size:13px;color:var(--ink2);font-weight:700}
.t-order-row .tor-meta{font-size:11px;color:var(--ink3);font-weight:600;margin-top:3px}
.t-order-row select{padding:8px 12px;border-radius:10px;border:1.5px solid var(--line);background:#fafaff;font-weight:700;font-size:12px;color:var(--ink);cursor:pointer}
.t-order-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.t-order-actions button{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fafaff;cursor:pointer;color:var(--ink2)}
.t-order-actions button:hover{background:rgba(0,0,0,.05)}

/* Teacher: catalog edit */
.t-catalog{margin-top:30px}
.t-catalog h2{font-size:20px;font-weight:800;margin-bottom:6px}
.t-cat-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:14px}
.t-cat-note{font-size:12px;color:#b56820;background:#fff5ec;border:1px solid #ffe0c0;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-weight:600}
.t-cat-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.t-cat-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.t-cat-row .tcr-emoji{font-size:32px;flex-shrink:0}
.t-cat-row .tcr-body{flex:1;min-width:0}
.t-cat-row .tcr-name{font-size:14px;font-weight:800}
.t-cat-row .tcr-meta{font-size:12px;color:var(--ink3);font-weight:600;margin-top:3px}
.t-cat-row .tcr-budget{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;margin-top:6px;display:inline-block}
.t-cat-row .tcr-budget.ok{background:rgba(0,184,148,.15);color:#0a7b5a}
.t-cat-row .tcr-budget.over{background:rgba(225,112,85,.15);color:#b54a2f}
.t-cat-row .tcr-ctrl{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.t-cat-row .tcr-ctrl button{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fafaff;cursor:pointer}
.t-cat-row .tcr-ctrl button:hover{background:rgba(0,0,0,.05)}
.t-cat-row .tcr-ctrl button.on{background:rgba(0,184,148,.12);color:#0a7b5a;border-color:#9be5cf}

/* Dashboard store entry buttons */
.dash-store-row{margin-top:20px;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.dash-store-btn{padding:16px 18px;border-radius:18px;border:none;cursor:pointer;font-weight:800;font-size:15px;display:flex;align-items:center;gap:10px;transition:all .3s var(--spring);box-shadow:var(--shadow)}
