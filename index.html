function renderQ(wrap){
  wrap.innerHTML='';
  const a=quiz.activity, q=quiz.questions[quiz.idx], total=quiz.questions.length;
  const sub=SUBJECTS.find(s=>s.id===quiz.subject);
  wrap.appendChild(h('div',{class:'quiz-head'},[
    h('div',{class:'qt'},[h('span',{style:'font-size:20px;margin-right:6px'},sub.emoji),h('span',{},a.title)]),
    h('div',{class:'qc'},(quiz.idx+1)+' of '+total),
  ]));
  wrap.appendChild(h('div',{class:'q-progress'},[h('i',{style:'width:'+(quiz.idx/total*100)+'%'})]));

  // Timer bar (hidden during lessons)
  const timerWrap=h('div',{class:'timer-bar',style:q.type==='lesson'?'display:none':''},[
    h('span',{class:'timer-text',id:'timerTxt'},''),
    h('i',{id:'timerBar',style:'width:100%'}),
  ]);
  wrap.appendChild(timerWrap);

  const card=h('div',{class:'q-card'});

  if(q.type==='lesson'){clearTimer();renderLesson(card,q);}
  else {
    // Start timer for this question
    const secs = q.type==='write' ? WRITE_TIMER : (TIMER_SECS[currentUser]||35);
    setTimeout(()=>startTimer(secs),100);
    if(q.type==='passage'&&q.passage){
      const pBox = h('div',{class:'q-passage'});
      // Read-aloud button — French activities use fr-FR, everyone else en-US.
      const subj = quiz && quiz.subject;
      const actId = quiz && quiz.activityId || '';
      const lang = (subj==='french' || /-f\d/.test(actId)) ? 'fr-FR' : 'en-US';
      const audioBtn = h('button',{class:'passage-audio',onclick:(e)=>{
        const btn = e.currentTarget;
        document.querySelectorAll('.passage-audio.speaking').forEach(x=>x.classList.remove('speaking'));
        btn.classList.add('speaking');
        speak(q.passage, lang);
        setTimeout(()=>btn.classList.remove('speaking'), Math.max(2000, q.passage.length * 60));
      }},[h('span',{class:'pa-ico'},'🔊'),h('span',{},'Listen to the passage')]);
      pBox.appendChild(audioBtn);
      pBox.appendChild(h('div',{}, q.passage));
      card.appendChild(pBox);
    }
    card.appendChild(h('div',{class:'q-text'},q.q||''));
    // Big emoji visual above the question. Priority:
    //   1. q.visual (hand-curated)
    //   2. emojiFor(q.q) — auto-detect a topical emoji from the question text
    //      (so "Which does NOT belong: lion, tiger, cheetah, penguin?" gets
    //      🦁 instead of a generic folder icon)
    //   3. Activity's main emoji as last resort
    // Only shown when NO image is provided (image wins over emoji visual).
    const qVisual = q.visual
      || (!q.image && (emojiFor(q.q) || (quiz && quiz.activity && quiz.activity.emoji)));
    if(qVisual) card.appendChild(h('div',{class:'q-visual'},qVisual));
    // Real image above the answer choices — ONLY shown when q.image is
    // specifically set on the question. We do NOT auto-apply a generic
    // subject default here: a random stock photo that doesn't match the
    // specific question is worse than no image at all. Use `image: IMG.xxx`
    // on individual questions where a specific topical photo helps.
    if(q.image){
      const img = document.createElement('img');
      img.className='q-image';
      img.alt = q.imageAlt || '';
      img.loading='lazy';
      img.src = q.image;
      img.onerror = ()=>img.remove();
      card.appendChild(img);
    }
    if(q.type==='write') renderWrite(card,q);
    else if(q.type==='mcq'||q.type==='passage'||q.type==='fill') renderMCQ(card,q);
    else if(q.type==='compare') renderCompare(card,q);
    else if(q.type==='match') renderMatch(card,q);
    else if(q.type==='order') renderOrder(card,q);
  }
  const fb=h('div',{class:'feedback',id:'fb'},'');
  wrap.appendChild(card); wrap.appendChild(fb);
  wrap.appendChild(h('div',{class:'controls'},[
    h('button',{class:'btn btn-ghost',onclick:()=>go('week',{subject:quiz.subject})},'← Back'),
    h('button',{class:'btn btn-primary',id:'nextBtn',style:'display:none',onclick:nextQ},'Next →'),
  ]));
}

/* ---- Lesson ---- */
/* Build a stacked math column from a spec object.
   spec = { op, top, bottom, carries, answer, steps, note, mode, showHeads }
   - op: '+', '−', or '×'
   - top / bottom: digit strings (top row is above, bottom has the operator)
   - carries: array of small digits above the top row, RIGHT-aligned
              (use 0 or '' for blank positions).
   - mode: 'borrow' renders the carries row as strikethrough-style cells
           (for subtraction). Default is 'carry'.
   - answer: the result shown below the line
   - steps: ARRAY of plain-English step strings that render NEXT TO the stack
            as a numbered list (e.g. "Ones: 5 + 8 = 13 → write 3, carry 1").
            If steps is set, `note` is ignored.
   - note: fallback one-line caption when steps[] isn't provided
   - showHeads: true to show column place-value labels (1s, 10s, 100s, 1000s)
                above the top row. Defaults to true for 2+ digit problems. */
const PLACE_LABELS = ['1s','10s','100s','1000s','10000s'];
function buildMathStack(spec){
  const wrap = h('div',{class:'math-stack-wrap'});
  const box  = h('div',{class:'math-stack'});
  const digits = (s)=>String(s==null?'':s).split('');
  const width = Math.max(digits(spec.top).length, digits(spec.bottom).length, digits(spec.answer).length);
  const pad = (arr)=>{ const out=[]; for(let i=0;i<width-arr.length;i++) out.push(''); return out.concat(arr); };
  const row = (cells, cls)=>{
    const r = h('div',{class:'math-row '+(cls||'')});
    cells.forEach(c=>{
      const hasContent = c!=null && String(c).trim()!=='';
      r.appendChild(h('div',{class:'cell'+(hasContent?' has':'')}, c==null?'':String(c)));
    });
    return r;
  };
  // Place-value column headers (ones / tens / hundreds) — shown by default for 2+ digit
  const showHeads = spec.showHeads!==false && width>=2;
  if(showHeads){
    // Labels right-to-left: rightmost = 1s, next = 10s, etc.
    const heads = [];
    for(let i=0;i<width;i++) heads.push(PLACE_LABELS[width-1-i] || '');
    box.appendChild(row(heads, 'heads'));
  }
  // Carry / borrow row
  if(Array.isArray(spec.carries) && spec.carries.some(c=>c)){
    const cls = spec.mode==='borrow' ? 'borrow' : 'carry';
    box.appendChild(row(pad(spec.carries.map(c=>c?String(c):'')), cls));
  }
  // Top number
  box.appendChild(row(pad(digits(spec.top))));
  // Bottom number with operator
  const bottomRow = h('div',{class:'math-row'});
  bottomRow.appendChild(h('div',{class:'op'}, spec.op||'+'));
  pad(digits(spec.bottom)).forEach(c=>{
    const hasContent = c!=null && String(c).trim()!=='';
    bottomRow.appendChild(h('div',{class:'cell'+(hasContent?' has':'')}, c));
  });
  box.appendChild(bottomRow);
  // Answer line + answer row
  box.appendChild(h('div',{class:'math-line'}));
  box.appendChild(row(pad(digits(spec.answer)), 'math-stack-answer'));
  wrap.appendChild(box);
  // Step-by-step (preferred) OR fallback note
  if(Array.isArray(spec.steps) && spec.steps.length){
    const panel = h('div',{class:'math-steps'});
    panel.appendChild(h('div',{class:'math-steps-title'}, '📝 Step by step'));
    spec.steps.forEach((s,i)=>{
      const step = h('div',{class:'math-step'},[
        h('div',{class:'math-step-num'}, String(i+1)),
        h('div',{class:'math-step-body', html: s}),  // allow <b>...</b>
      ]);
      panel.appendChild(step);
    });
    wrap.appendChild(panel);
  } else if(spec.note){
    wrap.appendChild(h('div',{class:'math-stack-note'}, spec.note));
  }
  return wrap;
}

function renderLesson(card,q){
  card.innerHTML='';card.classList.add('lesson-card');
  const L=q.lesson||{};
  card.appendChild(h('div',{class:'lesson-badge'},'🎓 QUICK LESSON'));
  // Nova cameo on every lesson intro — subject-aware opener.
  try {
    const subId = quiz && quiz.subject;
    const tone = NOVA_SUBJECT_TONE[subId] || 'magic';
    const msg  = pickNovaLessonOpener(subId);
    card.appendChild(h('div',{class:'lesson-mascot'},[
      createMascot({ tone, size:72, message: msg }),
    ]));
  } catch(e){ console.warn('[KidQuest] lesson Nova failed:', e); }
  // Hero image — ONLY shown when lesson.heroImage is explicitly set.
  // We don't auto-apply generic subject images: a generic "any math photo"
  // doesn't actually match the specific lesson content, which was confusing.
  // To add a banner, set `heroImage: IMG.xxx` on the lesson where you've
  // verified the image matches.
  if(L.heroImage){
    const img = document.createElement('img');
    img.className = 'lesson-hero';
    img.alt = L.title || '';
    img.loading = 'lazy';
    img.src = L.heroImage;
    img.onload = ()=>img.classList.add('loaded');
    img.onerror = ()=>img.remove();   // fail silently; text content still shines
    card.appendChild(img);
  } else {
    // No hero image? Show a big emoji visual instead. Uses lesson.visual for
    // a lesson-specific override (e.g. '🐘' on the Main Idea lesson whose
    // example is about elephants), otherwise falls back to the activity's
    // own emoji (every activity has one — see WEEKS content). This means
    // every lesson screen has a visual anchor, not just text.
    const bigEmoji = L.visual || (quiz && quiz.activity && quiz.activity.emoji);
    if(bigEmoji){
      card.appendChild(h('div',{class:'lesson-visual'}, bigEmoji));
    }
  }
  if(L.title) card.appendChild(h('div',{class:'lesson-title'},L.title));
  // Inline embedded videos — kid-safe, kids NEVER leave the app.
  // Rendered HIGH on the lesson card (right after the title) so kids
  // see the "watch" option before any text. ONLY shows when
  // activity.videoIds[] is set with real YouTube video IDs (up to 2).
  // youtube-nocookie.com + rel=0 + modestbranding=1 + iv_load_policy=3
  // kills the related-video feed, YouTube branding, and annotations.
  const vidIds = (quiz && quiz.activity && Array.isArray(quiz.activity.videoIds))
                   ? quiz.activity.videoIds.filter(Boolean) : [];
  if(vidIds.length){
    const vbox = h('div',{class:'lesson-videos'});
    card.appendChild(h('div',{class:'lesson-videos-title'}, '▶ Watch & learn'));
    vidIds.slice(0,2).forEach(id=>{
      const wrap = h('div',{class:'lesson-video-wrap'});
      const iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube-nocookie.com/embed/'+encodeURIComponent(id)+'?rel=0&modestbranding=1&iv_load_policy=3';
      iframe.title = L.title || 'Lesson video';
      iframe.loading = 'lazy';
      iframe.allow = 'encrypted-media; picture-in-picture; fullscreen';
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';
      wrap.appendChild(iframe);
      vbox.appendChild(wrap);
    });
    card.appendChild(vbox);
  }
  if(L.intro) card.appendChild(h('p',{class:'lesson-intro'},L.intro));
  // If the lesson provides a stack spec OR array of specs, render those as
  // visual columns INSTEAD of (or in addition to) the text example.
  if(L.stack){
    const stacks = Array.isArray(L.stack) ? L.stack : [L.stack];
    const box = h('div',{class:'lesson-example'},[h('div',{class:'lesson-example-label'},'EXAMPLE')]);
    stacks.forEach(s=>box.appendChild(buildMathStack(s)));
    card.appendChild(box);
  } else if(L.example){
    const ex=h('div',{class:'lesson-example'},[h('div',{class:'lesson-example-label'},'EXAMPLE'),h('div',{class:'lesson-example-text'},L.example)]);
    card.appendChild(ex);
  }
  // Picture-card grid — for vocab/symbol lessons (French words, science terms,
  // Canadian symbols). Each card has an emoji, word, optional translation, and
  // (if audioLang is set) a speaker button that pronounces the word.
  if(Array.isArray(L.pictures) && L.pictures.length){
    const lang = L.audioLang || null;
    const ex = h('div',{class:'lesson-example'},[
      h('div',{class:'lesson-example-label'}, lang ? 'VOCABULARY — TAP A CARD TO HEAR IT' : 'VOCABULARY'),
    ]);
    const grid = h('div',{class:'pic-grid'});
    L.pictures.forEach(p=>{
      const speakText = p.speak || p.word;
      const visual = p.image
        ? (function(){
            // Real image with emoji fallback on load error
            const img = document.createElement('img');
            img.className='pc-img loading';
            img.alt = p.word || '';
            img.loading = 'lazy';
            img.src = p.image;
            img.onload = ()=>{img.classList.remove('loading');img.classList.add('loaded')};
            img.onerror = ()=>{
              // Swap image out for the emoji fallback
              const span = document.createElement('span');
              span.className = 'pc-emoji';
              span.textContent = p.emoji || '🔹';
              img.replaceWith(span);
            };
            return img;
          })()
        : h('span',{class:'pc-emoji'}, p.emoji || '🔹');
      const card = h('div',{class:'pic-card',onclick:(e)=>{
        if(!lang) return;
        const c = e.currentTarget;
        document.querySelectorAll('.pic-card.speaking').forEach(x=>x.classList.remove('speaking'));
        c.classList.add('speaking');
        speak(speakText, lang);
        setTimeout(()=>c.classList.remove('speaking'), Math.max(1200, speakText.length * 90));
      }},[
        visual,
        h('div',{class:'pc-word'}, p.word || ''),
        p.label ? h('div',{class:'pc-sub'}, p.label) : null,
        lang ? h('span',{class:'pc-speaker', title:'Tap to hear pronunciation'}, '🔊') : null,
      ]);
      grid.appendChild(card);
    });
    ex.appendChild(grid);
    card.appendChild(ex);
  }
  // Top-level steps[] — works for ANY subject. Renders as a numbered,
  // plain-language breakdown underneath the example so kids have a clear
  // "here's how you actually do this" checklist to follow.
  if(Array.isArray(L.steps) && L.steps.length){
    const panel = h('div',{class:'math-steps',style:'max-width:100%;margin-top:14px'});
    panel.appendChild(h('div',{class:'math-steps-title'}, (L.stepsTitle || '📝 How to do it — step by step')));
    L.steps.forEach((s,i)=>{
      panel.appendChild(h('div',{class:'math-step'},[
        h('div',{class:'math-step-num'}, String(i+1)),
        h('div',{class:'math-step-body', html: s}),
      ]));
    });
    card.appendChild(panel);
  }
  if(L.hint) card.appendChild(h('div',{class:'lesson-hint'},['💡 ',L.hint]));
  quiz.locked=false;
  setTimeout(()=>{const b=$('#nextBtn');if(b){b.style.display='inline-flex';b.textContent="Let's practice! →"}},0);
}

/* ---- MCQ ---- */
function renderMCQ(card,q){
  // Auto-prefix each choice with a topical emoji when it doesn't already
  // start with one. Uses the EMOJI_KEYWORDS map + autoEmojiPrefix helper.
  // Hand-curated choices that already have an emoji are left alone.
  const displayChoices = q.choices.map(c => autoEmojiPrefix(c));
  const short = displayChoices.every(c => Array.from(String(c)).length <= 3);
  const box = h('div',{class:'choices'+(short?' choices-big':'')});
  displayChoices.forEach((c,i)=>{
    box.appendChild(h('button',{class:'choice'+(short?' choice-big':''),onclick:e=>handleMCQ(e,i,q.answer)},String(c)));
  });
  card.appendChild(box);
}
function handleMCQ(ev,pick,ans){
  if(quiz.locked)return; quiz.locked=true; clearTimer();
  const btn=ev.currentTarget;
  btn.parentElement.querySelectorAll('.choice').forEach(c=>c.classList.add('locked'));
  if(pick===ans){btn.classList.add('correct');quiz.correct++;setFB(true)}
  else{btn.classList.add('wrong');btn.parentElement.children[ans].classList.add('correct');setFB(false)}
  showNext();
}

/* ---- Match ---- */
function renderMatch(card,q){
  const lefts=q.pairs.map(p=>p[0]);
  const rights=shuffle(q.pairs.map(p=>p[1]));
  const map=Object.fromEntries(q.pairs);
  let selL=null,done=0;
  const board=h('div',{class:'match-board'});
  const colL=h('div',{class:'match-col'}),colR=h('div',{class:'match-col'});
  lefts.forEach(l=>{const el=h('button',{class:'match-item',onclick:()=>{if(el.classList.contains('done'))return;colL.querySelectorAll('.match-item').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selL={el,val:l}}},l);colL.appendChild(el)});
  rights.forEach(r=>{const el=h('button',{class:'match-item',onclick:()=>{if(el.classList.contains('done')||!selL)return;if(map[selL.val]===r){el.classList.add('done');selL.el.classList.add('done');selL.el.classList.remove('selected');done++;if(done===q.pairs.length){quiz.correct++;setFB(true);quiz.locked=true;clearTimer();showNext()}}else{el.style.borderColor='var(--coral)';setTimeout(()=>el.style.borderColor='',400)}if(selL)selL.el.classList.remove('selected');selL=null}},r);colR.appendChild(el)});
  board.appendChild(colL);board.appendChild(colR);card.appendChild(board);
}

/* ---- Order ---- */
function renderOrder(card,q){
  const items=q.items.map((t,i)=>({t,i}));
  const shuffled=shuffle(items.slice());
  const expected=q.correctOrder;
  let placed=[];
  const pool=h('div',{class:'order-pool'});
  const slots=h('div',{class:'order-slots'});
  function refresh(){
    pool.innerHTML='';slots.innerHTML='';
    shuffled.forEach(o=>{if(placed.includes(o.i))return;pool.appendChild(h('button',{class:'order-chip',onclick:()=>{if(quiz.locked)return;placed.push(o.i);refresh();if(placed.length===expected.length)check()}},o.t))});
    placed.forEach((oi,idx)=>{slots.appendChild(h('button',{class:'order-chip placed',onclick:()=>{if(quiz.locked)return;placed.splice(idx,1);refresh()}},(idx+1)+'. '+q.items[oi]))});
    if(!placed.length) slots.appendChild(h('span',{style:'padding:12px;color:var(--ink3);font-size:14px'},'Tap items in order ↓'));
  }
  function check(){
    quiz.locked=true;clearTimer();
    const ok=placed.every((v,i)=>v===expected[i]);
    if(ok){quiz.correct++;setFB(true)}else{setFB(false)}
    showNext();
  }
  card.appendChild(slots);card.appendChild(pool);refresh();
}

/* Grade writing using heuristic rubric (1-4 scale).
   Checks: word count, capitalization, punctuation, key words, detail/description. */
function gradeWriting(text,q){
  const words=text.trim().split(/\s+/).filter(w=>w);
  const wc=words.length;
  const minW=q.minWords||3;
  const goodW=q.goodWords||(minW*2);
  const startsCapital=/^[A-Z]/.test(text.trim());
  const endsPunct=/[.!?]$/.test(text.trim());
  const hasKeyword=q.keywords?q.keywords.some(kw=>text.toLowerCase().includes(kw.toLowerCase())):true;
  const hasDescriptive=/(very|really|beautiful|amazing|great|wonderful|big|small|happy|sad|because|favorite|love|best|funny|exciting|important|carefully|quickly|slowly)/i.test(text);
  const hasSentences=(text.match(/[.!?]/g)||[]).length;
  const checks=[
    {label:'Enough words ('+minW+'+)',pass:wc>=minW},
    {label:'Starts with capital',pass:startsCapital},
    {label:'Ends with punctuation',pass:endsPunct},
    {label:'Uses topic words',pass:hasKeyword},
  ];
  if(goodW>minW) checks.push({label:'Detailed ('+goodW+'+ words)',pass:wc>=goodW});
  if(q.expectSentences) checks.push({label:'Multiple sentences',pass:hasSentences>=2});
  const passCount=checks.filter(c=>c.pass).length;
  const ratio=passCount/checks.length;
  let level=ratio>=.9?4:ratio>=.7?3:ratio>=.5?2:1;
  // Bonus for descriptive language
  if(hasDescriptive&&level<4) level=Math.min(4,level+1);
  const fbMap={
    1:'Keep trying! Focus on writing more words and using capitals and periods.',
    2:'Good start! Try adding more detail and check your capitals and periods.',
    3:'Nice work! Your writing is clear and follows the rules well.',
    4:'Outstanding writing! Great details, proper grammar, and excellent effort!',
  };
  return {level,feedback:fbMap[level],checks};
}

/* ---- Feedback & Navigation ---- */
const PRAISE=['Awesome! 🌟','You got it!','Great thinking!','High five! ✋','Fantastic!','Well done!'];
const ENCOUR=['Good try!','Try again next time!','Almost!','Nice effort!'];
function setFB(ok){const fb=$('#fb');if(!fb)return;fb.className='feedback '+(ok?'ok':'no');fb.textContent=ok?PRAISE[Math.floor(Math.random()*PRAISE.length)]:ENCOUR[Math.floor(Math.random()*ENCOUR.length)]}
function showNext(){const b=$('#nextBtn');if(!b)return;b.style.display='inline-flex';b.textContent=(quiz.idx+1<quiz.questions.length)?'Next →':'Finish 🎉'}
function nextQ(){
  if(quiz.idx+1<quiz.questions.length){quiz.idx++;quiz.locked=false;renderQ($('.quiz'))}
  else finishActivity();
}

/* Pass threshold — kids need at least this % correct to mark the level
   DONE. Below this and the level must be redone. 60% = 3 out of 5 for a
   5-question activity. Edit to tune difficulty. */
const PASS_THRESHOLD = 0.6;

function finishActivity(){
  const a=quiz.activity;
  const scorable=a.questions.filter(q=>q.type!=='lesson').length||1; // 'write' type IS scorable (Level 3-4 = correct)
  const correct=quiz.correct;
  const pct = correct/scorable;
  const passed = pct >= PASS_THRESHOLD;
  let stars=1;if(pct>=.5)stars++;if(correct===scorable)stars++;
  // Reduced coin reward for failing tries — still some (effort counts) but
  // not the full 5-coin completion bonus.
  const coins = passed ? (5 + (correct===scorable?5:0)) : 2;
  if(correct===scorable) state.perfectActivities[a.id]=true;
  // Record the attempt regardless of pass/fail, so teacher sees progress.
  state.progress[a.id]={
    best:Math.max((state.progress[a.id]||{}).best||0, correct),
    attempts:((state.progress[a.id]||{}).attempts||0)+1,
    done: passed || ((state.progress[a.id]||{}).done === true),  // once passed, stays passed
  };
  // ONLY mark the activity as completed when they meet the pass threshold.
  // This gates the level gating / badges / next-level unlock behind
  // actually learning the material (not just clicking through).
  if(passed){
    state.completedActivities[a.id]=true;
    // If this activity is part of today's Nova Daily Mission, check it off.
    try { markDailyMissionProgress(a.id); } catch(e){ console.warn('[KidQuest] markDailyMissionProgress failed:', e); }
  }
  state.totalStars+=stars;
  state.coins+=coins;
  // Badges
  const td=Object.keys(state.completedActivities).length;
  const pd=Object.keys(state.perfectActivities).length;
  const sc={reading:0,writing:0,math:0,logic:0,french:0,science:0,social:0};
  Object.keys(state.completedActivities).forEach(id=>{const m=id.match(/w\d+-\w+-(r|w|m|l|f|s|c)\d/);if(m){const k={r:'reading',w:'writing',m:'math',l:'logic',f:'french',s:'science',c:'social'}[m[1]];if(k)sc[k]++}});
  if(td>=3)state.badges['first-steps']=true;
  if(state.totalStars>=10)state.badges['ten-stars']=true;
  if(correct===scorable)state.badges['perfect-score']=true;
  if(sc.reading>=5)state.badges['reading-pro']=true;
  if(sc.writing>=5)state.badges['writing-pro']=true;
  if(sc.math>=5)state.badges['math-pro']=true;
  if(sc.logic>=5)state.badges['logic-pro']=true;
  if(sc.french>=5)state.badges['french-pro']=true;
  if(state.streak>=3)state.badges['streak-3']=true;
  if(state.coins>=50)state.badges['coin-50']=true;
  if(state.totalStars>=50)state.badges['star-50']=true;
  if(pd>=5)state.badges['perfectionist']=true;
  if(td>=20)state.badges['scholar']=true;
  if(td>=20){let all=true;SUBJECTS.forEach(sub=>{const acts=getWeekActivities(currentUser,sub.id);acts.forEach(a=>{if(!state.completedActivities[a.id])all=false})});if(all)state.badges['week-complete']=true}
  saveState();updateTopbar('activity');
  // Reward overlay
  const emoji = !passed ? '💪' : pct===1?'🏆':pct>=.7?'✨':'👍';
  const title = !passed ? 'Almost There!'
              : pct===1 ? 'Perfect Score!'
              : pct>=.7 ? 'Awesome!'
              : 'Great Job!';
  const msg   = !passed ? 'You need '+Math.ceil(scorable*PASS_THRESHOLD)+'/'+scorable+' to pass. Try again — you\'ve got this!'
              : pct===1 ? 'Every answer right!'
              : pct>=.7 ? 'Really well done!'
              : 'Nice effort!';
  $('#rwEmoji').textContent=emoji;$('#rwTitle').textContent=title;$('#rwMsg').textContent=msg;
  $('#rwStars').textContent='+'+stars;$('#rwCoins').textContent='+'+coins;$('#rwScore').textContent=correct+'/'+scorable;
  // Nova cameo — tone + pep line depend on the result tier.
  try {
    const rwMascot = $('#rwMascot');
    if(rwMascot){
      rwMascot.innerHTML = '';
      const tier = !passed ? 'fail' : pct===1 ? 'perfect' : pct>=.7 ? 'great' : 'pass';
      const tone = tier==='perfect' ? 'victory' : tier==='great' ? 'warm' : tier==='pass' ? 'cheerful' : 'magic';
      const pep  = pickRewardPepTalk(tier);
      rwMascot.appendChild(createMascot({ tone, size:72, message:pep }));
    }
  } catch(e){ console.warn('[KidQuest] reward Nova failed:', e); }
  // At the end of every quiz — pass or fail — the PRIMARY button takes
  // the student back to this subject's list of levels. The SECONDARY
  // button offers a quick retry of the same activity. Pass label:
  // 'Back to Levels →'. Fail label includes 'try again' urgency but
  // still routes to levels (they'll see the unpassed level and pick it).
  const nextBtn = $('#rwNext');
  const againBtn = $('#rwAgain');
  if(nextBtn){ nextBtn.textContent = passed ? 'Back to Levels →' : 'Back to Levels →'; nextBtn.dataset.mustRetry = ''; }
  if(againBtn){
    againBtn.style.display = '';
    againBtn.textContent = passed ? '🔁 Play Again' : '🔁 Try Again';
  }
  $('#reward').classList.add('show');
  if(pct>=.5)confettiBurst(pct===1?100:50);
}

  const heart = h('div',{class:'wish-btn'+(inWish?' on':''),
    title: inWish ? 'Remove from wishlist' : 'Add to wishlist',

function openChallenge(item){
  closeStoreModal();
  const difficulty = (item.requirements && item.requirements.challenge) || 'easy';
  const questions = pickChallengeQuestions(difficulty);
  let idx = 0, correct = 0, locked = false;
  const results = []; // 'ok' | 'no'

  const modal = h('div',{class:'store-modal'});
  const panel = h('div',{class:'sm-panel'});
  panel.appendChild(h('button',{class:'sm-close',onclick:()=>closeStoreModal()},'✕'));
  modal.appendChild(panel);
  document.body.appendChild(modal);

  const renderStep = ()=>{
    panel.innerHTML='';
    panel.appendChild(h('button',{class:'sm-close',onclick:()=>closeStoreModal()},'✕'));
    panel.appendChild(h('div',{class:'ch-head'},[
      h('div',{class:'ch-title'},[h('span',{},'🧠'),h('span',{},'Unlock Challenge')]),
      h('div',{class:'ch-sub'}, 'Get at least '+CHALLENGE_PASS_MIN+' out of '+questions.length+' correct'),
    ]));
    const dots = h('div',{class:'ch-progress'});
    for(let i=0;i<questions.length;i++){
      dots.appendChild(h('div',{class:'ch-dot'+(i<results.length?' '+results[i]:(i===idx?' active':''))}));
    }
    panel.appendChild(dots);
    const q = questions[idx];
    panel.appendChild(h('div',{class:'ch-q'}, q.q));
    const grid = h('div',{class:'ch-choices'});
    q.choices.forEach((c,ci)=>{
      const btn = h('button',{class:'ch-choice',onclick:()=>{
        if(locked) return; locked=true;
        const ok = ci===q.answer;
        if(ok) correct++;
        results.push(ok?'ok':'no');
        grid.querySelectorAll('button').forEach((b,bi)=>{
          b.disabled=true;
          if(bi===q.answer) b.classList.add('correct');
          else if(bi===ci && !ok) b.classList.add('wrong');
        });
        setTimeout(()=>{
          locked=false; idx++;
          if(idx<questions.length) renderStep();
          else finishChallenge();
        }, 750);
      }}, c);
      grid.appendChild(btn);
    });
    panel.appendChild(grid);
  };

  const finishChallenge = ()=>{
    const passed = correct >= CHALLENGE_PASS_MIN;
    panel.innerHTML='';
    panel.appendChild(h('button',{class:'sm-close',onclick:()=>closeStoreModal()},'✕'));
    const result = h('div',{class:'ch-result'});
    if(passed){
      // Reward effort even before purchase
      state.coins = (state.coins||0) + CHALLENGE_BONUS_COINS;
      saveState();
      result.appendChild(h('div',{class:'ch-emoji'},'🎉'));
      result.appendChild(h('div',{class:'ch-msg'},'You unlocked this reward!'));
      result.appendChild(h('div',{class:'ch-sub2'},'Great job! You got '+correct+' out of '+questions.length+' correct.'));
      result.appendChild(h('div',{class:'ch-bonus'},[h('span',{},'💰'),h('span',{},'+'+CHALLENGE_BONUS_COINS+' bonus coins!')]));
      const actions = h('div',{class:'sm-actions'});
      actions.appendChild(h('button',{class:'sm-btn-ghost',onclick:()=>closeStoreModal()},'Cancel'));
      actions.appendChild(h('button',{class:'sm-btn-primary',onclick:()=>{
        // Re-check coin sufficiency (defensive)
        if((state.coins||0) < item.coinCost){
          alert('You need more coins for this reward.');
          closeStoreModal();
          return;
        }
        const order = placeOrder(item);
        closeStoreModal();
        if(order) openSuccess(item, order);
      }},'✅ Confirm & Send Order'));
      result.appendChild(actions);
    } else {
      result.appendChild(h('div',{class:'ch-emoji'},'💡'));
      result.appendChild(h('div',{class:'ch-msg'},'Almost! Complete a quick challenge to unlock your reward'));
      result.appendChild(h('div',{class:'ch-sub2'},'You got '+correct+' out of '+questions.length+'. Try again — you\'ve got this!'));
      const actions = h('div',{class:'sm-actions'});
      actions.appendChild(h('button',{class:'sm-btn-ghost',onclick:()=>closeStoreModal()},'Maybe later'));
      actions.appendChild(h('button',{class:'sm-btn-primary',onclick:()=>{ closeStoreModal(); openChallenge(item); }},'🔁 Try Again'));
      result.appendChild(actions);
    }
    panel.appendChild(result);
  };

  renderStep();
}

const AVATAR_CHOICES = [

  '🦖','🦋','🐢','🐧','🦉','🐝','🦀','🐳','🦩','🐞',

/* Pick the best visual for a student's tile: their picked emoji OR initial. */
function getStudentAvatarDisplay(sid){
  const ud = allData.users[sid];
  if(ud && ud.avatar) return { kind:'emoji', value: ud.avatar };
  const s = getStudentInfo(sid);
  return { kind:'letter', value: s ? s.initial : '?' };
}
/* Build a DOM element for the avatar tile. `classes` is merged into the tile
   class string — e.g. 'av c-isaiah' in the dashboard, 'avatar' on the picker. */
function buildAvatarTile(sid, classes, inlineStyle){
  const s = getStudentInfo(sid);
  const disp = getStudentAvatarDisplay(sid);
  const color = s ? s.color : '#6C5CE7';
  const gradient = s && s.colorLight && s.colorDark
    ? 'linear-gradient(135deg,'+s.colorLight+','+s.colorDark+')'
    : 'linear-gradient(135deg,'+color+','+color+')';
  const cls = (classes||'') + (disp.kind==='emoji' ? ' av-emoji' : '');
  const style = 'background:'+gradient + (inlineStyle ? ';'+inlineStyle : '');
  return h('div',{class: cls.trim(), style}, disp.value);
}

/* ==========================================================================
   BRAIN BREAK — mini-games (Memory Match + Quick Math)
   --------------------------------------------------------------------------
   Casual games for downtime between lessons. Coins earned here are capped
   daily so they don't replace real academic practice. Personal bests are
   tracked per-student in state.miniGameStats.
   ========================================================================== */
const MINI_GAME_COIN_CAP = 10; // max coins per day awarded from mini-games

// Ensure the stats container exists on older saves that predate this field.
function ensureMiniGameStats(){
  if(!state) return;
  if(!state.miniGameStats){
    state.miniGameStats = { date:'', coinsToday:0, bestMemoryEasy:null, bestMemoryHard:null, bestMathScore:0 };
  }
}

// Award coins for a finished run. rating: 0–3. Silently clamps to the daily
// cap so we never award more than MINI_GAME_COIN_CAP per real-world day.
function miniGameAward(rating){
  ensureMiniGameStats();
  const today = new Date().toISOString().slice(0,10);
  if(state.miniGameStats.date !== today){
    state.miniGameStats.date = today;
    state.miniGameStats.coinsToday = 0;
  }
  const base = Math.max(0, Math.min(3, rating|0));
  const remaining = Math.max(0, MINI_GAME_COIN_CAP - state.miniGameStats.coinsToday);
  const awarded = Math.min(base, remaining);
  state.coins += awarded;
  state.miniGameStats.coinsToday += awarded;
  return awarded;
}

// Post-game modal: Nova + star rating + stats + coin award + replay buttons.

  const overlay = h('div',{class:'mg-win-overlay'});

  const novaMsg = opts.rating === 3 ? 'Incredible!' : opts.rating === 2 ? 'Nice run!' : opts.rating === 1 ? 'Good try!' : 'Keep going!';
  card.appendChild(createMascot({ tone, size:78, message: novaMsg }));
  card.appendChild(h('h2',{class:'mg-win-title'}, opts.title));
  const starsEl = h('div',{class:'mg-win-stars'});
  for(let i=0;i<3;i++) starsEl.appendChild(h('span',{class:'mg-star'+(i<opts.rating?' lit':'')},'⭐'));
  card.appendChild(starsEl);
  if(opts.stats && opts.stats.length){
    const statsEl = h('div',{class:'mg-win-stats'});
    opts.stats.forEach(s=>{
      statsEl.appendChild(h('div',{class:'mg-win-stat'},[
        h('div',{class:'mgws-val'}, s.val),
        h('div',{class:'mgws-lbl'}, s.lbl),
      ]));
    });
    card.appendChild(statsEl);
  }
  card.appendChild(h('div',{class:'mg-win-coins'}, opts.coins > 0 ? ('+'+opts.coins+' 💰') : 'Daily coin cap reached — play for fun!'));
  if(opts.isNewBest) card.appendChild(h('div',{class:'mg-win-best'}, '🏆 New personal best!'));
  card.appendChild(h('div',{class:'mg-win-buttons'},[
    h('button',{class:'btn btn-primary',onclick:()=>{overlay.remove(); opts.onReplay && opts.onReplay();}}, '🔁 Play Again'),
    h('button',{class:'btn',onclick:()=>{overlay.remove(); opts.onHome && opts.onHome();}}, '🏠 Back to Dashboard'),
  ]));
  overlay.appendChild(card);
  document.body.appendChild(overlay);

const MEMORY_EMOJI_POOL = [
  '🦊','🦁','🐯','🐼','🐸','🐵','🐰','🐻','🐶','🐱',
  '🦄','🦖','🦉','🐙','🦋','⭐','🚀','🌈','🎮','🎯',
  '🍕','🍎','🍪','🎨','🎵','🏀','⚽','🧩','🔮','💎',
];
function renderMemoryMatch(root, opts){
  if(!currentUser||!state){go('home');return}
  ensureMiniGameStats();
  const difficulty = (opts && opts.difficulty) || 'easy';
  const pairs = difficulty === 'hard' ? 8 : 6;
  const cols = 4; // 4×3 easy, 4×4 hard

  root.appendChild(h('div',{class:'week-head'},[
    h('h2',{},[h('span',{style:'font-size:24px;margin-right:8px'},'🃏'),h('span',{},'Memory Match')]),
    h('button',{class:'back-btn',onclick:()=>go('mini-hub')},'← Back'),
  ]));
  root.appendChild(h('div',{class:'mg-diff-row'},[
    h('button',{class:'mg-diff'+(difficulty==='easy'?' active':''),onclick:()=>go('game-memory',{difficulty:'easy'})}, 'Easy · 6 pairs'),
    h('button',{class:'mg-diff'+(difficulty==='hard'?' active':''),onclick:()=>go('game-memory',{difficulty:'hard'})}, 'Hard · 8 pairs'),
  ]));

  // Shuffled deck — pick N emoji, duplicate for pairs, shuffle positions.
  const chosen = MEMORY_EMOJI_POOL.slice().sort(()=>Math.random()-0.5).slice(0, pairs);
  const deck   = chosen.concat(chosen).sort(()=>Math.random()-0.5);

  // Stats bar
  const movesDisp   = h('span',{class:'mg-val'},'0');
  const timeDisp    = h('span',{class:'mg-val'},'0:00');
  const matchedDisp = h('span',{class:'mg-val'},'0 / '+pairs);
  root.appendChild(h('div',{class:'mg-stats'},[
    h('div',{class:'mg-stat'},[h('span',{class:'mg-label'},'Moves'), movesDisp]),
    h('div',{class:'mg-stat'},[h('span',{class:'mg-label'},'Time'),  timeDisp]),
    h('div',{class:'mg-stat'},[h('span',{class:'mg-label'},'Pairs'), matchedDisp]),
  ]));

  // Board
  const board = h('div',{class:'mg-board cols-'+cols});
  root.appendChild(board);

  // Game state (closure-local)
  let flipped = []; let matched = 0; let moves = 0; let locked = false;
  let startTime = null; let timerId = null;

  deck.forEach((emoji, idx) => {
    const inner = h('div',{class:'mg-card-inner'},[
      h('div',{class:'mg-card-front'},'?'),
      h('div',{class:'mg-card-back'}, emoji),
    ]);
    const card = h('div',{class:'mg-card'}, [inner]);
    card.onclick = () => {
      if(locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if(!startTime){
        startTime = Date.now();
        timerId = setInterval(()=>{
          const s = Math.floor((Date.now()-startTime)/1000);
          timeDisp.textContent = Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
        }, 500);
      }
      card.classList.add('flipped');
      flipped.push({ el: card, emoji });
      if(flipped.length === 2){
        moves++;
        movesDisp.textContent = String(moves);
        if(flipped[0].emoji === flipped[1].emoji){
          flipped.forEach(f=>f.el.classList.add('matched'));
          matched++;
          matchedDisp.textContent = matched+' / '+pairs;
          flipped = [];
          if(matched === pairs){
            if(timerId) clearInterval(timerId);
            const elapsed = Math.floor((Date.now()-startTime)/1000);
            onWin(elapsed);
          }
        } else {
          locked = true;
          const pair = flipped;
          flipped = [];
          setTimeout(()=>{
            pair.forEach(f=>f.el.classList.remove('flipped'));
            locked = false;
          }, 800);
        }
      }
    };
    board.appendChild(card);
  });

  function onWin(elapsed){
    const par = pairs * 2;
    let rating = 3;
    if(moves > Math.round(par * 1.5)) rating--;
    if(moves > par * 2)               rating--;
    rating = Math.max(1, rating);
    const key = difficulty === 'hard' ? 'bestMemoryHard' : 'bestMemoryEasy';
    const prev = state.miniGameStats[key];
    const isNewBest = !prev || moves < prev.moves;
    if(isNewBest) state.miniGameStats[key] = { moves, time: elapsed };
    const coins = miniGameAward(rating);
    saveState();
    showMiniGameWin({
      title: 'Match complete!',
      rating, coins, isNewBest,
      stats: [
        { lbl:'Moves', val: String(moves) },
        { lbl:'Time',  val: Math.floor(elapsed/60)+':'+String(elapsed%60).padStart(2,'0') },
      ],
      onReplay: () => go('game-memory', { difficulty }),
      onHome:   () => go('dashboard'),
    });
  }
}

/* ----- QUICK MATH -----
   60-second timed drill of simple arithmetic. Level scales difficulty.
   Rating: 3★ = 20+ correct, 2★ = 10+, 1★ = 5+, else no stars (still fun). */
function renderQuickMath(root, opts){
  if(!currentUser||!state){go('home');return}
  ensureMiniGameStats();
  const level = (opts && opts.level) || 'easy';

  root.appendChild(h('div',{class:'week-head'},[
    h('h2',{},[h('span',{style:'font-size:24px;margin-right:8px'},'⚡'),h('span',{},'Quick Math')]),
    h('button',{class:'back-btn',onclick:()=>go('mini-hub')},'← Back'),
  ]));
  root.appendChild(h('div',{class:'mg-diff-row'},[
    h('button',{class:'mg-diff'+(level==='easy'?' active':''),onclick:()=>go('game-math',{level:'easy'})}, 'Easy · +/− to 10'),
    h('button',{class:'mg-diff'+(level==='medium'?' active':''),onclick:()=>go('game-math',{level:'medium'})}, 'Medium · to 20'),
    h('button',{class:'mg-diff'+(level==='hard'?' active':''),onclick:()=>go('game-math',{level:'hard'})}, 'Hard · +/−/×'),
  ]));

  let correct = 0; let wrong = 0; let timeLeft = 60; let gameActive = false;
  let timerId = null; let answerLocked = false;

  const intro = h('div',{class:'qm-intro'},[
    createMascot({ tone:'magic', size:90, message: '60 seconds — how many can you get?' }),
    h('button',{class:'btn btn-primary qm-start-btn',onclick:startGame}, '▶️ Start!'),
  ]);
  root.appendChild(intro);

  const area = h('div',{class:'qm-area',style:'display:none'});
  root.appendChild(area);
  const scoreDisp = h('span',{class:'mg-val'},'0');
  const timeDisp  = h('span',{class:'mg-val'},'60');
  const problemEl = h('div',{class:'qm-problem'});
  const choicesEl = h('div',{class:'qm-choices'});
  area.appendChild(h('div',{class:'qm-status'},[
    h('div',{class:'qm-stat'},[h('span',{class:'mg-label'},'Correct'), scoreDisp]),
    h('div',{class:'qm-stat'},[h('span',{class:'mg-label'},'Time'),    timeDisp]),
  ]));
  area.appendChild(problemEl);
  area.appendChild(choicesEl);

  const ri = (lo, hi) => lo + Math.floor(Math.random() * (hi - lo + 1));

  function genProblem(){
    let a, b, op, ans;
    if(level === 'easy'){
      op = Math.random() < 0.5 ? '+' : '−';
      if(op === '+'){ a = ri(1,9);  b = ri(1, Math.max(1, 10-a)); ans = a + b; }
      else          { a = ri(2,10); b = ri(1, a);                 ans = a - b; }
    } else if(level === 'medium'){
      op = Math.random() < 0.5 ? '+' : '−';
      if(op === '+'){ a = ri(3,15); b = ri(3, Math.max(3, 20-a)); ans = a + b; }
      else          { a = ri(5,20); b = ri(1, a);                 ans = a - b; }
    } else {
      const r = Math.random();
      if(r < 0.4){ op = '+'; a = ri(10,50); b = ri(10,50); ans = a + b; }
      else if(r < 0.75){ op = '−'; a = ri(20,99); b = ri(1, a-1); ans = a - b; }
      else { op = '×'; a = ri(2,9); b = ri(2,9); ans = a * b; }
    }
    // 3 distractor choices + the answer, shuffled
    const wrongs = new Set();
    let guard = 0;
    while(wrongs.size < 3 && guard++ < 40){
      const delta = ri(-5,5) || 1;
      const w = ans + delta;
      if(w !== ans && w >= 0) wrongs.add(w);
    }
    const choices = Array.from(wrongs).concat([ans]).sort(()=>Math.random()-0.5);
    return { a, b, op, ans, choices };
  }

  function renderProblem(){
    const p = genProblem();
    answerLocked = false;
    problemEl.textContent = p.a + ' ' + p.op + ' ' + p.b + ' = ?';
    choicesEl.innerHTML = '';
    p.choices.forEach(c=>{
      const btn = h('button',{class:'qm-choice'}, String(c));
      btn.onclick = () => {
        if(!gameActive || answerLocked) return;
        answerLocked = true;
        if(c === p.ans){
          correct++;
          btn.classList.add('correct');
          scoreDisp.textContent = String(correct);
        } else {
          wrong++;
          btn.classList.add('wrong');
          // Briefly highlight the correct answer so the kid learns.
          Array.from(choicesEl.children).forEach(ch=>{
            if(ch.textContent === String(p.ans)) ch.classList.add('correct');
          });
        }
        setTimeout(renderProblem, 400);
      };
      choicesEl.appendChild(btn);
    });
  }

  function startGame(){
    gameActive = true;
    intro.style.display = 'none';
    area.style.display  = '';
    renderProblem();
    timerId = setInterval(()=>{
      timeLeft--;
      timeDisp.textContent = String(timeLeft);
      if(timeLeft <= 0){
        clearInterval(timerId);
        gameActive = false;
        onEnd();
      }
    }, 1000);
  }

  function onEnd(){
    const rating = correct >= 20 ? 3 : correct >= 10 ? 2 : correct >= 5 ? 1 : 0;
    const prevBest = state.miniGameStats.bestMathScore || 0;
    const isNewBest = correct > prevBest;
    if(isNewBest) state.miniGameStats.bestMathScore = correct;
    const coins = miniGameAward(rating);
    saveState();
    showMiniGameWin({
      title: "Time's up!",
      rating, coins, isNewBest,
      stats: [
        { lbl:'Correct', val: String(correct) },
        { lbl:'Oops',    val: String(wrong)   },
      ],
      onReplay: () => go('game-math', { level }),
      onHome:   () => go('dashboard'),
    });
  }
}

  const grid=h('div',{class:'t-grid stagger'});
  STUDENTS.forEach(s=>{
    const ud=getStudentData(s.id);
    const td=Object.keys(ud.completedActivities).length;
    const totalActs=SUBJECTS.reduce((sum,sub)=>sum+getWeekActivities(s.id,sub.id).length,0);
    const pct=totalActs?Math.round(td/totalActs*100):0;
    const card=h('div',{class:'t-student'},[

        h('span',{},'⭐ '+ud.totalStars),h('span',{},'💰 '+ud.coins),
        h('span',{},'🔥 '+ud.streak),h('span',{},'📊 '+pct+'%'),
      ]),
    ]);
    const bars=h('div',{class:'t-subj-bars'});
    SUBJECTS.forEach(sub=>{
      const done=countDone(s.id,sub.id);
      const total=getWeekActivities(s.id,sub.id).length;
      const p=total?Math.round(done/total*100):0;
      const colors={reading:'#0984e3',writing:'#6c5ce7',math:'#e17055',logic:'#00b894'};
      bars.appendChild(h('div',{class:'t-subj-bar'},[
        h('div',{class:'t-bar-label'},[h('span',{},sub.emoji+' '+sub.name),h('span',{},done+'/'+total)]),
        h('div',{class:'t-bar'},[h('i',{style:'width:'+p+'%;background:'+colors[sub.id]})]),
      ]));
    });
    card.appendChild(bars);
    grid.appendChild(card);
  });
  dash.appendChild(grid);
  // Per-student detailed Report Cards (teacher view)
  const rcHead=h('div',{style:'margin-top:32px;margin-bottom:-6px'},[
    h('h2',{style:'font-size:20px;font-weight:800'},'📊 Detailed Report Cards'),
    h('p',{style:'font-size:13px;color:var(--ink3);font-weight:600;margin-top:4px'},'Performance level, accuracy, and auto-generated comments per student.'),
  ]);
  dash.appendChild(rcHead);
  STUDENTS.forEach(s=>{
    try { dash.appendChild(renderReportCard(s.id, true)); }
    catch(e){ console.warn('[KidQuest] teacher report card failed:',e); }
  });
  // Store management: reward requests + catalog editor + stats
  try { dash.appendChild(renderTeacherStore()); }
  catch(e){ console.warn('[KidQuest] teacher store failed:',e); }
  // Maintenance mode toggle
  try { dash.appendChild(renderMaintenanceControls()); }
  catch(e){ console.warn('[KidQuest] maintenance controls failed:',e); }
  // Controls — export/import/reset
  const ctrl=h('div',{class:'t-controls'},[
    h('button',{class:'btn btn-ghost',onclick:()=>{
      // 📋 Export: copies ALL app state (students, progress, orders, catalog)
      // to the clipboard as a JSON backup. Paste into a text file to save.
      if(confirm('Copy all student data + orders as a JSON backup?')){
        navigator.clipboard.writeText(JSON.stringify(allData,null,2))
          .then(()=>alert('Backup copied to clipboard!\nPaste it somewhere safe (e.g. a text file) to save.'));
      }
    }},'📋 Export JSON'),
    h('button',{class:'btn btn-ghost',onclick:()=>{
      // 📥 Import: paste a previously-exported JSON backup to restore state.
      // Defensive — validates shape before overwriting. Leaves progress intact
      // if the paste is malformed.
      const raw = prompt('Paste a KidQuest JSON backup here to RESTORE.\n\n' +
        'Tip: export a backup first with "📋 Export JSON" before trying this.');
      if(!raw) return;
      try {
        const d = JSON.parse(raw);
        if(!d || typeof d!=='object' || !d.users) throw new Error('Missing "users" object — not a valid KidQuest backup.');
        if(!confirm('This will OVERWRITE all current student progress, orders, and catalog overrides with the backup. Continue?')) return;
        // Merge into allData preserving known student ids
        STUDENTS.forEach(s=>{ allData.users[s.id] = Object.assign(defaultUser(), d.users[s.id]||{}); });
        allData.orders = Array.isArray(d.orders) ? d.orders : [];
        allData.catalogOverrides = (d.catalogOverrides && typeof d.catalogOverrides==='object') ? d.catalogOverrides : {};
        allData.teacher = (d.teacher && typeof d.teacher==='object') ? d.teacher : allData.teacher;
        allData.updatedAt = Date.now();
        saveState();
        alert('Backup restored successfully!');
        go('teacher');
      } catch(err){
        alert('Could not import: '+err.message);
      }
    }},'📥 Import JSON'),
    h('button',{class:'btn btn-ghost',onclick:()=>{if(confirm('Reset ALL student progress?')){STUDENTS.forEach(s=>{allData.users[s.id]=defaultUser()});saveState();go('teacher')}}},'🔄 Reset All'),
    h('button',{class:'btn btn-ghost',onclick:()=>{if(confirm('Clear ALL reward order history?')){allData.orders=[];saveState();go('teacher')}}},'🧹 Clear Orders'),
  ]);
  dash.appendChild(ctrl);
  root.appendChild(dash);
}

/* ==========================================================================
   MAINTENANCE MODE — Teacher controls
   --------------------------------------------------------------------------
   Renders a card inside the teacher dashboard with:
     - A big toggle button (ON/OFF) for maintenance mode
     - Editable message students see on the gated screen
     - Last-updated timestamp
   State persists to allData.maintenance via saveState() → cloud sync.
   Kids on other devices pick it up on next poll (POLL_MS = 25s) or reload.
   ========================================================================== */
function renderMaintenanceControls(){
  if(!allData.maintenance) allData.maintenance = { active:false, message:DEFAULT_MAINTENANCE_MESSAGE, updatedAt:0 };
  const m = allData.maintenance;
  const wrap = h('div',{class:'t-maint'});
  wrap.appendChild(h('h3',{class:'t-maint-title'},'🛠️ Maintenance Mode'));
  wrap.appendChild(h('p',{class:'t-maint-sub'},
    m.active ? 'Site is CURRENTLY gated for kids. Turn OFF when you\'re done editing.'
             : 'Turn ON to show kids a "site is updating" screen. Progress is safe.'));
  const statusPill = h('div',{class:'t-maint-pill '+(m.active?'on':'off')},
    m.active ? '🔴 ON — kids see maintenance screen' : '🟢 OFF — site is live');
  wrap.appendChild(statusPill);

  // Editable message
  const msgLabel = h('label',{class:'t-maint-label',for:'tMaintMsg'},'Message shown to students:');
  const msgInput = h('textarea',{id:'tMaintMsg',class:'t-maint-textarea',rows:3,placeholder:DEFAULT_MAINTENANCE_MESSAGE},m.message || DEFAULT_MAINTENANCE_MESSAGE);
  wrap.appendChild(msgLabel);
  wrap.appendChild(msgInput);

  // Action buttons
  const actions = h('div',{class:'t-maint-actions'});
  const toggleBtn = h('button',{class:'btn '+(m.active?'btn-ghost':'btn-danger'),onclick:()=>{
    const newActive = !m.active;
    const verb = newActive ? 'TURN ON' : 'TURN OFF';
    const warn = newActive
      ? 'Turn maintenance mode ON?\n\nKids on other devices will see the maintenance screen within ~25 seconds (next cloud sync) or on next page load. Their stars and coins are NOT affected.'
      : 'Turn maintenance mode OFF?\n\nKids will regain access within ~25 seconds or on next page load.';
    if(!confirm(warn)) return;
    allData.maintenance = {
      active: newActive,
      message: (msgInput.value && msgInput.value.trim()) || DEFAULT_MAINTENANCE_MESSAGE,
      updatedAt: Date.now(),
    };
    saveState();
    go('teacher');
  }}, m.active ? '🟢 Turn OFF maintenance' : '🔴 Turn ON maintenance');
  const saveMsgBtn = h('button',{class:'btn btn-ghost',onclick:()=>{
    const newMsg = (msgInput.value && msgInput.value.trim()) || DEFAULT_MAINTENANCE_MESSAGE;
    allData.maintenance = Object.assign({active:!!m.active, updatedAt:Date.now()}, {message:newMsg});
    saveState();
    alert('Message saved.');
  }},'💾 Save message only');
  actions.appendChild(toggleBtn);
  actions.appendChild(saveMsgBtn);
  wrap.appendChild(actions);

  if(m.updatedAt){
    const d = new Date(m.updatedAt);
    wrap.appendChild(h('div',{class:'t-maint-foot'},'Last changed: '+d.toLocaleString()));
  }
  return wrap;
}

   TEACHER STORE MANAGEMENT
   --------------------------------------------------------------------------

     1) Summary stats (pending, total requests, total coins spent, most-requested)
     2) Recent reward requests — change status, refund on decline, Amazon link

  const pending = orders.filter(o=>o.status==='pending').length;
  const totalCoins = orders.reduce((s,o)=>s+(o.coinCost||0),0);
  const byItem = {};
  orders.forEach(o=>{ byItem[o.itemName]=(byItem[o.itemName]||0)+1; });
  const topItem = Object.entries(byItem).sort((a,b)=>b[1]-a[1])[0];

  // --- Stats ---

    h('h2',{},'🛍️ Store Management'),
    h('p',{class:'t-orders-sub'},'Reward requests, catalog, and summary stats. Email config lives in EMAIL_CONFIG in the source file.'),
    h('div',{class:'t-orders-stats'},[
      h('div',{class:'t-stat-card'},[h('div',{class:'tsc-num'},String(pending)),h('div',{class:'tsc-lbl'},'Pending')]),
      h('div',{class:'t-stat-card'},[h('div',{class:'tsc-num'},String(orders.length)),h('div',{class:'tsc-lbl'},'Total Requests')]),
      h('div',{class:'t-stat-card'},[h('div',{class:'tsc-num'},String(totalCoins)),h('div',{class:'tsc-lbl'},'Coins Spent')]),
      h('div',{class:'t-stat-card'},[h('div',{class:'tsc-num'},topItem?topItem[0]:'—'),h('div',{class:'tsc-lbl'},'Most Requested')]),
    ]),
  ]);
  wrap.appendChild(statsWrap);

  // --- Orders list ---
  if(!orders.length){
    wrap.appendChild(h('div',{style:'padding:20px;text-align:center;background:var(--card);border:1px dashed var(--line);border-radius:14px;color:var(--ink3)'},'No reward requests yet.'));
  } else {
    orders.forEach(o=>{
      const itm = getItemById(o.itemId) || {emoji:'🎁'};
      const row = h('div',{class:'t-order-row'},[
        h('div',{class:'tor-emoji'}, itm.emoji||'🎁'),
        h('div',{class:'tor-info'},[
          h('div',{class:'tor-top'},[
            h('span',{class:'tor-student'}, o.studentName),
            h('span',{class:'tor-item'}, '→ '+o.itemName),
            h('span',{class:'or-status '+o.status}, o.status),
          ]),
          h('div',{class:'tor-meta'},
            '💰 '+o.coinCost+' · ~$'+(o.approxPrice||0).toFixed(2)+
            ' · '+new Date(o.requestedAt).toLocaleString()+
            ' · remaining: '+o.remainingCoins+' coins'
          ),
          h('div',{class:'tor-meta'}, o.amazonLink ? ['🔗 ', h('a',{href:o.amazonLink,target:'_blank',rel:'noopener'},'Amazon link')] : '🔗 No Amazon link on file'),
        ]),
        (function(){
          const actions = h('div',{class:'t-order-actions'});
          const select = h('select',{onchange:(e)=>{ updateOrderStatus(o.id, e.target.value, false); go('teacher'); }});
          ['pending','approved','ordered','delivered','declined'].forEach(st=>{
            const opt = h('option',{value:st}, st.charAt(0).toUpperCase()+st.slice(1));
            if(st===o.status) opt.selected = true;
            select.appendChild(opt);
          });
          actions.appendChild(select);
          actions.appendChild(h('button',{onclick:()=>{
            if(confirm('Decline this order and refund '+o.coinCost+' coins to '+o.studentName+'?')){
              updateOrderStatus(o.id, 'declined', true); go('teacher');
            }
          }},'↩ Refund'));
          actions.appendChild(h('button',{onclick:()=>{
            const body = 'Student: '+o.studentName+'\nGrade: '+o.studentGrade+
              '\nReward: '+o.itemName+'\nCoins: '+o.coinCost+'\nApprox: $'+(o.approxPrice||0).toFixed(2);
            navigator.clipboard.writeText(body).then(()=>alert('Order details copied.'));
          }},'📋 Copy'));
          return actions;
        })(),
      ]);
      wrap.appendChild(row);
    });
  }

  // --- Catalog editor ---
  wrap.appendChild(h('div',{class:'t-catalog'},[
    h('h2',{},'🎁 Reward Catalog'),
    h('p',{class:'t-cat-sub'},'Toggle availability and spot items that exceed the budget cap. To edit names, prices, coin costs, or images, update STORE_ITEMS at the top of the file.'),
    h('div',{class:'t-cat-note'},'💡 Budget guideline: all items should stay under $15 unless manually changed. Higher-priced items will be flagged below.'),
  ]));
  const catGrid = h('div',{class:'t-cat-grid'});
  getCatalog().forEach(item=>{
    const overBudget = item.approxPrice > 15;
    const row = h('div',{class:'t-cat-row'},[
      h('div',{class:'tcr-emoji'}, item.emoji||'🎁'),
      h('div',{class:'tcr-body'},[
        h('div',{class:'tcr-name'}, item.name),
        h('div',{class:'tcr-meta'}, 'Category: '+item.category+' · 💰 '+item.coinCost+' coins · ~$'+item.approxPrice.toFixed(2)),
        h('div',{class:'tcr-meta'}, 'Requires: '+item.requirements.minLevels+' levels, '+item.requirements.minSubjects+' subjects, '+item.requirements.challenge+' challenge'+(item.special?' · ✨ Special':'')),
        h('div',{class:'tcr-budget '+(overBudget?'over':'ok')}, overBudget ? '⚠️ Over $15 budget' : '✓ Under $15 budget'),
        (function(){
          const ctrl = h('div',{class:'tcr-ctrl'});
          const avail = item.isAvailable !== false;
          ctrl.appendChild(h('button',{class:avail?'on':'',onclick:()=>{
            allData.catalogOverrides = allData.catalogOverrides || {};
            const cur = allData.catalogOverrides[item.id] || {};
            cur.isAvailable = !avail;
            allData.catalogOverrides[item.id] = cur;
            saveState(); go('teacher');
          }}, avail ? '✓ Available' : '✕ Hidden'));
          if(item.amazonLink){
            ctrl.appendChild(h('a',{href:item.amazonLink,target:'_blank',rel:'noopener',style:'text-decoration:none'},
              h('button',{},'🔗 View on Amazon')));
          }
          return ctrl;
        })(),
      ]),
    ]);
    catGrid.appendChild(row);
  });
  wrap.appendChild(catGrid);

  // --- Wishlist insights: what each student is saving up for ---
  const wishWrap = h('div',{class:'t-wish'});
  wishWrap.appendChild(h('h3',{},[h('span',{},'⭐'),h('span',{},'Wishlist Insights')]));
  wishWrap.appendChild(h('div',{class:'t-wish-sub'},'What each student is saving up for — use this to understand what motivates each child.'));
  const wishGrid = h('div',{class:'t-wish-grid'});
  // Tally "most wished-for" item across all students
  const wishTally = {};
  STUDENTS.forEach(s=>{
    const ud = getStudentData(s.id);
    const wl = Array.isArray(ud.wishlist) ? ud.wishlist : [];
    const card = h('div',{class:'t-wish-card'},[
      h('div',{class:'twc-head'},[h('span',{},s.decoEmoji||'👤'),h('span',{},s.name)]),
    ]);
    if(!wl.length){
      card.appendChild(h('div',{class:'t-wish-empty'},'No wishlist items yet.'));
    } else {
      const list = h('div',{class:'twc-list'});
      wl.forEach(id=>{
        const item = getItemById(id);
        if(!item) return;
        wishTally[item.name] = (wishTally[item.name]||0)+1;
        const have = ud.coins||0;
        const need = item.coinCost;
        const pct = Math.min(100, Math.round(have/need*100));
        const away = Math.max(0, need - have);
        list.appendChild(h('div',{class:'twc-item'},[
          h('span',{}, (item.emoji||'🎁') + ' ' + item.name),
          h('span',{class:'twc-prog'}, away<=0 ? '✓ Can afford' : (pct+'% · '+away+' away')),
        ]));
      });
      card.appendChild(list);
    }
    wishGrid.appendChild(card);
  });
  wishWrap.appendChild(wishGrid);
  // Top wishlisted items across all students
  const topWish = Object.entries(wishTally).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(topWish.length){
    const top = h('div',{class:'t-wish-top'});
    top.appendChild(h('h4',{},'🔥 Most Wished-For'));
    const topList = h('div',{class:'t-wish-top-list'});
    topWish.forEach(([name,count])=>{
      topList.appendChild(h('div',{style:'display:flex;justify-content:space-between;align-items:center'},[
        h('span',{},name),
        h('span',{class:'cnt'},count+' student'+(count===1?'':'s')),
      ]));
    });
    top.appendChild(topList);
    wishWrap.appendChild(top);
  }
  wrap.appendChild(wishWrap);

  return wrap;
}

/* ========== UTILS ========== */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

/* ========== BOOT ==========
   Defensive initialization. Any failure → safe fallback to home screen.
   Never leaves the user stuck on a half-rendered state. */
try { initCloud(); } catch(e) { console.warn('[KidQuest] initCloud failed:',e); }

// Initialize EmailJS only when keys are configured. Safely no-op otherwise.
try {
  const ek = EMAIL_CONFIG.emailjs || {};
  if(ek.publicKey && window.emailjs && typeof window.emailjs.init === 'function'){
    window.emailjs.init({ publicKey: ek.publicKey });
    console.log('[KidQuest Store] EmailJS initialized.');
  } else {
    console.log('[KidQuest Store] EmailJS keys not set — orders will be saved to cloud + logged to console.');
  }
} catch(e){ console.warn('[KidQuest Store] EmailJS init failed:',e); }

try {
  const fabEl = $('#fab');
  if(fabEl) fabEl.addEventListener('click',()=>go(currentUser?'dashboard':'home'));
  const rwAgainEl = $('#rwAgain');
  if(rwAgainEl) rwAgainEl.addEventListener('click',()=>{
    closeReward();
    if(quiz && quiz.activityId) go('activity',{activityId:quiz.activityId,subject:quiz.subject});
    else go(currentUser?'dashboard':'home');
  });
  const rwNextEl = $('#rwNext');
  if(rwNextEl) rwNextEl.addEventListener('click',()=>{
    // Always route to the subject's levels list after a quiz — pass or fail.
    // The student sees their progress, picks what's next, or re-picks the
    // same level if they want to try it again.
    closeReward();
    if(quiz && quiz.subject) go('week',{subject:quiz.subject});
    else go(currentUser?'dashboard':'home');
  });
} catch(e) { console.warn('[KidQuest] Button wiring failed:',e); }

// Maintenance gate: if allData.maintenance.active is true AND the teacher
// hasn't unlocked (via password), show the holding screen instead of the app.
// Teacher unlock persists in sessionStorage for the current tab session only
// — closing the tab re-gates; a fresh open requires password again.
function renderMaintenanceScreen(){
  const msg = (allData.maintenance && allData.maintenance.message) || DEFAULT_MAINTENANCE_MESSAGE;
  const root = document.getElementById('screen') || document.body;
  // Escape HTML in the user-editable message so it can't break the DOM
  const safeMsg = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  root.innerHTML = ''
    + '<div class="maintenance-screen">'
    +   '<div class="maintenance-card">'
    +     '<div><span class="maintenance-rocket">🚀</span><span class="maintenance-gear">⚙️</span></div>'
    +     '<h1 class="maintenance-title">KidQuest is getting an upgrade!</h1>'
    +     '<p class="maintenance-msg">' + safeMsg + '</p>'
    +     '<div class="maintenance-dots"><span></span><span></span><span></span></div>'
    +     '<div class="maintenance-footer">Tutor Rhahavy is working on something new. 🛠️</div>'
    +     '<button class="maint-unlock" id="maintUnlockBtn">🔑 Teacher unlock</button>'
    +   '</div>'
    + '</div>';
  const btn = document.getElementById('maintUnlockBtn');
  if(btn) btn.addEventListener('click', promptMaintenanceUnlock);
}
function promptMaintenanceUnlock(){
  const pw = prompt('Teacher password to unlock:');
  if(pw === null) return; // user cancelled
  if(pw === TEACHER_CREDS.password){
    try{ sessionStorage.setItem(MAINTENANCE_BYPASS_KEY,'1'); }catch(e){}
    location.reload();
  } else {
    alert('Incorrect password.');
  }
}
function isMaintenanceBypassed(){
  try{ return sessionStorage.getItem(MAINTENANCE_BYPASS_KEY) === '1'; }catch(e){ return false; }
}
const __maintenanceActive = (function(){
  const m = allData && allData.maintenance;
  if(!m || !m.active) return false;
  if(isMaintenanceBypassed()) return false;
  renderMaintenanceScreen();
  return true;
})();

// Always land on the home screen on fresh page load.
// The profile picker handles multi-student sharing — each kid picks their
// name + re-enters the PIN every session. This prevents the site from
// opening into whoever was last logged in on that device (which is wrong
// for a shared tutoring setup).
if(!__maintenanceActive){
  try {
    currentUser = null; state = null; isTeacher = false;
    try{ localStorage.removeItem(LOCAL_USER_KEY); }catch(e){}
    go('home');
  } catch(e) {
    console.error('[KidQuest] Initial routing failed, forcing home:',e);
    currentUser=null; state=null;
    try{ go('home'); }catch(e2){ document.getElementById('screen').innerHTML='<div style="padding:40px;text-align:center"><h2>KidQuest</h2><p>Something went wrong. <button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#6C5CE7;color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer">Reset & Reload</button></p></div>'; }
  }
}
</script>
