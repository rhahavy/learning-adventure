<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6C5CE7">
<title>KidQuest — Where Learning Becomes an Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KIDQUEST — CSS Theme & Layout
   ============================================================ */
:root {
  --bg: #F0EEFF;
  --card: #FFFFFF;
  --ink: #1A1035;
  --ink2: #5B5580;
  --ink3: #9B95B0;
  --line: rgba(26,16,53,.08);
  --primary: #6C5CE7;
  --primary2: #A29BFE;
  --sky: #74B9FF;
  --mint: #00CEC9;
  --sun: #FDCB6E;
  --coral: #FF7675;
  --coin: #FFD700;
  --akshayan: #FF7675;
  --rushan: #00CEC9;
  --akaran: #A29BFE;
  --nishan: #74B9FF;
  --r: 18px;
  --r-lg: 28px;
  --shadow: 0 4px 20px rgba(26,16,53,.08);
  --shadow-lg: 0 12px 40px rgba(26,16,53,.14);
  --font: 'Nunito', 'Fredoka', ui-rounded, system-ui, sans-serif;
  --font-display: 'Fredoka', 'Nunito', ui-rounded, system-ui, sans-serif;
  --spring: cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;scroll-behavior:smooth}
body{font-family:var(--font);color:var(--ink);background:var(--bg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;font-weight:600}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:3px solid var(--primary);outline-offset:3px}
h1,h2,h3,h4,p{margin:0}
h1,h2,h3{font-family:var(--font-display);letter-spacing:-.02em}
img{max-width:100%}

/* Background */
.bg-mesh{position:fixed;inset:0;z-index:-1;background:
  radial-gradient(ellipse 80% 60% at 10% 10%, rgba(108,92,231,.18), transparent 55%),
  radial-gradient(ellipse 70% 50% at 90% 5%, rgba(253,203,110,.2), transparent 55%),
  radial-gradient(ellipse 75% 55% at 85% 90%, rgba(0,206,201,.15), transparent 55%),
  radial-gradient(ellipse 80% 60% at 5% 85%, rgba(116,185,255,.18), transparent 55%),
  var(--bg)}

/* App shell */
.app{max-width:960px;margin:0 auto;padding:16px 18px 120px}

/* ---- TOPBAR ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;background:rgba(255,255,255,.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.8);border-radius:var(--r-lg);box-shadow:var(--shadow);position:sticky;top:10px;z-index:40;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.02em}
.brand .logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--sky));display:grid;place-items:center;color:#fff;font-size:20px;box-shadow:0 4px 12px rgba(108,92,231,.4)}
.brand-text{background:linear-gradient(135deg,var(--primary),#4834d4);-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar nav{display:flex;gap:6px;flex-wrap:wrap}
.nav-btn{padding:8px 14px;border-radius:999px;font-size:14px;font-weight:700;color:var(--ink2);transition:all .2s}
.nav-btn:hover{background:rgba(108,92,231,.08);color:var(--ink)}
.nav-btn.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(108,92,231,.35)}
.pills{display:flex;gap:8px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font-weight:700;font-size:14px;border:1px solid var(--line)}
.pill-star{background:linear-gradient(135deg,#fff8e1,#fff3c4);color:#b8860b}
.pill-coin{background:linear-gradient(135deg,#fffde7,#fff9c4);color:#c6930a}

/* ---- SCREEN TRANSITIONS ---- */
#screen{animation:fadeIn .35s var(--spring)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ---- HERO (homepage) ---- */
.hero{margin-top:32px;padding:clamp(32px,6vw,60px) clamp(24px,4vw,48px);background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);position:relative;overflow:hidden;text-align:center}
.hero h1{font-size:clamp(36px,7vw,64px);font-weight:800;letter-spacing:-.04em;line-height:1;background:linear-gradient(135deg,var(--primary),#e84393,var(--sun),var(--mint));background-size:300% 300%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradShift 6s ease infinite}
@keyframes gradShift{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.hero .sub{margin-top:14px;font-size:clamp(16px,2vw,20px);color:var(--ink2);font-weight:600}
.hero .cta{margin-top:28px;display:inline-flex;align-items:center;gap:10px;padding:16px 32px;border-radius:999px;background:var(--primary);color:#fff;font-weight:800;font-size:17px;box-shadow:0 8px 24px rgba(108,92,231,.4);transition:all .3s var(--spring)}
.hero .cta:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 36px rgba(108,92,231,.5)}
.hero .cta:active{transform:scale(.97)}

/* Feature cards */
.features{margin-top:32px;display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.feat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);transition:all .3s var(--spring);text-align:left}
.feat:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.feat .ico{font-size:32px;margin-bottom:10px}
.feat h3{font-size:16px;font-weight:800;color:var(--ink)}
.feat p{font-size:13px;color:var(--ink2);margin-top:6px;line-height:1.4}

/* Stagger animation */
.stagger>*{animation:cardUp .5s var(--spring) backwards}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}
.stagger>*:nth-child(6){animation-delay:.3s}
.stagger>*:nth-child(7){animation-delay:.35s}
.stagger>*:nth-child(8){animation-delay:.4s}
@keyframes cardUp{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:none}}

/* ---- PROFILE CARDS ---- */
.profiles{margin-top:28px;display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.profile-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px 22px;text-align:center;box-shadow:var(--shadow);transition:all .3s var(--spring);position:relative;overflow:hidden;width:100%}
.profile-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg)}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:var(--r-lg) var(--r-lg) 0 0}
.profile-card.c-akshayan::before{background:var(--akshayan)}
.profile-card.c-rushan::before{background:var(--rushan)}
.profile-card.c-akaran::before{background:var(--akaran)}
.profile-card.c-nishan::before{background:var(--nishan)}
.profile-card .avatar{width:80px;height:80px;border-radius:24px;display:grid;place-items:center;margin:0 auto 14px;font-size:40px;color:#fff;font-weight:800;border:3px solid #fff;box-shadow:var(--shadow)}
.c-akshayan .avatar{background:linear-gradient(135deg,#ff7675,#d63031)}
.c-rushan .avatar{background:linear-gradient(135deg,#00cec9,#00b894)}
.c-akaran .avatar{background:linear-gradient(135deg,#a29bfe,#6c5ce7)}
.c-nishan .avatar{background:linear-gradient(135deg,#74b9ff,#0984e3)}
.profile-card h3{font-size:20px;font-weight:800}
.profile-card .grade{margin-top:4px;display:inline-block;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(0,0,0,.05);color:var(--ink2)}
.profile-card .stats{margin-top:12px;display:flex;gap:10px;justify-content:center;font-size:13px;color:var(--ink3);font-weight:700}
.teacher-link{margin-top:24px;text-align:center}
.teacher-link a{color:var(--primary);font-weight:700;font-size:15px;text-decoration:none;padding:10px 20px;border-radius:999px;border:2px solid var(--primary);display:inline-block;transition:all .2s}
.teacher-link a:hover{background:var(--primary);color:#fff}

/* ---- PIN SCREEN ---- */
.pin-screen{margin-top:28px;text-align:center}
.pin-screen .who{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.pin-screen .who .av{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;font-size:32px;color:#fff;font-weight:800;border:3px solid #fff;box-shadow:var(--shadow)}
.pin-screen h2{font-size:24px;font-weight:800}
.pin-hint{margin:8px 0 18px;font-size:15px;color:var(--ink2);font-weight:600}
.pin-hint code{background:rgba(108,92,231,.1);padding:4px 10px;border-radius:8px;font-family:var(--font);font-size:14px;color:var(--primary)}
.emoji-pad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;margin:0 auto}
.emoji-btn{font-size:36px;padding:16px;background:var(--card);border:2px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);transition:all .2s var(--spring);line-height:1}
.emoji-btn:hover{transform:scale(1.1);border-color:var(--primary);box-shadow:0 8px 20px rgba(108,92,231,.25)}
.emoji-btn:active{transform:scale(.95)}
.emoji-btn.wrong{animation:shake .4s;border-color:var(--coral)}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-msg{margin-top:16px;font-size:16px;font-weight:700;min-height:28px}
.pin-msg.ok{color:#00b894}
.pin-msg.no{color:var(--coral)}
.pin-back{margin-top:18px;color:var(--ink3);font-weight:700;font-size:14px;text-decoration:underline}

/* ---- TEACHER LOGIN ---- */
.teacher-form{margin-top:28px;max-width:380px;margin-left:auto;margin-right:auto;text-align:center}
.teacher-form h2{font-size:24px;font-weight:800;margin-bottom:20px}
.t-field{display:block;width:100%;padding:14px 18px;border:2px solid var(--line);border-radius:var(--r);font-family:var(--font);font-size:16px;font-weight:600;margin-bottom:12px;transition:border-color .2s}
.t-field:focus{outline:none;border-color:var(--primary)}
.t-submit{width:100%;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:16px;font-weight:800;box-shadow:0 6px 18px rgba(108,92,231,.35);transition:all .2s}
.t-submit:hover{transform:translateY(-2px)}
.t-msg{margin-top:12px;font-size:14px;font-weight:700;color:var(--coral);min-height:22px}

/* ---- STUDENT DASHBOARD ---- */
.dash-hero{margin-top:24px;padding:28px;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden}
.dash-hero .av{width:96px;height:96px;border-radius:28px;display:grid;place-items:center;font-size:52px;color:#fff;font-weight:800;border:3px solid #fff;box-shadow:var(--shadow);flex-shrink:0}
.dash-hero .info{flex:1;min-width:200px}
.dash-hero h1{font-size:clamp(24px,4vw,34px);font-weight:800;letter-spacing:-.02em}
.dash-hero .grade-pill{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(0,0,0,.06);color:var(--ink2)}
.dash-stats{margin-top:20px;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.d-stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--shadow);transition:all .3s var(--spring)}
.d-stat:hover{transform:translateY(-3px)}
.d-stat .num{font-size:28px;font-weight:800}
.d-stat .lbl{font-size:12px;color:var(--ink3);font-weight:700;margin-top:4px}

/* Subject cards */
.subjects{margin-top:24px;display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.subj-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);transition:all .3s var(--spring);display:flex;align-items:center;gap:14px;width:100%}
.subj-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.subj-card .s-ico{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:26px;flex-shrink:0}
.subj-card .s-ico.reading{background:#e3f2ff;color:#0984e3}
.subj-card .s-ico.writing{background:#ede7f6;color:#6c5ce7}
.subj-card .s-ico.math{background:#fff8e1;color:#e17055}
.subj-card .s-ico.logic{background:#e0f7f5;color:#00b894}
.subj-card .s-info{flex:1;min-width:0}
.subj-card .s-name{font-size:17px;font-weight:800}
.subj-card .s-prog{font-size:13px;color:var(--ink3);font-weight:600;margin-top:2px}
.subj-card .s-bar{margin-top:8px;height:8px;border-radius:99px;background:rgba(0,0,0,.06);overflow:hidden}
.subj-card .s-bar i{display:block;height:100%;border-radius:99px;transition:width .5s var(--spring)}
.s-bar i.reading{background:linear-gradient(90deg,#74b9ff,#0984e3)}
.s-bar i.writing{background:linear-gradient(90deg,#a29bfe,#6c5ce7)}
.s-bar i.math{background:linear-gradient(90deg,#ffeaa7,#e17055)}
.s-bar i.logic{background:linear-gradient(90deg,#55efc4,#00b894)}

/* ---- WEEK VIEW (level cards) ---- */
.week-head{margin-top:24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.week-head h2{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px}
.week-head .back-btn{padding:8px 16px;border-radius:999px;background:rgba(0,0,0,.05);font-weight:700;font-size:14px;color:var(--ink2);transition:all .2s}
.week-head .back-btn:hover{background:rgba(0,0,0,.1)}
.levels{margin-top:16px;display:flex;flex-direction:column;gap:12px}
.level-card{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);transition:all .3s var(--spring);width:100%}
.level-card:hover:not(.locked){transform:translateX(6px);box-shadow:var(--shadow-lg)}
.level-card.locked{opacity:.55;cursor:not-allowed}
.level-card.done{border-left:4px solid #00b894}
.level-card.current{border-left:4px solid var(--primary);background:linear-gradient(90deg,rgba(108,92,231,.04),transparent)}
.level-card .l-num{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.level-card .l-num.done{background:#00b894}
.level-card .l-num.current{background:var(--primary)}
.level-card .l-num.locked{background:#ccc;color:#999}
.level-card .l-info{flex:1;min-width:0}
.level-card .l-title{font-size:16px;font-weight:700}
.level-card .l-status{font-size:12px;color:var(--ink3);font-weight:600;margin-top:2px}
.level-card .l-emoji{font-size:28px;flex-shrink:0}

/* ---- QUIZ ---- */
.quiz{background:var(--card);border-radius:var(--r-lg);padding:clamp(20px,3vw,32px);box-shadow:var(--shadow);margin-top:16px;border:1px solid var(--line)}
.quiz-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.quiz-head .qt{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.quiz-head .qc{background:rgba(0,0,0,.05);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;color:var(--ink2)}
.q-progress{margin:14px 0 20px;height:10px;border-radius:99px;background:rgba(0,0,0,.06);overflow:hidden}
.q-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--mint),var(--sun));background-size:200%;border-radius:99px;transition:width .5s var(--spring);animation:shimmer 3s linear infinite}
@keyframes shimmer{from{background-position:0}to{background-position:200%}}
.q-card{background:linear-gradient(180deg,#faf9ff,#fff);border:1px solid var(--line);border-radius:var(--r);padding:clamp(20px,3vw,32px);text-align:center}
.q-text{font-size:clamp(18px,2.5vw,24px);font-weight:700;line-height:1.3;max-width:640px;margin:0 auto}
.q-visual{margin:16px 0 8px;font-size:clamp(48px,8vw,72px);letter-spacing:4px;line-height:1}
.q-passage{margin:12px auto;max-width:600px;background:#fff;padding:16px 20px;border-radius:var(--r);font-size:15px;color:var(--ink2);line-height:1.6;text-align:left;border-left:4px solid var(--sky);box-shadow:var(--shadow)}
.choices{margin-top:18px;display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));max-width:640px;margin-left:auto;margin-right:auto}
.choice{background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:16px;font-size:16px;font-weight:700;transition:all .25s var(--spring);word-break:break-word;min-height:56px}
.choice:hover:not(.locked){transform:translateY(-2px);border-color:var(--primary);box-shadow:0 6px 16px rgba(108,92,231,.2)}
.choice.correct{border-color:#00b894;background:#e6fff5;color:#00855a;animation:pop .4s var(--spring)}
.choice.wrong{border-color:var(--coral);background:#fff0f0;color:#c0392b;animation:shake .4s}
.choice.locked{cursor:not-allowed;opacity:.7}
@keyframes pop{50%{transform:scale(1.06)}}
.choices-big{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}
.choice-big{font-size:clamp(36px,6vw,48px);min-height:90px;display:flex;align-items:center;justify-content:center;padding:18px}

/* Match game */
.match-board{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-item{background:#fff;border:2px solid var(--line);border-radius:var(--r);padding:14px;font-size:16px;font-weight:700;text-align:center;transition:all .2s var(--spring);box-shadow:var(--shadow)}
.match-item:hover:not(.done){border-color:var(--primary);transform:translateY(-2px)}
.match-item.selected{border-color:var(--sun);background:#fff8e1}
.match-item.done{background:#e6fff5;border-color:#00b894;opacity:.7;cursor:default}

/* Order game */
.order-pool,.order-slots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.order-slots{min-height:60px;padding:10px;background:rgba(0,0,0,.03);border-radius:var(--r);border:2px dashed rgba(0,0,0,.1)}
.order-chip{background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 14px;font-weight:700;font-size:15px;box-shadow:var(--shadow);transition:all .2s var(--spring)}
.order-chip:hover{transform:translateY(-2px);border-color:var(--primary)}
.order-chip.placed{background:#fff8e1;border-color:var(--sun)}

/* Feedback */
.feedback{margin-top:14px;min-height:28px;text-align:center;font-weight:700;font-size:16px}
.feedback.ok{color:#00b894}
.feedback.no{color:var(--coral)}
.controls{margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:999px;font-weight:700;font-size:14px;transition:all .3s var(--spring)}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(108,92,231,.35)}
.btn-primary:hover{transform:translateY(-2px);background:#5a4bd1}
.btn-ghost{background:rgba(0,0,0,.05);color:var(--ink2)}
.btn-ghost:hover{background:rgba(0,0,0,.1)}

/* ---- Write (typing) question ---- */
.write-area{max-width:600px;margin:16px auto 0}
.write-prompt{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:10px;line-height:1.4}
.write-textarea{width:100%;min-height:120px;padding:14px 16px;border:2px solid var(--line);border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:600;color:var(--ink);resize:vertical;transition:border-color .2s;line-height:1.5}
.write-textarea:focus{outline:none;border-color:var(--primary)}
.write-textarea::placeholder{color:var(--ink3)}
.write-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:13px;color:var(--ink3);font-weight:600}
.write-submit{margin-top:12px;width:100%;padding:14px;border-radius:var(--r);background:var(--primary);color:#fff;font-size:16px;font-weight:800;box-shadow:0 6px 18px rgba(108,92,231,.35);transition:all .2s}
.write-submit:hover{transform:translateY(-2px)}
.write-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.rubric{margin-top:16px;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);animation:cardUp .4s var(--spring)}

const STORAGE_KEY = 'kidquest-v1';
const LOCAL_USER_KEY = 'kidquest-current-user';
const CLOUD_BUCKET = 'kidquest-dca83c70e20a70f247b6';
const CLOUD_URL = 'https://textdb.dev/api/data/' + CLOUD_BUCKET;
const POLL_MS = 25000;

const defaultUser = () => ({
  totalStars:0, coins:0, streak:0, lastActiveDate:'',
  badges:{}, progress:{}, completedActivities:{}, perfectActivities:{}
});
const defaultAll = () => ({
  users: Object.fromEntries(STUDENTS.map(s=>[s.id, defaultUser()])),
  teacher:{lastLogin:0}, updatedAt:0
});

// Reset URL handler: ?reset=1 or ?reset=cloud
(function(){try{const u=new URL(location.href),r=u.searchParams.get('reset');if(!r)return;localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(LOCAL_USER_KEY);if(r==='cloud'){fetch(CLOUD_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(defaultAll())}).catch(()=>{})}u.searchParams.delete('reset');history.replaceState({},'',u.pathname)}catch(e){}})();

let allData = (function(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r),d=defaultAll();if(p.users){STUDENTS.forEach(s=>{d.users[s.id]=Object.assign(defaultUser(),p.users[s.id]||{})});d.teacher=p.teacher||{lastLogin:0};d.updatedAt=p.updatedAt||0}return d}}catch(e){}return defaultAll()
})();

let currentUser = localStorage.getItem(LOCAL_USER_KEY)||null;
if(currentUser && !STUDENTS.find(s=>s.id===currentUser)) currentUser=null;
let isTeacher = false;
let state = currentUser ? allData.users[currentUser] : null;
let currentWeek = 1;
let currentScreen = null;
let currentOpts = {};

function saveState(){
  if(currentUser && state) allData.users[currentUser]=state;
  allData.updatedAt=Date.now();
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(allData))}catch(e){}
  syncToCloud();
}

function loginAs(uid){
  currentUser=uid; isTeacher=false;
  state=allData.users[uid];
  // Streak logic
  const today=new Date().toDateString();
  if(state.lastActiveDate){
    const last=new Date(state.lastActiveDate);
    const diff=Math.round((new Date(today)-last)/(1000*60*60*24));
    if(diff===1) state.streak++;
    else if(diff>1) state.streak=1;
  } else state.streak=1;
  state.lastActiveDate=today;
  try{localStorage.setItem(LOCAL_USER_KEY,uid)}catch(e){}
  saveState();
  go('dashboard');
}

function loginTeacher(){
  isTeacher=true; currentUser=null; state=null;
  allData.teacher.lastLogin=Date.now();
  saveState();
  go('teacher');
}

function logout(){
  currentUser=null; isTeacher=false; state=null;
  try{localStorage.removeItem(LOCAL_USER_KEY)}catch(e){}
  go('home');
}

/* ========== CLOUD SYNC ========== */
let cloudReady=false, cloudBusy=false, pendingWrite=null;
function initCloud(){
  pullCloud(true).then(()=>{cloudReady=true}).catch(()=>{});
  setInterval(()=>pullCloud(false),POLL_MS);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)pullCloud(false)});
}
async function pullCloud(init){
  try{const r=await fetch(CLOUD_URL+'?_='+Date.now(),{cache:'no-store'});if(!r.ok)throw 0;const t=await r.text();if(!t)return;const d=JSON.parse(t);if(!d||!d.users)return;if((d.updatedAt||0)<=(allData.updatedAt||0))return;STUDENTS.forEach(s=>{allData.users[s.id]=Object.assign(defaultUser(),d.users[s.id]||{})});allData.updatedAt=d.updatedAt;if(currentUser)state=allData.users[currentUser];try{localStorage.setItem(STORAGE_KEY,JSON.stringify(allData))}catch(e){}if(!init&&currentScreen&&currentScreen!=='activity')go(currentScreen,currentOpts)}catch(e){if(init)throw e}
}
async function syncToCloud(){
  if(cloudBusy){pendingWrite=true;return}cloudBusy=true;
  try{await fetch(CLOUD_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(allData)})}catch(e){}
  cloudBusy=false;if(pendingWrite){pendingWrite=false;syncToCloud()}
}

/* ========== UI HELPERS ========== */
const $=s=>document.querySelector(s);
function h(tag,a={},c=[]){
  const el=document.createElement(tag);
  for(const k in a){if(k==='class')el.className=a[k];else if(k==='html')el.innerHTML=a[k];else if(k.startsWith('on'))el.addEventListener(k.slice(2),a[k]);else if(a[k]!=null)el.setAttribute(k,a[k])}
  (Array.isArray(c)?c:[c]).forEach(x=>{if(x==null)return;if(typeof x==='string')el.appendChild(document.createTextNode(x));else el.appendChild(x)});
  return el;
}

function confettiBurst(n=50){
  const colors=['#6C5CE7','#74B9FF','#00CEC9','#FDCB6E','#FF7675','#A29BFE'];
  for(let i=0;i<n;i++){const d=document.createElement('div');d.className='confetti';d.style.left=Math.random()*100+'vw';d.style.background=colors[Math.floor(Math.random()*colors.length)];d.style.animationDuration=(1.5+Math.random()*1.5)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),3500)}
}

function countDone(sid,subj){const acts=getWeekActivities(sid,subj);const ud=getStudentData(sid);return acts.filter(a=>ud.completedActivities[a.id]).length}

  currentScreen=screen; currentOpts=opts;
  const root=$('#screen'); root.innerHTML='';

  updateTopbar(screen);
  // Fab
  const fab=$('#fab');

  if(screen==='home') renderHome(root);
  else if(screen==='profiles') renderProfiles(root);
  else if(screen==='pin') renderPin(root,opts.student);
  else if(screen==='teacher-login') renderTeacherLogin(root);
  else if(screen==='dashboard') renderDashboard(root);
  else if(screen==='week') renderWeek(root,opts.subject);
  else if(screen==='activity') renderActivity(root,opts.activityId,opts.subject);
  else if(screen==='badges') renderBadges(root);
  else if(screen==='teacher') renderTeacher(root);
}

    const cls='level-card'+(done?' done':'')+(isCurrent?' current':'')+(locked?' locked':'');
    const numCls='l-num'+(done?' done':'')+(isCurrent?' current':'')+(locked?' locked':'');

/* ========== TIMER SYSTEM ==========
   Age-appropriate seconds per question. Write questions get extra time.
   Lesson screens have no timer. When time runs out, auto-advance. */
const TIMER_SECS = { nishan:45, akaran:40, rushan:35, akshayan:30 };
const WRITE_TIMER = 120; // 2 min for free-write
let timerInterval = null;
let timerLeft = 0;

function startTimer(secs){
  clearTimer();
  timerLeft = secs;
  const bar = $('#timerBar');
  const txt = $('#timerTxt');
  if(!bar||!txt) return;
  bar.style.width='100%'; bar.className='';
  txt.textContent=secs+'s'; txt.className='timer-text';
  timerInterval = setInterval(()=>{
    timerLeft--;
    if(timerLeft<0){clearTimer();timeUp();return}
    const pct = (timerLeft/secs)*100;
    bar.style.width=pct+'%';
    txt.textContent=timerLeft+'s';
    if(timerLeft<=5){bar.className='danger';txt.className='timer-text danger'}
    else if(timerLeft<=10){bar.className='warn';txt.className='timer-text warn'}
  },1000);
}
function clearTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}
function timeUp(){
  if(!quiz||quiz.locked)return;
  quiz.locked=true;
  // Mark wrong + show feedback
  const fb=$('#fb');if(fb){fb.className='feedback no';fb.textContent='⏰ Time\'s up!'}
  // Lock all choices
  document.querySelectorAll('.choice,.emoji-btn,.write-submit,.order-chip,.match-item').forEach(el=>el.classList.add('locked'));
  showNext();
}

/* ========== ACTIVITY ENGINE ========== */
let quiz = null;

function renderActivity(root,actId,subId){
  if(!currentUser||!state){go('home');return}
  const acts=getWeekActivities(currentUser,subId);
  const activity=acts.find(a=>a.id===actId);
  if(!activity){go('dashboard');return}
  // Build questions with lesson prepended
  const qs = activity.lesson ? [{type:'lesson',lesson:activity.lesson},...activity.questions] : [...activity.questions];
  quiz={activityId:actId, subject:subId, activity, questions:qs, idx:0, correct:0, locked:false};
  const wrap=h('div',{class:'quiz'});
  root.appendChild(wrap);
  renderQ(wrap);
}

function renderQ(wrap){
  wrap.innerHTML='';
  const a=quiz.activity, q=quiz.questions[quiz.idx], total=quiz.questions.length;
  const sub=SUBJECTS.find(s=>s.id===quiz.subject);
  wrap.appendChild(h('div',{class:'quiz-head'},[
    h('div',{class:'qt'},[sub.emoji+' '+a.title]),
    h('div',{class:'qc'},(quiz.idx+1)+' of '+total),
  ]));
  wrap.appendChild(h('div',{class:'q-progress'},[h('i',{style:'width:'+(quiz.idx/total*100)+'%'})]));

  // Timer bar (hidden during lessons)
  const timerWrap=h('div',{class:'timer-bar',style:q.type==='lesson'?'display:none':''},[
    h('span',{class:'timer-text',id:'timerTxt'},''),
    h('i',{id:'timerBar',style:'width:100%'}),
  ]);
  wrap.appendChild(timerWrap);

  const card=h('div',{class:'q-card'});

  if(q.type==='lesson'){clearTimer();renderLesson(card,q);}
  else {
    // Start timer for this question
    const secs = q.type==='write' ? WRITE_TIMER : (TIMER_SECS[currentUser]||35);
    setTimeout(()=>startTimer(secs),100);
    if(q.type==='passage'&&q.passage) card.appendChild(h('div',{class:'q-passage'},q.passage));
    card.appendChild(h('div',{class:'q-text'},q.q||''));
    if(q.visual) card.appendChild(h('div',{class:'q-visual'},q.visual));
    if(q.type==='write') renderWrite(card,q);
    else if(q.type==='mcq'||q.type==='passage'||q.type==='fill') renderMCQ(card,q);
    else if(q.type==='compare') renderCompare(card,q);
    else if(q.type==='match') renderMatch(card,q);
    else if(q.type==='order') renderOrder(card,q);
  }
  const fb=h('div',{class:'feedback',id:'fb'},'');
  wrap.appendChild(card); wrap.appendChild(fb);
  wrap.appendChild(h('div',{class:'controls'},[
    h('button',{class:'btn btn-ghost',onclick:()=>go('week',{subject:quiz.subject})},'← Back'),
    h('button',{class:'btn btn-primary',id:'nextBtn',style:'display:none',onclick:nextQ},'Next →'),
  ]));
}

/* ---- Lesson ---- */
function renderLesson(card,q){
  card.innerHTML='';card.classList.add('lesson-card');
  const L=q.lesson||{};
  card.appendChild(h('div',{class:'lesson-badge'},'🎓 QUICK LESSON'));
  if(L.title) card.appendChild(h('div',{class:'lesson-title'},L.title));
  if(L.intro) card.appendChild(h('p',{class:'lesson-intro'},L.intro));
  if(L.example){const ex=h('div',{class:'lesson-example'},[h('div',{class:'lesson-example-label'},'EXAMPLE'),h('div',{class:'lesson-example-text'},L.example)]);card.appendChild(ex)}
  if(L.hint) card.appendChild(h('div',{class:'lesson-hint'},['💡 ',L.hint]));
  // Video link (if available for this activity)
  const vidQ = VIDEOS[quiz.activityId];
  if(vidQ){
    const link = document.createElement('a');
    link.className='lesson-video';
    link.href='https://www.youtube.com/results?search_query='+vidQ;
    link.target='_blank';
    link.rel='noopener';
    link.textContent='▶ Watch a Video First';
    card.appendChild(link);
  }
  quiz.locked=false;
  setTimeout(()=>{const b=$('#nextBtn');if(b){b.style.display='inline-flex';b.textContent="Let's practice! →"}},0);
}

/* ---- MCQ ---- */
function renderMCQ(card,q){
  const short=q.choices.every(c=>Array.from(String(c)).length<=3);
  const box=h('div',{class:'choices'+(short?' choices-big':'')});
  q.choices.forEach((c,i)=>{
    box.appendChild(h('button',{class:'choice'+(short?' choice-big':''),onclick:e=>handleMCQ(e,i,q.answer)},String(c)));
  });
  card.appendChild(box);
}
function handleMCQ(ev,pick,ans){
  if(quiz.locked)return; quiz.locked=true; clearTimer();
  const btn=ev.currentTarget;
  btn.parentElement.querySelectorAll('.choice').forEach(c=>c.classList.add('locked'));
  if(pick===ans){btn.classList.add('correct');quiz.correct++;setFB(true)}
  else{btn.classList.add('wrong');btn.parentElement.children[ans].classList.add('correct');setFB(false)}
  showNext();
}

/* ---- Compare ---- */
function renderCompare(card,q){
  const box=h('div',{class:'choices'});
  const mk=(key,txt)=>h('button',{class:'choice',style:'font-size:20px;padding:22px',onclick:e=>{
    if(quiz.locked)return;quiz.locked=true;clearTimer();
    e.currentTarget.parentElement.querySelectorAll('.choice').forEach(c=>c.classList.add('locked'));
    if(key===q.answer){e.currentTarget.classList.add('correct');quiz.correct++;setFB(true)}
    else{e.currentTarget.classList.add('wrong');setFB(false)}
    showNext();
  }},txt);
  box.appendChild(mk('a',String(q.a)));
  box.appendChild(mk('b',String(q.b)));
  card.appendChild(box);
}

/* ---- Match ---- */
function renderMatch(card,q){
  const lefts=q.pairs.map(p=>p[0]);
  const rights=shuffle(q.pairs.map(p=>p[1]));
  const map=Object.fromEntries(q.pairs);
  let selL=null,done=0;
  const board=h('div',{class:'match-board'});
  const colL=h('div',{class:'match-col'}),colR=h('div',{class:'match-col'});
  lefts.forEach(l=>{const el=h('button',{class:'match-item',onclick:()=>{if(el.classList.contains('done'))return;colL.querySelectorAll('.match-item').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selL={el,val:l}}},l);colL.appendChild(el)});
  rights.forEach(r=>{const el=h('button',{class:'match-item',onclick:()=>{if(el.classList.contains('done')||!selL)return;if(map[selL.val]===r){el.classList.add('done');selL.el.classList.add('done');selL.el.classList.remove('selected');done++;if(done===q.pairs.length){quiz.correct++;setFB(true);quiz.locked=true;clearTimer();showNext()}}else{el.style.borderColor='var(--coral)';setTimeout(()=>el.style.borderColor='',400)}if(selL)selL.el.classList.remove('selected');selL=null}},r);colR.appendChild(el)});
  board.appendChild(colL);board.appendChild(colR);card.appendChild(board);
}

/* ---- Order ---- */
function renderOrder(card,q){
  const items=q.items.map((t,i)=>({t,i}));
  const shuffled=shuffle(items.slice());
  const expected=q.correctOrder;
  let placed=[];
  const pool=h('div',{class:'order-pool'});
  const slots=h('div',{class:'order-slots'});
  function refresh(){
    pool.innerHTML='';slots.innerHTML='';
    shuffled.forEach(o=>{if(placed.includes(o.i))return;pool.appendChild(h('button',{class:'order-chip',onclick:()=>{if(quiz.locked)return;placed.push(o.i);refresh();if(placed.length===expected.length)check()}},o.t))});
    placed.forEach((oi,idx)=>{slots.appendChild(h('button',{class:'order-chip placed',onclick:()=>{if(quiz.locked)return;placed.splice(idx,1);refresh()}},(idx+1)+'. '+q.items[oi]))});
    if(!placed.length) slots.appendChild(h('span',{style:'padding:12px;color:var(--ink3);font-size:14px'},'Tap items in order ↓'));
  }
  function check(){
    quiz.locked=true;clearTimer();
    const ok=placed.every((v,i)=>v===expected[i]);
    if(ok){quiz.correct++;setFB(true)}else{setFB(false)}
    showNext();
  }
  card.appendChild(slots);card.appendChild(pool);refresh();
}

/* ---- Write (typing) question ---- */
function renderWrite(card,q){
  const area=h('div',{class:'write-area'});
  if(q.prompt) area.appendChild(h('div',{class:'write-prompt'},q.prompt));
  const ta=h('textarea',{class:'write-textarea',placeholder:q.placeholder||'Type your answer here...',rows:'5'});
  area.appendChild(ta);
  const meta=h('div',{class:'write-meta'},[h('span',{id:'wCount'},'0 words'),h('span',{},'Min: '+(q.minWords||3)+' words')]);
  area.appendChild(meta);
  ta.addEventListener('input',()=>{const wc=ta.value.trim().split(/\s+/).filter(w=>w).length;$('#wCount').textContent=wc+' words'});
  const btn=h('button',{class:'write-submit',onclick:()=>{
    const text=ta.value.trim();
    const wc=text.split(/\s+/).filter(w=>w).length;
    if(wc<(q.minWords||2)){$('#fb').className='feedback no';$('#fb').textContent='Write a bit more! You need at least '+(q.minWords||2)+' words.';return}
    btn.disabled=true; ta.disabled=true; clearTimer();
    const result=gradeWriting(text,q);
    quiz.correct+=(result.level>=3?1:0); // Level 3-4 counts as correct
    // Show rubric
    const rubric=h('div',{class:'rubric'});
    const lvNames=['','Needs Work','Getting There','Good Job!','Excellent!'];
    const lvEmoji=['','😊','👍','⭐','🌟'];
    rubric.appendChild(h('div',{class:'rubric-level'},[
      h('div',{class:'rubric-badge lv'+result.level},result.level),
      h('div',{},[h('div',{class:'rubric-title'},lvNames[result.level]+' '+lvEmoji[result.level]),]),
    ]));
    rubric.appendChild(h('div',{class:'rubric-fb'},result.feedback));
    const tags=h('div',{class:'rubric-details'});
    result.checks.forEach(c=>{tags.appendChild(h('span',{class:'rubric-tag '+(c.pass?'pass':'miss')},(c.pass?'✓ ':'✗ ')+c.label))});
    rubric.appendChild(tags);
    area.appendChild(rubric);
    quiz.locked=true;
    showNext();
  }},'Submit Writing ✏️');
  area.appendChild(btn);
  card.appendChild(area);
}

/* Grade writing using heuristic rubric (1-4 scale).
   Checks: word count, capitalization, punctuation, key words, detail/description. */
function gradeWriting(text,q){
  const words=text.trim().split(/\s+/).filter(w=>w);
  const wc=words.length;
  const minW=q.minWords||3;
  const goodW=q.goodWords||(minW*2);
  const startsCapital=/^[A-Z]/.test(text.trim());
  const endsPunct=/[.!?]$/.test(text.trim());
  const hasKeyword=q.keywords?q.keywords.some(kw=>text.toLowerCase().includes(kw.toLowerCase())):true;
  const hasDescriptive=/(very|really|beautiful|amazing|great|wonderful|big|small|happy|sad|because|favorite|love|best|funny|exciting|important|carefully|quickly|slowly)/i.test(text);
  const hasSentences=(text.match(/[.!?]/g)||[]).length;
  const checks=[
    {label:'Enough words ('+minW+'+)',pass:wc>=minW},
    {label:'Starts with capital',pass:startsCapital},
    {label:'Ends with punctuation',pass:endsPunct},
    {label:'Uses topic words',pass:hasKeyword},
  ];
  if(goodW>minW) checks.push({label:'Detailed ('+goodW+'+ words)',pass:wc>=goodW});
  if(q.expectSentences) checks.push({label:'Multiple sentences',pass:hasSentences>=2});
  const passCount=checks.filter(c=>c.pass).length;
  const ratio=passCount/checks.length;
  let level=ratio>=.9?4:ratio>=.7?3:ratio>=.5?2:1;
  // Bonus for descriptive language
  if(hasDescriptive&&level<4) level=Math.min(4,level+1);
  const fbMap={
    1:'Keep trying! Focus on writing more words and using capitals and periods.',
    2:'Good start! Try adding more detail and check your capitals and periods.',
    3:'Nice work! Your writing is clear and follows the rules well.',
    4:'Outstanding writing! Great details, proper grammar, and excellent effort!',
  };
  return {level,feedback:fbMap[level],checks};
}

/* ---- Feedback & Navigation ---- */
const PRAISE=['Awesome! 🌟','You got it!','Great thinking!','High five! ✋','Fantastic!','Well done!'];
const ENCOUR=['Good try!','Try again next time!','Almost!','Nice effort!'];
function setFB(ok){const fb=$('#fb');if(!fb)return;fb.className='feedback '+(ok?'ok':'no');fb.textContent=ok?PRAISE[Math.floor(Math.random()*PRAISE.length)]:ENCOUR[Math.floor(Math.random()*ENCOUR.length)]}
function showNext(){const b=$('#nextBtn');if(!b)return;b.style.display='inline-flex';b.textContent=(quiz.idx+1<quiz.questions.length)?'Next →':'Finish 🎉'}
function nextQ(){
  if(quiz.idx+1<quiz.questions.length){quiz.idx++;quiz.locked=false;renderQ($('.quiz'))}
  else finishActivity();
}

function finishActivity(){
  const a=quiz.activity;
  const scorable=a.questions.filter(q=>q.type!=='lesson').length||1; // 'write' type IS scorable (Level 3-4 = correct)
  const correct=quiz.correct;
  let stars=1;if(correct/scorable>=.5)stars++;if(correct===scorable)stars++;
  const coins=5+(correct===scorable?5:0);
  if(correct===scorable) state.perfectActivities[a.id]=true;
  state.progress[a.id]={best:Math.max((state.progress[a.id]||{}).best||0,correct),attempts:((state.progress[a.id]||{}).attempts||0)+1,done:true};
  state.completedActivities[a.id]=true;
  state.totalStars+=stars;
  state.coins+=coins;
  // Badges
  const td=Object.keys(state.completedActivities).length;
  const pd=Object.keys(state.perfectActivities).length;
  const sc={reading:0,writing:0,math:0,logic:0};
  Object.keys(state.completedActivities).forEach(id=>{const m=id.match(/w\d+-\w+-(r|w|m|l)\d/);if(m){const k={r:'reading',w:'writing',m:'math',l:'logic'}[m[1]];if(k)sc[k]++}});
  if(td>=3)state.badges['first-steps']=true;
  if(state.totalStars>=10)state.badges['ten-stars']=true;
  if(correct===scorable)state.badges['perfect-score']=true;
  if(sc.reading>=5)state.badges['reading-pro']=true;
  if(sc.writing>=5)state.badges['writing-pro']=true;
  if(sc.math>=5)state.badges['math-pro']=true;
  if(sc.logic>=5)state.badges['logic-pro']=true;
  if(state.streak>=3)state.badges['streak-3']=true;
  if(state.coins>=50)state.badges['coin-50']=true;
  if(state.totalStars>=50)state.badges['star-50']=true;
  if(pd>=5)state.badges['perfectionist']=true;
  if(td>=20)state.badges['scholar']=true;
  if(td>=20){let all=true;SUBJECTS.forEach(sub=>{const acts=getWeekActivities(currentUser,sub.id);acts.forEach(a=>{if(!state.completedActivities[a.id])all=false})});if(all)state.badges['week-complete']=true}
  saveState();updateTopbar('activity');
  // Reward overlay
  const pct=correct/scorable;
  const emoji=pct===1?'🏆':pct>=.7?'✨':pct>=.4?'👍':'💪';
  const title=pct===1?'Perfect Score!':pct>=.7?'Awesome!':pct>=.4?'Great Try!':'Keep Going!';
  const msg=pct===1?'Every answer right!':pct>=.7?'Really well done!':pct>=.4?'Nice effort!':'Practice makes perfect!';
  $('#rwEmoji').textContent=emoji;$('#rwTitle').textContent=title;$('#rwMsg').textContent=msg;
  $('#rwStars').textContent='+'+stars;$('#rwCoins').textContent='+'+coins;$('#rwScore').textContent=correct+'/'+scorable;
  $('#reward').classList.add('show');
  if(pct>=.5)confettiBurst(pct===1?100:50);
}

function closeReward(){$('#reward').classList.remove('show')}

/* ========== BADGES ========== */
function renderBadges(root){
  if(!currentUser||!state){go('home');return}
  root.appendChild(h('h2',{style:'margin-top:24px;font-size:22px;font-weight:800'},'🏅 Your Badges'));
  root.appendChild(h('p',{style:'color:var(--ink2);margin:6px 0 18px;font-size:14px'},Object.keys(state.badges).length+' of '+BADGES.length+' unlocked'));
  const grid=h('div',{class:'badges-grid stagger'});
  BADGES.forEach(b=>{
    const got=!!state.badges[b.id];
    grid.appendChild(h('div',{class:'badge'+(got?'':' locked')},[
      h('div',{class:'b-ico'},got?b.icon:'🔒'),
      h('div',{class:'b-name'},b.name),
      h('div',{class:'b-desc'},got?b.desc:'Locked'),
    ]));
  });
  root.appendChild(grid);
}

/* ========== TEACHER DASHBOARD ========== */
function renderTeacher(root){
  const dash=h('div',{class:'t-dash'});
  dash.appendChild(h('h2',{},'📊 Teacher Dashboard'));
  const grid=h('div',{class:'t-grid stagger'});
  STUDENTS.forEach(s=>{
    const ud=getStudentData(s.id);
    const td=Object.keys(ud.completedActivities).length;
    const totalActs=SUBJECTS.reduce((sum,sub)=>sum+getWeekActivities(s.id,sub.id).length,0);
    const pct=totalActs?Math.round(td/totalActs*100):0;
    const card=h('div',{class:'t-student'},[
      h('h3',{},[s.mascot+' '+s.name]),
      h('div',{class:'t-grade'},s.grade),
      h('div',{class:'t-stats'},[
        h('span',{},'⭐ '+ud.totalStars),h('span',{},'🪙 '+ud.coins),
        h('span',{},'🔥 '+ud.streak),h('span',{},'📊 '+pct+'%'),
      ]),
    ]);
    const bars=h('div',{class:'t-subj-bars'});
    SUBJECTS.forEach(sub=>{
      const done=countDone(s.id,sub.id);
      const total=getWeekActivities(s.id,sub.id).length;
      const p=total?Math.round(done/total*100):0;
      const colors={reading:'#0984e3',writing:'#6c5ce7',math:'#e17055',logic:'#00b894'};
      bars.appendChild(h('div',{class:'t-subj-bar'},[
        h('div',{class:'t-bar-label'},[h('span',{},sub.emoji+' '+sub.name),h('span',{},done+'/'+total)]),
        h('div',{class:'t-bar'},[h('i',{style:'width:'+p+'%;background:'+colors[sub.id]})]),
      ]));
    });
    card.appendChild(bars);
    grid.appendChild(card);
  });
  dash.appendChild(grid);
  // Controls
  const ctrl=h('div',{class:'t-controls'},[
    h('button',{class:'btn btn-ghost',onclick:()=>{if(confirm('Export all data as JSON?')){navigator.clipboard.writeText(JSON.stringify(allData,null,2)).then(()=>alert('Copied!'))}}},'📋 Export JSON'),
    h('button',{class:'btn btn-ghost',onclick:()=>{if(confirm('Reset ALL student progress?')){STUDENTS.forEach(s=>{allData.users[s.id]=defaultUser()});saveState();go('teacher')}}},'🔄 Reset All'),
  ]);
  dash.appendChild(ctrl);
  root.appendChild(dash);
}

/* ========== UTILS ========== */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

/* ========== BOOT ========== */
initCloud();
$('#fab').addEventListener('click',()=>go('dashboard'));
$('#rwAgain').addEventListener('click',()=>{closeReward();go('activity',{activityId:quiz.activityId,subject:quiz.subject})});
$('#rwNext').addEventListener('click',()=>{closeReward();go('week',{subject:quiz.subject})});

if(currentUser) go('dashboard');
else go('home');
</script>
