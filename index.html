.dash-store-btn.store{background:linear-gradient(135deg,#ffd166,#ff9f43);color:#5a3200}
.dash-store-btn.orders{background:linear-gradient(135deg,#a0e7e5,#74b9ff);color:#0a3a66}
.dash-store-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:var(--shadow-lg)}
.dash-store-btn .dsb-emoji{font-size:22px}

/* ---- BRAIN BREAK — mini-game dashboard entry + hub + boards ---- */
/* Dashboard tiles (Memory / Quick Math buttons on main screen) */
.brain-break-row{margin-top:14px;display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.brain-break-btn{padding:16px 18px;border-radius:18px;border:none;cursor:pointer;font-weight:800;font-size:15px;display:flex;align-items:center;gap:10px;transition:all .3s var(--spring);box-shadow:var(--shadow);color:#fff;text-align:left}
.brain-break-btn.memory{background:linear-gradient(135deg,#a29bfe,#6c5ce7)}
.brain-break-btn.math{background:linear-gradient(135deg,#74b9ff,#0984e3)}
.brain-break-btn.hub{background:linear-gradient(135deg,#fd79a8,#e84393)}
.brain-break-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:var(--shadow-lg)}
.brain-break-btn .bb-emoji{font-size:22px}
.brain-break-btn .bb-text{flex:1;display:flex;flex-direction:column;line-height:1.15}
.brain-break-btn .bb-sub{font-size:11.5px;font-weight:600;opacity:.85;margin-top:2px}

/* Mini-hub landing screen */
.mini-hub-intro{display:flex;justify-content:center;margin:18px 0 8px}
.mg-coin-meter{margin:8px auto 16px;padding:10px 16px;border-radius:99px;background:rgba(253,203,110,.18);border:1.5px solid #ffd68a;display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;color:#8b5a10}
.mg-coin-meter .mgcm-val{color:#5a3200;font-weight:800}
.mini-hub-note{margin-top:20px;text-align:center;font-size:12.5px;font-weight:600;color:var(--ink3);font-style:italic}

/* Mini-game tile on hub screen */
.mini-games-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:8px}
.mg-tile{background:var(--card);border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);transition:all .35s var(--spring);display:flex;align-items:center;gap:14px;width:100%;position:relative;overflow:hidden;cursor:pointer;text-align:left}
.mg-tile::before{content:'';position:absolute;top:0;left:0;bottom:0;width:5px;transform:scaleY(0);transform-origin:top;transition:transform .3s;border-radius:5px 0 0 5px}
.mg-tile.memory::before{background:linear-gradient(180deg,#a29bfe,#6c5ce7)}
.mg-tile.math::before{background:linear-gradient(180deg,#74b9ff,#0984e3)}
.mg-tile:hover{transform:translateY(-5px) rotate(-.3deg);box-shadow:var(--shadow-lg)}
.mg-tile:hover::before{transform:scaleY(1)}
.mg-tile:hover .mg-ico{transform:scale(1.15) rotate(-8deg)}
.mg-tile .mg-ico{transition:transform .4s var(--spring);width:60px;height:60px;border-radius:18px;display:grid;place-items:center;font-size:32px;flex-shrink:0;border:2px solid #fff;box-shadow:0 8px 18px rgba(26,16,53,.12)}
.mg-tile.memory .mg-ico{background:linear-gradient(135deg,#b6adff,#6c5ce7);color:#fff}
.mg-tile.math .mg-ico{background:linear-gradient(135deg,#91c4f5,#0984e3);color:#fff}
.mg-tile .mg-info{flex:1;min-width:0}
.mg-tile .mg-name{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em}
.mg-tile .mg-desc{font-size:13px;color:var(--ink3);font-weight:600;margin-top:3px}
.mg-tile .mg-best{font-size:12px;color:#8b5a10;font-weight:700;margin-top:5px}
.mg-tile .mg-arrow{font-size:22px;color:var(--ink3);font-weight:800;transition:transform .3s}
.mg-tile:hover .mg-arrow{transform:translateX(4px);color:var(--primary)}

/* In-game difficulty / level picker */
.mg-diff-row{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
.mg-diff{padding:8px 16px;border-radius:99px;border:1.5px solid #e4defa;background:#fff;color:var(--ink2);font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.mg-diff:hover{border-color:var(--primary);color:var(--primary)}
.mg-diff.active{background:linear-gradient(135deg,var(--primary2),var(--primary));color:#fff;border-color:var(--primary);box-shadow:0 6px 14px rgba(108,92,231,.3)}

/* Game stats bar (moves/time/score) */
.mg-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 18px}
.mg-stat{background:var(--card);border-radius:14px;padding:10px 12px;text-align:center;box-shadow:0 4px 10px rgba(26,16,53,.06);border:1.5px solid rgba(255,255,255,.9)}
.mg-label{display:block;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.mg-val{display:block;font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--ink);margin-top:2px}

/* Memory-match card grid */
.mg-board{display:grid;gap:10px;margin:0 auto;max-width:460px}
.mg-board.cols-4{grid-template-columns:repeat(4,1fr)}
.mg-board.cols-3{grid-template-columns:repeat(3,1fr)}
.mg-card{aspect-ratio:1/1;perspective:600px;cursor:pointer}
.mg-card-inner{position:relative;width:100%;height:100%;transition:transform .5s var(--spring);transform-style:preserve-3d}
.mg-card.flipped .mg-card-inner{transform:rotateY(180deg)}
.mg-card-front,.mg-card-back{position:absolute;inset:0;display:grid;place-items:center;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;font-weight:800;border:2px solid #fff;box-shadow:0 6px 14px rgba(26,16,53,.15)}
.mg-card-front{background:linear-gradient(135deg,var(--primary2),var(--primary));color:#fff;font-size:28px;font-family:var(--font-display)}
.mg-card-back{background:#fff;transform:rotateY(180deg);font-size:40px;font-family:'Apple Color Emoji','Segoe UI Emoji',system-ui,sans-serif}
.mg-card.matched .mg-card-back{background:linear-gradient(135deg,#b8f2c6,#55efc4);animation:mgMatch .45s var(--spring)}
.mg-card.matched{pointer-events:none}
.mg-card:not(.flipped):hover .mg-card-inner{transform:scale(1.04) rotate(-1deg)}
@keyframes mgMatch{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.15)}100%{transform:rotateY(180deg) scale(1)}}

/* Quick Math — intro + play area */
.qm-intro{display:flex;flex-direction:column;align-items:center;gap:18px;padding:30px 20px;background:var(--card);border-radius:var(--r-lg);box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,.9);margin:8px 0}
.qm-start-btn{padding:14px 40px;font-size:18px}
.qm-area{animation:fadeSlide .4s var(--spring)}
.qm-status{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.qm-stat{background:var(--card);border-radius:14px;padding:10px 12px;text-align:center;box-shadow:0 4px 10px rgba(26,16,53,.06);border:1.5px solid rgba(255,255,255,.9)}
.qm-problem{font-family:var(--font-display);font-size:48px;font-weight:800;text-align:center;padding:30px 20px;background:linear-gradient(135deg,#eef2ff,#fff);border-radius:var(--r-lg);box-shadow:var(--shadow);border:1.5px solid rgba(255,255,255,.9);margin-bottom:16px;letter-spacing:-.02em;color:var(--ink)}
.qm-choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:420px;margin:0 auto}
.qm-choice{padding:18px;font-size:22px;font-family:var(--font-display);font-weight:800;border-radius:18px;border:2px solid #e4defa;background:#fff;color:var(--ink);cursor:pointer;transition:all .2s;box-shadow:0 4px 10px rgba(26,16,53,.06)}
.qm-choice:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 16px rgba(108,92,231,.2)}
.qm-choice.correct{background:linear-gradient(135deg,#b8f2c6,#55efc4);border-color:#00b894;color:#0a5e3e;animation:mgMatch .4s var(--spring)}
.qm-choice.wrong{background:linear-gradient(135deg,#ffd6e0,#ff9fb3);border-color:#e84393;color:#8b1e4c;animation:mgShake .35s}
@keyframes mgShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Post-game win overlay */
.mg-win-overlay{position:fixed;inset:0;background:rgba(26,16,53,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:grid;place-items:center;z-index:1000;animation:fadeSlide .3s ease}
.mg-win-card{background:var(--card);border-radius:var(--r-lg);padding:32px 28px;max-width:360px;width:calc(100% - 32px);text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.9);animation:winPop .5s var(--spring)}
@keyframes winPop{0%{transform:scale(.7) translateY(20px);opacity:0}60%{transform:scale(1.05) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
.mg-win-title{font-family:var(--font-display);font-size:26px;font-weight:800;margin:14px 0 8px;color:var(--ink);letter-spacing:-.01em}
.mg-win-stars{display:flex;justify-content:center;gap:8px;margin:6px 0 14px}
.mg-star{font-size:34px;filter:grayscale(1) opacity(.35);transition:all .4s var(--spring)}
.mg-star.lit{filter:none;animation:starPop .5s var(--spring) both}
.mg-star.lit:nth-child(1){animation-delay:.1s}
.mg-star.lit:nth-child(2){animation-delay:.25s}
.mg-star.lit:nth-child(3){animation-delay:.4s}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.mg-win-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;margin:10px 0 14px}
.mg-win-stat{background:rgba(108,92,231,.08);border-radius:14px;padding:10px 8px}
.mg-win-stat .mgws-val{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--primary)}
.mg-win-stat .mgws-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.mg-win-coins{font-family:var(--font-display);font-size:20px;font-weight:800;color:#b56820;margin:8px 0;padding:10px;background:rgba(253,203,110,.2);border-radius:14px;border:1.5px solid #ffd68a}
.mg-win-best{font-size:13px;font-weight:800;color:#0a7b5a;margin:4px 0 10px;letter-spacing:.2px}
.mg-win-buttons{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.mg-win-buttons .btn{width:100%}

/* ---- SAVE-UP PROGRESS + NUDGES + WISHLIST ---- */
.save-row{margin-top:4px}
.save-bar-wrap{height:8px;border-radius:99px;background:rgba(0,0,0,.08);overflow:hidden;position:relative}
.save-bar{display:block;height:100%;border-radius:99px;transition:width 1s var(--spring);background:linear-gradient(90deg,#ffd166,#ff9f43);position:relative;overflow:hidden}
.save-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);transform:translateX(-100%);animation:shimmer 2.2s ease-in-out infinite}
.save-bar.ready{background:linear-gradient(90deg,#55efc4,#00b894)}
.save-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px;font-size:11px;font-weight:700;color:var(--ink3)}
.save-meta .save-count{color:var(--ink2)}
.save-meta .save-ready{color:#0a7b5a}
.nudge{margin-top:4px;font-size:11.5px;font-weight:700;color:#b56820;font-style:italic}
.nudge.ready{color:#0a7b5a;font-style:normal}

/* Wishlist heart (on item card) */
.wish-btn{position:absolute;top:10px;left:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.95);display:grid;place-items:center;font-size:16px;cursor:pointer;transition:all .25s var(--spring);border:2px solid rgba(0,0,0,.05);box-shadow:0 4px 10px rgba(0,0,0,.1);z-index:3}
.wish-btn:hover{transform:scale(1.15) rotate(-8deg);background:#fff0f6;border-color:#ffb0cc}
.wish-btn.on{background:linear-gradient(135deg,#ff6b9d,#ff4081);color:#fff;border-color:#fff;animation:heartPop .5s var(--spring)}
@keyframes heartPop{0%{transform:scale(1)}30%{transform:scale(1.35) rotate(-10deg)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.wish-ribbon{position:absolute;top:14px;right:-6px;font-size:10.5px;font-weight:800;padding:3px 10px 3px 12px;background:linear-gradient(90deg,#ff6b9d,#ff4081);color:#fff;border-radius:4px 0 0 4px;box-shadow:0 3px 8px rgba(255,64,129,.35);z-index:2;letter-spacing:.3px}
.wish-ribbon::after{content:'';position:absolute;top:100%;right:0;width:0;height:0;border-top:4px solid #c92a5c;border-right:6px solid transparent}

/* Wishlist toast */
.wish-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2c2c40;color:#fff;padding:12px 22px;border-radius:999px;font-weight:800;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:250;animation:toastIn .25s var(--spring);display:flex;align-items:center;gap:8px}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(15px)}to{opacity:1;transform:translateX(-50%)}}
.wish-toast.out{animation:toastOut .25s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(15px)}}

/* Wishlist section */
.wish-section{margin-top:20px;padding:20px;background:linear-gradient(135deg,rgba(255,107,157,.06),rgba(253,203,110,.06));border:1px solid rgba(255,107,157,.15);border-radius:20px}
.wish-section h3{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.wish-section .wish-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:14px}
.wish-empty{padding:24px;text-align:center;color:var(--ink3);font-weight:600;font-size:14px}

/* Teacher: wishlist insights */
.t-wish{margin-top:26px;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.t-wish h3{font-size:16px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.t-wish-sub{font-size:12px;color:var(--ink3);font-weight:600;margin-bottom:12px}
.t-wish-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.t-wish-card{background:#fafaff;border:1px solid var(--line);border-radius:12px;padding:12px}
.t-wish-card .twc-head{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.t-wish-card .twc-list{display:flex;flex-direction:column;gap:6px}
.t-wish-card .twc-item{font-size:12px;font-weight:700;color:var(--ink2);display:flex;justify-content:space-between;gap:6px;padding:6px 10px;background:#fff;border-radius:8px;border:1px solid var(--line)}
.t-wish-card .twc-item .twc-prog{font-size:10.5px;color:var(--ink3);font-weight:700}
.t-wish-empty{font-size:12px;color:var(--ink3);font-style:italic}
.t-wish-top{margin-top:14px;padding:12px;background:linear-gradient(135deg,#fff5ec,#fff0f6);border-radius:12px;border:1px solid rgba(255,107,157,.15)}
.t-wish-top h4{font-size:13px;font-weight:800;color:var(--ink2);margin-bottom:6px}
.t-wish-top-list{display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;color:var(--ink2)}
.t-wish-top-list span.cnt{background:rgba(255,64,129,.15);color:#c92a5c;padding:2px 8px;border-radius:999px;font-size:11px}

/* ---- BADGES ---- */
/* Fixed minimum height + flex column = every badge tile is the SAME size.
   Lock + name + desc vertically aligned across the grid, no matter whether
   a name wraps to 1 or 2 lines. */
.badges-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.badge{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 14px;text-align:center;box-shadow:var(--shadow);transition:all .3s var(--spring);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:150px}
.badge:hover{transform:translateY(-3px)}
.badge .b-ico{font-size:36px;margin:0 0 6px;line-height:1}
.badge.locked .b-ico{filter:grayscale(1);opacity:.4}
.badge .b-name{font-size:14px;font-weight:800;line-height:1.2;min-height:34px;display:flex;align-items:center;justify-content:center}
.badge .b-desc{font-size:12px;color:var(--ink3);margin-top:auto;padding-top:6px;line-height:1.3}

/* ---- FOOTER ---- */
.footer{margin-top:40px;text-align:center;padding:18px;font-size:13px;color:var(--ink3)}
.footer .brand-footer{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;background:var(--card);font-weight:700;font-size:14px;color:var(--ink);box-shadow:var(--shadow);border:1px solid var(--line)}

/* ---- FLOATING HOME ---- */
.fab{position:fixed;bottom:20px;right:20px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--sky));color:#fff;display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow-lg),0 0 0 0 rgba(108,92,231,.4);border:3px solid #fff;z-index:50;transition:all .3s var(--spring);animation:fabPulse 3s ease-in-out infinite}
.fab:hover{transform:scale(1.1) rotate(-8deg)}
.fab.hidden{display:none}
@keyframes fabPulse{0%,100%{box-shadow:var(--shadow-lg),0 0 0 0 rgba(108,92,231,.4)}50%{box-shadow:var(--shadow-lg),0 0 0 14px rgba(108,92,231,0)}}

/* Confetti */
.confetti{position:fixed;top:-20px;width:10px;height:14px;z-index:200;border-radius:2px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.3}}

/* Mobile */
@media(max-width:640px){
  .app{padding:12px 12px 100px}
  .topbar{padding:10px 12px;border-radius:20px}
  .brand{font-size:17px}
  .nav-btn{padding:7px 10px;font-size:13px}
  .dash-hero{padding:20px}
  .dash-hero .av{width:72px;height:72px;font-size:38px;border-radius:22px}
  .fab{width:52px;height:52px;font-size:20px;bottom:14px;right:14px}
  .emoji-pad{grid-template-columns:repeat(3,1fr);max-width:260px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
<!-- EmailJS SDK (optional) — only sends if keys are configured in EMAIL_CONFIG.
     Safe to leave loaded even when unconfigured: no requests fire without keys. -->

<body>
<div class="bg-mesh"></div>
<div class="app">
  <header class="topbar">
    <div class="brand"><span class="logo" aria-label="KidQuest logo"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2c2.5 2.5 4 5.5 4 9v6l-2 2h-4l-2-2v-6c0-3.5 1.5-6.5 4-9z"/><circle cx="12" cy="10" r="1.8"/><path d="M8 14l-3 4v2l3-1M16 14l3 4v2l-3-1"/></svg></span><span class="brand-text">KidQuest</span></div>
    <nav id="nav"></nav>
    <div class="pills" id="pills"></div>
  </header>
  <main id="screen"></main>
  <footer class="footer">
    <div class="brand-footer">KidQuest v1.0 · Built by Rhahavy</div>
  </footer>
</div>
<button id="fab" class="fab hidden" title="Home" aria-label="Go home"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V20a1.5 1.5 0 0 1-1.5 1.5h-4v-6h-7v6h-4A1.5 1.5 0 0 1 3 20Z"/></svg></button>
<!-- Reward overlay is hidden by default. Only shown via JS after activity completion. -->
<div class="reward-overlay" id="reward" style="display:none" aria-hidden="true">
  <div class="reward-card">
    <!-- Nova pep talk — populated by JS in the activity completion flow. -->
    <div class="rw-mascot" id="rwMascot"></div>
    <div class="big-emoji" id="rwEmoji"></div>
    <h2 id="rwTitle"></h2>
    <p class="msg" id="rwMsg"></p>
    <div class="reward-stats">
      <span><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="vertical-align:-2px"><path d="m12 2.6 2.9 5.9 6.5.9-4.7 4.6 1.1 6.4L12 17.4l-5.8 3 1.1-6.4L2.6 9.4l6.5-.9Z"/></svg> <b id="rwStars">0</b></span>
      <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5h4.5a2 2 0 0 1 0 4H9"/></svg> <b id="rwCoins">0</b></span>
      <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg> <b id="rwScore">0/0</b></span>
    </div>
    <div class="controls">
      <button class="btn btn-ghost" id="rwAgain">🔁 Play Again</button>
      <button class="btn btn-primary" id="rwNext">Continue →</button>
    </div>
  </div>
</div>
<!-- Decorative floating background shapes -->
<div class="bg-shapes" aria-hidden="true">
  <span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span>
  <span class="blob b4"></span><span class="blob b5"></span>
  <span class="sparkle s1"></span><span class="sparkle s2 lg"></span><span class="sparkle s3"></span><span class="sparkle s4 sm"></span>
  <span class="sparkle s5"></span><span class="sparkle s6 sm"></span><span class="sparkle s7 lg"></span><span class="sparkle s8"></span>
  <span class="sparkle s9 sm"></span><span class="sparkle s10"></span><span class="sparkle s11 sm"></span><span class="sparkle s12 lg"></span>
</div>
<script>
/* ============================================================
   KIDQUEST — Main Application Logic
   ============================================================
   Built by Rhahavy
   
   HOW TO CUSTOMIZE:
   - Student emoji PINs: search for STUDENT_PINS below
   - Teacher password: search for TEACHER_CREDS below
   - Add new weeks: add to the WEEKS object (Week 2, 3, etc.)
   - Add new students: add to STUDENTS array + WEEKS data
   - Cloud sync: change CLOUD_BUCKET below
   ============================================================ */

/* ========== SVG ICON SYSTEM ==========
   Clean inline SVGs instead of emojis for UI chrome.
   Usage: icon('star',20) returns an <svg> element. */
const ICON_PATHS = {
  book:'<path d="M4 4.5A1.5 1.5 0 0 1 5.5 3H20v16H6.5a1.5 1.5 0 0 0 0 3H20"/><path d="M8 7h8M8 11h6"/>',

function icon(name,size){
  size=size||20;
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width',size);s.setAttribute('height',size);
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','2');
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  s.style.display='inline-block';s.style.verticalAlign='-0.125em';s.style.flexShrink='0';
  s.innerHTML=ICON_PATHS[name]||'';
  return s;
}

/* ══════════════════════════════════════════════════════════════════════════
   📘 AUTHOR'S GUIDE — how to grow KidQuest over time
   ══════════════════════════════════════════════════════════════════════════

   ADD A NEW STUDENT
   ─────────────────
   Add one entry to the STUDENTS array below. The card colour auto-generates
   from `colorLight` + `colorDark` — no CSS edits needed. Example:

     { id:'taya', name:'Taya', grade:'Grade 4', initial:'T',
       decoEmoji:'🎧', pin:'🎵', hint:'(m_sic)',
       colorLight:'#ffd54f', colorDark:'#f39c12' },

   Then add their 5-per-subject activities to WEEKS[1].taya (see next section).
   That's the ONLY two places you edit.

   ADD NEW LESSONS TO AN EXISTING STUDENT
   ──────────────────────────────────────
   Find the student's subject array in the WEEKS block further down the file,
   e.g. `WEEKS[1].isaiah.math = [ … ]`. Each lesson is one object:

     { id:'w1-<student>-<subjletter><num>', title:'...', emoji:'...',
       lesson:{ title, intro, example OR stack OR pictures, hint, steps? },
       questions:[ 5 question objects ] }

   Subject letters: r=reading, w=writing, m=math, l=logic, f=french,
                     s=science, c=social (Canadian).
   Question types: 'mcq' | 'passage' | 'fill' | 'match' | 'order' | 'compare' | 'write'.
   Activities past Level 5 auto-appear as LOCKED until the student finishes
   Level 5 in ALL subjects (the cross-subject gating kicks in automatically).

   EMBED KID-SAFE VIDEOS ON A LESSON
   ─────────────────────────────────
   Add a `videoIds: ['yt_ID_1', 'yt_ID_2']` field to any activity object.
   The video(s) render as INLINE embedded iframes (via youtube-nocookie.com
   with rel=0) — kids watch IN the app, never get sent to YouTube.com's
   search page or recommendation feed. Max 2 videos per lesson.

   To find a YouTube video ID: open the video on YouTube, copy the part
   after `v=` in the URL. Example: youtube.com/watch?v=dQw4w9WgXcQ → ID is
   `dQw4w9WgXcQ`. Recommended kid-safe channels to curate from:
     • SciShow Kids · Numberock · Homeschool Pop · Khan Academy Kids
     • Storyline Online · CrashCourse Kids · Peekaboo Kids · Scratch Garden
   If no `videoIds` is set on a lesson, no video block is shown.

   ADD NEW STORE REWARDS
   ─────────────────────
   Edit STORE_ITEMS in the store section. Each item is one object.

   ADD NEW SUBJECTS
   ────────────────
   Edit SUBJECTS array. If you add a new subject with a new letter prefix,
   also update the regex in finishActivity (search for "r|w|m|l|f|s|c").

   DATA SAFETY
   ───────────
   DO NOT change APP_VERSION unless you're changing the data SHAPE (new
   fields on users, etc.). Routine content edits never need a version bump
   and never erase student progress.

   BACK UP STUDENT DATA
   ────────────────────
   Teacher Dashboard has "📋 Export JSON" (copy all state to clipboard) and
   "📥 Import JSON" (paste a backup to restore). Use before big changes.
   ══════════════════════════════════════════════════════════════════════════ */

   when you add a new one. Runs once at module load. */
(function injectStudentStyles(){
  const css = STUDENTS.map(s=>{
    const lg = s.colorLight || s.colorDark || '#a29bfe';

    return ''
      + '.profile-card.c-'+s.id+'::before{background:linear-gradient(90deg,'+lg+','+dk+')}\n'
      + '.c-'+s.id+' .avatar{background:linear-gradient(135deg,'+lg+','+dk+')}\n';
  }).join('');
  const style = document.createElement('style');
  style.id = 'kidquest-student-styles';
  style.textContent = css;
  document.head.appendChild(style);
})();

        '<b>Step 1 — Evaporation:</b> the sun heats water in oceans, lakes, and puddles. The water turns into invisible vapor and rises into the sky.',

/* ---- ISAIAH (Grade 5 — working at G4 level with G5 stretch) ----

isaiah: {
  reading: [
    { id:'w1-isaiah-r1', title:'Main Idea & Details', emoji:'📚', videoIds:['XjR2B3YJH9U'],
      lesson:{title:'Finding the Main Idea',visual:'🐘 🌳',intro:'The MAIN IDEA is what a passage is MOSTLY about. Supporting DETAILS are smaller facts that help explain the main idea.',example:'If a passage is mostly about how elephants find food — that\'s the main idea. Details = WHAT they eat, WHERE they find it, HOW.',steps:[
        '<b>Read the whole passage</b> once, no stopping.',
        '<b>Ask yourself:</b> "What is this mostly about?" Try to answer in one sentence.',
        '<b>Check the answer choices</b> — pick the one that matches your one-sentence summary.',
        '<b>Details</b> (dates, names, specific facts) are <i>supporting</i> — they help prove the main idea but aren\'t the main idea themselves.',
      ],hint:'Ask: "If I had to tell someone this passage in one sentence, what would I say?"'},
      questions:[
        {type:'passage',passage:'Octopuses are amazing problem-solvers. They can unscrew jar lids to get food inside. They also remember which shapes mean food and which do not. Scientists have even watched them escape from their tanks by lifting the lid and climbing out.',visual:'🐙',q:'What is the main idea?',choices:['🐠 Octopuses live in tanks','🧠 Octopuses are smart problem-solvers','🫙 Octopuses like jars','🔬 Scientists study animals'],answer:1},
        {type:'mcq',q:'Which sentence is a SUPPORTING DETAIL in the passage above?',choices:['🐙 Octopuses are smart','🫙 They unscrew jar lids to get food','🐾 Animals are interesting','🌊 The ocean is deep'],answer:1},
        {type:'passage',passage:'Beavers build dams to make ponds where they can live. They use their strong teeth to cut down trees. They drag logs into streams to block the water. These dams can change entire forests!',visual:'🦫',q:'What is this passage mostly about?',choices:['🌲 Why trees are tall','🏗️ How beavers build dams','🌳 What forests look like','💧 How water flows'],answer:1},
        {type:'mcq',q:'A supporting detail is a...',choices:['💡 Big idea in the passage','📎 Fact that helps explain the main idea','❓ Question about the text','📝 Title'],answer:1},
        {type:'mcq',q:'If a story is mostly about a lost puppy finding home, the main idea is about...',choices:['🐕 The puppy\'s journey home','☁️ The weather','🏠 A house','🦴 Dog food'],answer:0},
      ]},
    { id:'w1-isaiah-r2', title:'Cause & Effect', emoji:'🔗', videoIds:['QVw521JjRjA'],
      lesson:{title:'Cause → Effect',visual:'🌧️ ➡️ ☂️',intro:'A CAUSE is WHY something happens. An EFFECT is WHAT happens because of it. They are linked by words like "because", "so", "since", "as a result".',example:'CAUSE: It rained all night. EFFECT: The soccer game was cancelled. ("It rained, SO the game was cancelled.")',hint:'Ask: "What made this happen?" = cause. "What happened because of that?" = effect.'},
      questions:[
        {type:'mcq',q:'"Ella forgot her umbrella, so she got soaked." What is the CAUSE?',choices:['💦 She got soaked','☂️ She forgot her umbrella','🌧️ It was raining','🚶 She was walking'],answer:1},
        {type:'mcq',q:'"The ice cream melted because it was left in the sun." What is the EFFECT?',choices:['☀️ It was in the sun','🔥 It was hot outside','🍦 The ice cream melted','☀️ Summer'],answer:2},
        {type:'passage',passage:'Liam stayed up late reading his new book. The next morning, he was so tired he fell asleep during math class. His teacher sent a note home.',visual:'😴',q:'Why did Liam fall asleep in class?',choices:['😑 Math was boring','📚 He stayed up late reading','😠 His teacher was mean','🍳 He skipped breakfast'],answer:1},
        {type:'mcq',q:'Which word signals a CAUSE-EFFECT relationship?',choices:['❓ Maybe','➡️ Because','⚡ Suddenly','♾️ Always'],answer:1},
        {type:'mcq',q:'"The leaves turned orange since it was autumn." What happened BECAUSE of autumn?',choices:['🍂 The leaves turned orange','🌳 The trees grew','☁️ The sky changed','🐻 Animals hibernated'],answer:0},
      ]},
    { id:'w1-isaiah-r3', title:'Reading Between the Lines', emoji:'🔍', videoIds:['WrUX6j9MwUY'],
      lesson:{title:'Making Inferences',visual:'🔍 💭',intro:'An INFERENCE is a smart guess based on clues in the text — things the author doesn\'t say directly. You combine the clues with what you already know.',example:'TEXT: "Maya walked in with muddy boots and dripping clothes." CLUES → muddy + dripping. INFERENCE: It\'s raining outside (even though the text never says "rain").',steps:[
        '<b>Read carefully</b> and notice small details (what characters do, say, wear, feel).',
        '<b>List the clues</b> in your head — what facts is the author showing you?',
        '<b>Think about what you already know</b> about the world (real-life experience).',
        '<b>Combine clues + knowledge</b> to make a smart guess.',
        '<b>Check the answer choices</b> — pick the one your clues BEST support.',
      ],hint:'Detectives use clues to figure out what happened. You can do the same with text!'},
      questions:[
        {type:'passage',passage:'Jaden zipped up his coat, pulled his hat down over his ears, and wrapped his scarf around his neck. His breath made little clouds as he stepped outside.',visual:'🧣',q:'What can you INFER about the weather?',choices:['☀️ It\'s hot','🌧️ It\'s raining','❄️ It\'s cold','💨 It\'s windy'],answer:2},
        {type:'passage',passage:'Maya\'s hands were shaking as she walked up to the stage. Her stomach felt like it was full of butterflies. She could hear hundreds of people in the audience.',visual:'🎤',q:'How is Maya most likely feeling?',choices:['🎉 Excited about a party','😰 Nervous about performing','🍽️ Hungry for lunch','😴 Tired and sleepy'],answer:1},
        {type:'passage',passage:'When Dad opened the fridge, he just sighed. The milk was empty, the bread was gone, and there was only half an apple left.',visual:'🛒',q:'What can you infer about the family\'s next activity?',choices:['💤 They\'ll take a nap','🛒 They need to go grocery shopping','🏃 They\'ll play outside','📺 They\'ll watch TV'],answer:1},
        {type:'passage',passage:'The dog\'s tail wouldn\'t stop wagging. He spun in circles by the door, grabbing his leash in his mouth.',visual:'🐕',q:'What does the dog want?',choices:['🦴 Food','🛁 A bath','🚶 To go for a walk','💤 To sleep'],answer:2},
        {type:'mcq',q:'To make an inference, you...',choices:['🎲 Guess randomly','📖 Read the title only','🕵️ Use text clues + what you know','⏭️ Skip ahead'],answer:2},
      ]},
    { id:'w1-isaiah-r4', title:'Author\'s Purpose', emoji:'✍️', videoIds:['klu7TNy-7qw'],
      lesson:{title:'Why Did the Author Write It?',visual:'✍️ 💡',intro:'Every piece of writing has a PURPOSE. Remember PIE: Persuade, Inform, or Entertain.',example:'PERSUADE: a letter trying to convince you to eat veggies · INFORM: an encyclopedia page about volcanoes · ENTERTAIN: a funny story about a talking cat.',hint:'Ask: Is the author trying to convince me, teach me, or make me enjoy a story?'},

        {type:'mcq',q:'A funny short story about a dragon is mostly meant to...',choices:['📰 Inform','🗣️ Persuade','🎭 Entertain','⚖️ Argue'],answer:2},
        {type:'passage',passage:'Recycling helps our planet. When we recycle, less trash goes to landfills. Join our school\'s recycling club and make a difference today!',visual:'♻️',q:'What is the author\'s purpose?',choices:['📰 To inform only','♻️ To persuade readers to recycle','📖 To tell a story','🏞️ To describe a place'],answer:1},
        {type:'mcq',q:'Which is MOST likely meant to inform?',choices:['😂 A joke book','🧸 A poster selling toys','🪐 An article about how planets orbit the sun','🧚 A fairy tale'],answer:2},

        {type:'mcq',q:'A good summary should be:',choices:['📜 Longer than the original','✂️ Short and cover the main idea','🎬 Just the last sentence','📋 Word-for-word copy'],answer:1},
        {type:'passage',passage:'Bees are tiny but very important. They fly from flower to flower collecting nectar, and as they do, pollen sticks to their bodies. This pollen helps plants make seeds and grow fruit. Without bees, we would have much less food. Right now, bee populations are dropping, which is a big problem for farmers and everyone who likes fruit and vegetables.',visual:'🐝',q:'Best summary?',choices:['🐝 Bees fly','🌸 Bees pollinate plants, which helps grow food — and their numbers are dropping','👨‍🌾 Farmers use bees','🟡 Pollen is yellow'],answer:1},

      lesson:{title:'The Topic Sentence',visual:'📝 🎯',intro:'Every paragraph needs a TOPIC SENTENCE — the first (or main) sentence that tells the reader what the paragraph is about.',example:'Topic: My dog Max loves swimming. → The rest of the paragraph can then give examples: "He jumps in the pool, chases toys in the water, and splashes everywhere."',steps:[

    { id:'w1-isaiah-w4', title:'Full Paragraph: TSDC', emoji:'📝',
      lesson:{title:'Topic-Support-Detail-Closing',visual:'📝 🧱',intro:'A great paragraph has four parts: Topic sentence (main idea), Supporting sentences (2-3 reasons or examples), Details (facts or description), Closing sentence (wrap it up).',example:'T: Dogs are great pets. S: They are loyal companions and also easy to train. D: My dog, Buddy, learned "sit" and "stay" in just two weeks. C: For these reasons, dogs make wonderful family members.',steps:[
        '<b>T — Topic sentence:</b> announce what the paragraph is about in ONE sentence.',
        '<b>S — Supporting sentences:</b> give 2–3 reasons or examples that back up your topic.',
        '<b>D — Details:</b> add specific facts, descriptions, or a personal example to make it real.',
        '<b>C — Closing sentence:</b> wrap it up. Often starts with "For these reasons..." or "In short...".',
      ],hint:'TSDC is a recipe! Follow the four steps and your paragraph will feel complete and strong.'},

        {type:'mcq',q:'Which is a good CLOSING sentence for a paragraph about why summer is fun?',choices:['Winter is cold','In short, summer is the best season because of these reasons','My dog is furry','Sentences end with periods'],answer:1},
        {type:'mcq',q:'A paragraph without a closing sentence feels:',choices:['Finished','Unfinished / cut off','Too long','Too bright'],answer:1},
      ]},

    { id:'w1-isaiah-w5', title:'Opinion Essay (G5 Stretch!)', emoji:'🌟',
      lesson:{title:'Short Opinion Essay',visual:'💭 ✍️',intro:'An OPINION ESSAY shares what you think AND why. Structure: Intro (your opinion), 2-3 reasons (each with evidence), Conclusion (restate and wrap up).',example:'INTRO: Recess should be longer. REASON 1: Kids focus better after breaks. REASON 2: Physical activity helps learning. REASON 3: Friendships grow at recess. CONCLUSION: For these reasons, a longer recess would help everyone.',steps:[

        '<b>Reason 3 (optional):</b> a third reason for even stronger arguments.',

    { id:'w1-isaiah-l5', title:'Pattern Rules (G5 Stretch!)', emoji:'🌟',
      lesson:{title:'Finding the Rule in a Pattern',intro:'Advanced patterns aren\'t just "add 2" — sometimes the rule is multiply, square, alternate, or involve a mix. Look at HOW each number/item changes.',example:'2, 4, 8, 16, 32 — rule is DOUBLE each time. Or: 1, 4, 9, 16, 25 — rule is SQUARES (1², 2², 3², 4², 5²).',steps:[

/* Safely load stored data. If version mismatch or corrupt, wipe and start fresh. */
function nukeBadData(reason){
  console.warn('[KidQuest] Resetting local state:', reason);
  try{localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(LOCAL_USER_KEY);}catch(e){}
  try{localStorage.setItem(VERSION_KEY,String(APP_VERSION));}catch(e){}
}
let allData = (function(){
  // Version check — clear incompatible data from previous KidQuest versions
  try{
    const sv = parseInt(localStorage.getItem(VERSION_KEY)||'0',10);
    if(sv !== APP_VERSION){ nukeBadData('version mismatch ('+sv+' vs '+APP_VERSION+')'); return defaultAll(); }
  }catch(e){ nukeBadData('version check failed'); return defaultAll(); }

  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultAll();
    const p = JSON.parse(raw);
    // Validate structure — must have users object with our 4 known ids
    if(!p || typeof p !== 'object' || !p.users || typeof p.users !== 'object'){
      nukeBadData('invalid stored shape'); return defaultAll();
    }
    const d = defaultAll();
    STUDENTS.forEach(s=>{
      const u = p.users[s.id];
      if(u && typeof u === 'object') d.users[s.id] = Object.assign(defaultUser(), u);
    });
    d.teacher = (p.teacher && typeof p.teacher === 'object') ? p.teacher : {lastLogin:0};
    d.orders = Array.isArray(p.orders) ? p.orders : [];
    d.catalogOverrides = (p.catalogOverrides && typeof p.catalogOverrides==='object') ? p.catalogOverrides : {};
    if(p.maintenance && typeof p.maintenance==='object'){
      d.maintenance = {
        active: !!p.maintenance.active,
        message: typeof p.maintenance.message === 'string' && p.maintenance.message.trim() ? p.maintenance.message : DEFAULT_MAINTENANCE_MESSAGE,
        updatedAt: typeof p.maintenance.updatedAt === 'number' ? p.maintenance.updatedAt : 0,
      };
    }
    d.updatedAt = typeof p.updatedAt === 'number' ? p.updatedAt : 0;
    return d;
  }catch(e){
    nukeBadData('JSON parse error: '+e.message);
    return defaultAll();
  }
})();

/* ========== CLOUD SYNC ========== */
let cloudReady=false, cloudBusy=false, pendingWrite=null;
function initCloud(){
  pullCloud(true).then(()=>{cloudReady=true}).catch(()=>{});
  setInterval(()=>pullCloud(false),POLL_MS);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)pullCloud(false)});
}
async function pullCloud(init){
  try{
    const r=await fetch(CLOUD_URL+'?_='+Date.now(),{cache:'no-store'});if(!r.ok)throw 0;
    const t=await r.text();if(!t)return;
    const d=JSON.parse(t);if(!d||!d.users)return;
    if((d.updatedAt||0)<=(allData.updatedAt||0))return;
    STUDENTS.forEach(s=>{allData.users[s.id]=Object.assign(defaultUser(),d.users[s.id]||{})});
    if(Array.isArray(d.orders))allData.orders=d.orders;
    if(d.catalogOverrides&&typeof d.catalogOverrides==='object')allData.catalogOverrides=d.catalogOverrides;
    // Maintenance state — sync so kids on other devices see the gate flip
    if(d.maintenance&&typeof d.maintenance==='object'){
      allData.maintenance={
        active: !!d.maintenance.active,
        message: typeof d.maintenance.message==='string'&&d.maintenance.message.trim() ? d.maintenance.message : DEFAULT_MAINTENANCE_MESSAGE,
        updatedAt: typeof d.maintenance.updatedAt==='number' ? d.maintenance.updatedAt : 0,
      };
    }
    allData.updatedAt=d.updatedAt;
    if(currentUser)state=allData.users[currentUser];
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(allData))}catch(e){}
    // If maintenance just turned ON (and we're not bypassed), hijack the screen.
    // Unless kid is mid-activity — let them finish, they'll gate on next screen change.
    if(!init && allData.maintenance && allData.maintenance.active && !isMaintenanceBypassed() && !isTeacher && currentScreen!=='activity'){
      renderMaintenanceScreen();
      return;
    }
    if(!init&&currentScreen&&currentScreen!=='activity')go(currentScreen,currentOpts);
  }catch(e){if(init)throw e}
}
async function syncToCloud(){
  if(cloudBusy){pendingWrite=true;return}cloudBusy=true;
  try{await fetch(CLOUD_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(allData)})}catch(e){}
  cloudBusy=false;if(pendingWrite){pendingWrite=false;syncToCloud()}
}

}

/* ==========================================================================
   PERSONALITY — rotating cheer lines from Nova
   --------------------------------------------------------------------------
   Time-of-day greetings + random pep talks. Deterministic per-day so a kid
   sees the SAME greeting if they reload the dashboard (less jarring).
   ========================================================================== */
const NOVA_GREETINGS_MORNING = [
  "Morning, explorer! 🌅",
  "Good morning! Ready to learn?",
  "Rise and quest! Today's going to be awesome.",
  "Up with the sun? Love that energy!",
];
const NOVA_GREETINGS_AFTERNOON = [
  "Afternoon adventure time!",
  "Hey there! Let's tackle something fun.",
  "Welcome back, brain builder!",
  "Ready for a challenge?",
];
const NOVA_GREETINGS_EVENING = [
  "Evening session — nice!",
  "Let's end the day smart.",
  "One more quest before bed?",
  "Night owl mode: activated.",
];
function dailySeed(salt){
  // Deterministic per-day int — same kid sees same greeting across reloads
  const d = new Date();
  const key = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
  let n = key + (salt ? salt.split('').reduce((a,c)=>a+c.charCodeAt(0),0) : 0);
  // Mulberry32-ish — not cryptographic, just stable
  n |= 0; n = n + 0x6D2B79F5 | 0; let t = Math.imul(n ^ n>>>15, 1|n); t = t + Math.imul(t ^ t>>>7, 61|t) ^ t; return ((t^t>>>14)>>>0);
}
function pickNovaGreeting(userId){
  const hr = new Date().getHours();
  const pool = hr < 12 ? NOVA_GREETINGS_MORNING
             : hr < 18 ? NOVA_GREETINGS_AFTERNOON
             :          NOVA_GREETINGS_EVENING;
  return pool[dailySeed(userId||'') % pool.length];
}

/* ==========================================================================
   DAILY MISSION — 2 activities per day, refreshes at midnight
   --------------------------------------------------------------------------
   Deterministic pick from uncompleted activities (stable per kid per day).
   State lives on user.dailyMission = {date, activityIds, completed[]}.
   ========================================================================== */
function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function ensureDailyMission(userId){
  const ud = allData.users[userId]; if(!ud) return null;
  const today = todayKey();
  const cur = ud.dailyMission;
  if(cur && cur.date === today && Array.isArray(cur.activityIds) && cur.activityIds.length) return cur;
  // Build a fresh mission — pick 2 uncompleted activities across subjects
  const pool = [];
  SUBJECTS.forEach(sub=>{
    const acts = getWeekActivities(userId, sub.id) || [];
    acts.forEach(a=>{
      if(!a || !a.id) return;
      if(ud.completedActivities && ud.completedActivities[a.id]) return;
      pool.push({ id:a.id, title:a.title, emoji:a.emoji, subject:sub.id, subjectName:sub.name });
    });
  });
  let picks;
  if(pool.length <= 2){
    picks = pool.slice(0,2);
  } else {
    // Seeded shuffle by date+userId
    const seed = dailySeed(userId);
    const shuffled = pool.slice();
    for(let i=shuffled.length-1;i>0;i--){
      const j = (seed + i*2654435761) % (i+1);
      const jj = ((j%(i+1))+(i+1))%(i+1);
      const tmp = shuffled[i]; shuffled[i]=shuffled[jj]; shuffled[jj]=tmp;
    }
    picks = shuffled.slice(0,2);
    // Prefer 2 DIFFERENT subjects if possible
    if(picks.length===2 && picks[0].subject===picks[1].subject){
      const other = shuffled.find(x=>x.subject!==picks[0].subject);
      if(other) picks[1] = other;
    }
  }
  ud.dailyMission = {
    date: today,
    activityIds: picks.map(p=>p.id),
    completed: [],
  };
  saveState();
  return ud.dailyMission;
}
function markDailyMissionProgress(activityId){
  if(!currentUser) return;
  const ud = allData.users[currentUser]; if(!ud || !ud.dailyMission) return;
  if(ud.dailyMission.date !== todayKey()) return;
  if(!ud.dailyMission.activityIds.includes(activityId)) return;
  if(!ud.dailyMission.completed.includes(activityId)){
    ud.dailyMission.completed.push(activityId);
    saveState();
  }
}
function renderDailyMission(userId){
  const m = ensureDailyMission(userId);
  if(!m || !m.activityIds.length) return null;
  // Resolve activity details
  const tasks = m.activityIds.map(aid=>{
    for(const sub of SUBJECTS){
      const acts = getWeekActivities(userId, sub.id) || [];
      const a = acts.find(x=>x && x.id===aid);
      if(a) return { id:aid, title:a.title, emoji:a.emoji, subject:sub.id, subjectName:sub.name };
    }
    return { id:aid, title:'Activity', emoji:'✨', subject:'', subjectName:'' };
  });
  const completedCount = m.completed.length;
  const pct = Math.round(completedCount / tasks.length * 100);
  const allDone = completedCount === tasks.length;
  const wrap = h('div',{class:'daily-mission'});
  const head = h('div',{class:'dm-head'},[
    h('div',{class:'dm-title'},[
      h('span',{class:'dm-title-emoji'},'🎯'),
      h('span',{},"Today's Mission"),
    ]),
    h('span',{class:'dm-reset'}, completedCount+' / '+tasks.length+' done · resets at midnight'),
  ]);
  wrap.appendChild(head);
  wrap.appendChild(h('div',{class:'dm-progress-wrap'},[h('div',{class:'dm-progress',style:'width:'+pct+'%'})]));
  const list = h('div',{class:'dm-tasks'});
  tasks.forEach(t=>{
    const done = m.completed.includes(t.id);
    const btn = h('button',{class:'dm-task'+(done?' done':''),onclick:()=>{
      if(done) return;
      go('activity',{activityId:t.id, subject:t.subject});
    }},[
      h('div',{class:'dm-task-emoji'}, t.emoji || '✨'),
      h('div',{class:'dm-task-info'},[
        h('div',{class:'dm-task-sub'}, t.subjectName || 'Quest'),
        h('div',{class:'dm-task-name'}, t.title || 'Activity'),
      ]),
      h('div',{class:'dm-task-check'}, done ? '✓' : ''),
    ]);
    list.appendChild(btn);
  });
  wrap.appendChild(list);
  if(allDone){
    wrap.appendChild(h('div',{class:'dm-complete'},[
      h('span',{class:'dm-complete-emoji'},'🎉'),
      h('span',{},"Mission complete! You're on fire today."),
    ]));
  }
  return wrap;
}

/* ==========================================================================
   TEXT-TO-SPEECH — browser-native Web Speech API with natural voice picking
   --------------------------------------------------------------------------
   ▸ Free, offline-capable, built into Chrome/Safari/Edge/Firefox.
   ▸ speak(text, 'fr-FR') for French · speak(text, 'en-US') for English.
   ▸ Voice selection priority (highest → lowest quality):
       1. Named premium voices (Amélie/Thomas/Google français for FR,
          Samantha/Google US English/Aria for EN)
       2. Any voice with "Premium", "Enhanced", "Neural", "Natural" in name
       3. Non-local (cloud) voices — usually much more natural than local
       4. Any voice matching the language
   ▸ rate=0.92 (slightly slower for clarity), pitch=1.0 (natural, not chipmunk)
   ▸ Cancels any previous utterance before starting a new one.
   --------------------------------------------------------------------------
   EDIT PREFERRED_VOICES below to add/remove preferred voice names per language.
   The voice names you can use depend on the user's OS:
     • macOS/iOS: Amélie, Thomas, Aurélie, Marie (FR) · Samantha, Siri, Alex (EN)
     • Chrome:    "Google français", "Google US English"
     • Edge:      "Microsoft Denise Online", "Microsoft Aria Online"
   ========================================================================== */
const PREFERRED_VOICES = {
  fr: [
    'Amélie',       // macOS/iOS — French Canadian, very natural
    'Thomas',       // macOS/iOS — French (Parisian), natural male
    'Aurélie',      // macOS/iOS — French, natural female
    'Marie',        // Some systems
    'Google français',  // Chrome — cloud-based, very natural
    'Microsoft Denise', // Edge — cloud-based
    'Microsoft Henri',  // Edge
    'Virginie',     // macOS
  ],
  en: [
    'Samantha',     // macOS/iOS — iconic Siri voice, very natural
    'Allison',      // macOS/iOS — natural female
    'Ava',          // macOS/iOS (Premium) — extremely natural
    'Siri',         // iOS
    'Alex',         // macOS — natural male
    'Moira',        // macOS — Irish accent, clear
    'Karen',        // macOS — Australian, clear
    'Google US English',   // Chrome — cloud
    'Microsoft Aria',      // Edge — cloud Neural
    'Microsoft Jenny',     // Edge — cloud Neural
    'Microsoft Guy',       // Edge — cloud
  ],
};
let _cachedVoices = null;
function _getBestVoice(lang){
  if(!_cachedVoices || !_cachedVoices.length){
    try{ _cachedVoices = window.speechSynthesis.getVoices(); }catch(e){ _cachedVoices = []; }
  }
  if(!_cachedVoices.length) return null;
  const langPrefix = (lang||'').toLowerCase().split('-')[0];
  const voices = _cachedVoices.filter(v => (v.lang||'').toLowerCase().startsWith(langPrefix));
  if(!voices.length) return null;

  // 1. Try preferred voices by name (case-insensitive substring match).
  const preferred = PREFERRED_VOICES[langPrefix] || [];
  for(const wantName of preferred){
    const want = wantName.toLowerCase();
    const match = voices.find(v => (v.name||'').toLowerCase().includes(want));
    if(match) return match;
  }

  // 2. Voice names that signal high quality.
  const hq = voices.find(v => /premium|enhanced|neural|natural|online/i.test(v.name||''));
  if(hq) return hq;

  // 3. Cloud voices (localService === false). These are usually much more
  //    natural than on-device voices.
  const cloud = voices.find(v => v.localService === false);
  if(cloud) return cloud;

  // 4. First voice in the requested language.
  return voices[0];
}
function speak(text, lang){
  if(!text || typeof window.speechSynthesis === 'undefined') return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = lang || 'en-US';
    u.rate = 0.92;   // Slightly slower for clarity
    u.pitch = 1.0;   // Natural pitch — no chipmunk effect
    const v = _getBestVoice(u.lang);
    if(v){
      u.voice = v;
      // IMPORTANT: when setting .voice, also ensure .lang matches the voice's
      // native lang so the browser doesn't down-mix to a different engine.
      u.lang = v.lang || u.lang;
    }
    window.speechSynthesis.speak(u);
  }catch(e){ console.warn('[speak] failed:', e); }
}
// Prime the voice list (some browsers load voices asynchronously).
if(typeof window.speechSynthesis !== 'undefined'){
  try{
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = ()=>{ _cachedVoices = window.speechSynthesis.getVoices(); };
  }catch(e){}
}

// Pre-sorted by descending length so "ice cream" is tested before "ice".
const _emojiKeys = Object.keys(EMOJI_KEYWORDS).sort((a,b)=>b.length-a.length);
/** Return the best topical emoji for a piece of text, or null if nothing matches. */
function emojiFor(text){
  const t = String(text||'').toLowerCase();
  if(!t) return null;
  for(const k of _emojiKeys){
    // Word-boundary-ish match (works for multi-word like "ice cream")
    if(t.includes(k)) return EMOJI_KEYWORDS[k];
  }
  return null;
}
/** Heuristic: does this string start with an emoji/symbol character? */
function _startsWithEmoji(s){
  if(!s) return false;
  const first = Array.from(String(s))[0];
  if(!first) return false;
  const code = first.codePointAt(0);
  // Symbol / pictograph / emoji / regional-indicator Unicode ranges
  if(code >= 0x2600 && code <= 0x27BF) return true;         // misc symbols/dingbats
  if(code >= 0x1F000 && code <= 0x1FFFF) return true;        // emoji planes
  if(code >= 0x2300 && code <= 0x23FF) return true;          // misc technical (⏰ etc.)
  return false;
}
/** Prepend a topical emoji to a choice string if it doesn't already lead with one. */
function autoEmojiPrefix(text){
  const s = String(text==null?'':text);
  if(_startsWithEmoji(s)) return s;
  const e = emojiFor(s);
  return e ? (e + ' ' + s) : s;
}

/* ==========================================================================
   LEVEL GATING — cross-subject progression
   --------------------------------------------------------------------------
   Design: activities come in BATCHES of 5 levels. To unlock the NEXT batch
   in ANY subject, the student must finish the CURRENT batch in ALL subjects.
   So Level 6 Reading only unlocks after Level 5 is done in reading + writing +
   math + logic + french + science + social.
   ▸ maxUnlockedBatch(sid)   → highest batch number (1-indexed) the student
                                can access. Batch 1 is always unlocked.
   ▸ isBatchUnlocked(sid,batch) → convenience boolean.
   ▸ activitiesUntilNextBatch(sid) → how many more levels to finish across
                                      all subjects to unlock the next batch.
   ========================================================================== */
const BATCH_SIZE = 5;
function maxUnlockedBatch(sid){
  // The current tier = the MIN completed-batches across all subjects.
  // Batch N unlocks when everyone has done N-1 batches (BATCH_SIZE × (N-1) levels).
  const perSubject = SUBJECTS.map(sub=>{
    const acts = getWeekActivities(sid, sub.id);
    if(!acts.length) return 999;                 // subjects with no content never block
    return Math.floor(countDone(sid, sub.id) / BATCH_SIZE);
  });
  return Math.min(...perSubject) + 1;
}
function isBatchUnlocked(sid, batch){ return batch <= maxUnlockedBatch(sid); }
function activitiesUntilNextBatch(sid){
  // For each subject, how many more levels needed in THIS batch to finish it?
  const currentBatch = maxUnlockedBatch(sid);          // 1-indexed
  const targetDone = currentBatch * BATCH_SIZE;        // total needed per subject to unlock next
  let remaining = 0;
  const perSubject = [];
  SUBJECTS.forEach(sub=>{
    const acts = getWeekActivities(sid, sub.id);
    if(!acts.length) return;
    const done = countDone(sid, sub.id);
    const need = Math.max(0, Math.min(targetDone, acts.length) - done);
    if(need > 0) perSubject.push({subject:sub, need});
    remaining += need;
  });
  return {remaining, perSubject, currentBatch, nextBatch: currentBatch+1};
}

/* ==========================================================================
   STORE HELPERS — requirements, orders, email
   --------------------------------------------------------------------------
   ▸ getCatalog()          — returns STORE_ITEMS merged with teacher overrides
   ▸ countWeekLevels(sid)  — total activities completed across all subjects
   ▸ countWeekSubjects(sid)— number of DIFFERENT subjects touched this week
   ▸ checkRequirements(item, sid) — returns {coins, levels, subjects, canAttempt}
   ▸ placeOrder(item)      — deducts coins, saves request, triggers email
   ▸ sendOrderEmail(order) — EmailJS primary, cloud-state fallback
   ========================================================================== */
function getCatalog(){
  // Merge live teacher edits with the source STORE_ITEMS catalog.
  // Teacher can disable, rename, or adjust price/coinCost from the admin view.
  return STORE_ITEMS.map(base=>{
    const ov = (allData.catalogOverrides||{})[base.id] || {};
    return Object.assign({}, base, ov);
  });
}
function getItemById(id){ return getCatalog().find(i=>i.id===id); }
function countWeekLevels(sid){
  const ud = getStudentData(sid);
  let total = 0;
  SUBJECTS.forEach(s=>{ total += countDone(sid, s.id); });
  return total;
}
function countWeekSubjects(sid){
  const ud = getStudentData(sid);
  let n = 0;
  SUBJECTS.forEach(s=>{ if(countDone(sid, s.id) > 0) n++; });
  return n;
}
/**
 * Check whether a student meets the three unlock gates for an item.
 * Returns a detailed status object used by the UI to show the checklist.
 */
function checkRequirements(item, sid){
  const ud = getStudentData(sid);
  const req = item.requirements || {};
  const coins = (ud.coins||0) >= item.coinCost;
  const levels = countWeekLevels(sid) >= (req.minLevels||0);
  const subjects = countWeekSubjects(sid) >= (req.minSubjects||0);
  const available = item.isAvailable !== false;
  // canAttempt = can open the challenge; actual purchase still requires passing it.
  const canAttempt = coins && levels && subjects && available;
  return { coins, levels, subjects, available, canAttempt,
           needLevels: req.minLevels||0, needSubjects: req.minSubjects||0,
           haveLevels: countWeekLevels(sid), haveSubjects: countWeekSubjects(sid) };
}
/**
 * Create + persist an order request. Deducts coins, writes to allData.orders,
 * syncs cloud, and fires the email notification (with graceful fallback).
 * Returns the saved order object.
 */
function placeOrder(item){
  if(!currentUser || !state) return null;
  const sInfo = getStudentInfo(currentUser);
  if((state.coins||0) < item.coinCost) return null;
  state.coins = (state.coins||0) - item.coinCost;
  const order = {
    id: 'ord-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),
    studentId: currentUser,
    studentName: sInfo.name,
    studentGrade: sInfo.grade,
    itemId: item.id,
    itemName: item.name,
    itemCategory: item.category,
    coinCost: item.coinCost,
    approxPrice: item.approxPrice,
    amazonLink: item.amazonLink || '',
    requestedAt: Date.now(),
    status: 'pending',
    remainingCoins: state.coins,
  };
  allData.orders = allData.orders || [];
  allData.orders.unshift(order);
  saveState();
  sendOrderEmail(order);
  return order;
}
/**
 * Fire the teacher email notification for a reward request.
 *  1) If EmailJS keys are set in EMAIL_CONFIG, send via EmailJS (recommended).
 *  2) Otherwise log a ready-to-click mailto: link to the console so the
 *     teacher can still review + dispatch manually. Order is ALWAYS saved
 *     to allData.orders regardless of email status.
 *
 * DEPLOYMENT NOTES (for production):
 *   The cleanest setup is EmailJS (pure frontend, free tier) — sign up,
 *   add your Gmail service, create a template, paste the 3 keys into
 *   EMAIL_CONFIG.emailjs above. That's it.
 *   If you prefer a backend: create a Cloudflare Worker / Netlify Function
 *   / Vercel API route that accepts a POST and sends via SendGrid/Resend/SMTP,
 *   then replace the body of this function with a single fetch() call to
 *   that endpoint. The rest of the app stays identical.
 */
function sendOrderEmail(order){
  const cfg = EMAIL_CONFIG.emailjs || {};
  const body =
`Student: ${order.studentName}
Grade: ${order.studentGrade}
Reward: ${order.itemName}
Category: ${order.itemCategory}
Coins Spent: ${order.coinCost}
Approx Price: $${order.approxPrice.toFixed(2)}
Remaining Coins: ${order.remainingCoins}
Requested At: ${new Date(order.requestedAt).toLocaleString()}
Item ID: ${order.itemId}
Amazon Link: ${order.amazonLink || '(none on file)'}
`;
  const subject = `KidQuest Reward Request — ${order.studentName} ordered ${order.itemName}`;
  const mailto = 'mailto:'+encodeURIComponent(EMAIL_CONFIG.teacherEmail)+
                 '?subject='+encodeURIComponent(subject)+
                 '&body='+encodeURIComponent(body);
  console.log('[KidQuest Store] Order saved:', order);
  console.log('[KidQuest Store] Manual send link (if email service not configured):', mailto);

  // EmailJS path: only fires when all 3 keys are present.
  if(cfg.publicKey && cfg.serviceId && cfg.templateId && window.emailjs){
    const params = {
      student_name: order.studentName, student_grade: order.studentGrade,
      reward_name: order.itemName, reward_category: order.itemCategory,
      coin_cost: order.coinCost, approx_price: order.approxPrice,
      remaining_coins: order.remainingCoins,
      requested_at: new Date(order.requestedAt).toLocaleString(),
      item_id: order.itemId, amazon_link: order.amazonLink || '',
      teacher_email: EMAIL_CONFIG.teacherEmail,
      teacher_name: EMAIL_CONFIG.teacherName,
    };
    try {
      window.emailjs.send(cfg.serviceId, cfg.templateId, params, cfg.publicKey)
        .then(()=>{ console.log('[KidQuest Store] EmailJS sent ✓'); })
        .catch((e)=>{ console.warn('[KidQuest Store] EmailJS failed:', e); });
    } catch(e){ console.warn('[KidQuest Store] EmailJS threw:', e); }
  }
}
/* ==========================================================================
   MOTIVATION HELPERS — save-up progress, "coins away" nudges, wishlist
   --------------------------------------------------------------------------
   ▸ saveUpProgress(item, sid) — 0..1 ratio of how close student is to affording
   ▸ coinsAway(item, sid)      — number of coins still needed (0 if affordable)
   ▸ nudgeMessage(item, sid)   — friendly, variety-based encouragement string
   ▸ isInWishlist / toggleWishlist — per-student wishlist CRUD
   --------------------------------------------------------------------------
   ▸ EDIT NUDGE TEXT: tweak the strings in NUDGE_* arrays below.
   ▸ EDIT PROGRESS STYLE: bar colors in `.save-bar` CSS class.
   ▸ WHERE WISHLIST IS STORED: each student's state.wishlist array. Lives in
     localStorage + cloud. One wishlist per student, per design.
   ========================================================================== */
const NUDGE_READY = [
  "You've saved enough! 🎉",
  "Ready to unlock this reward!",
  "You can get this one! ✨",
];
const NUDGE_CLOSE = [   // within 20 coins
  "Almost there!",
  "Only {N} more coins to go!",
  "Just {N} coins away — you're so close!",
];
const NUDGE_MID = [     // within 50%
  "You're getting closer!",
  "You're {N} coins away — keep going!",
  "Over halfway there — great work!",
];
const NUDGE_FAR = [     // far off
  "Start saving for this reward!",
  "You're {N} coins away — keep earning!",
  "Keep playing to save up!",
];
function saveUpProgress(item, sid){
  const have = (getStudentData(sid).coins||0);
  const need = item.coinCost || 1;
  return Math.max(0, Math.min(1, have/need));
}
function coinsAway(item, sid){
  const have = (getStudentData(sid).coins||0);
  return Math.max(0, (item.coinCost||0) - have);
}
function nudgeMessage(item, sid){
  const away = coinsAway(item, sid);
  if(away <= 0) return NUDGE_READY[Math.floor(Math.random()*NUDGE_READY.length)];
  const ratio = saveUpProgress(item, sid);
  let pool;
  if(away <= 20) pool = NUDGE_CLOSE;
  else if(ratio >= 0.5) pool = NUDGE_MID;
  else pool = NUDGE_FAR;
  return pool[Math.floor(Math.random()*pool.length)].replace('{N}', String(away));
}
function isInWishlist(itemId, sid){
  const ud = getStudentData(sid || currentUser);
  return Array.isArray(ud.wishlist) && ud.wishlist.includes(itemId);
}
function toggleWishlist(itemId){
  if(!currentUser || !state) return false;
  if(!Array.isArray(state.wishlist)) state.wishlist = [];
  const i = state.wishlist.indexOf(itemId);
  if(i >= 0) state.wishlist.splice(i,1);
  else state.wishlist.push(itemId);
  saveState();
  return state.wishlist.includes(itemId);
}

function updateOrderStatus(orderId, status, refund){
  if(!Array.isArray(allData.orders)) return;
  const o = allData.orders.find(x=>x.id===orderId);
  if(!o) return;
  o.status = status;
  o.updatedAt = Date.now();
  if(refund && allData.users[o.studentId]){
    allData.users[o.studentId].coins = (allData.users[o.studentId].coins||0) + o.coinCost;
    if(currentUser===o.studentId) state = allData.users[currentUser];
  }
  saveState();
}

/* ========== ROUTING ========== */
function go(screen,opts={}){
  currentScreen=screen; currentOpts=opts;
  const root=$('#screen');
  if(!root){console.warn('[KidQuest] #screen not found'); return;}
  root.innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});

  // Always hide the reward overlay on navigation (belt-and-suspenders)
  const rew = $('#reward'); if(rew){rew.classList.remove('show'); rew.style.display='none'}

  try{ updateTopbar(screen); }catch(e){ console.warn('[KidQuest] updateTopbar failed:',e); }

  // FAB visibility
  const fab=$('#fab');
  if(fab) fab.classList.toggle('hidden', !currentUser||screen==='home'||screen==='dashboard'||isTeacher);

  // Defensive routing: if current user but no state, force to home
  if(currentUser && !state && screen!=='home' && screen!=='profiles'){
    console.warn('[KidQuest] state missing for currentUser; resetting to home');
    currentUser=null; isTeacher=false;
    try{localStorage.removeItem(LOCAL_USER_KEY);}catch(e){}
    screen='home';
  }

  try{
    if(screen==='home') renderHome(root);
    else if(screen==='profiles') renderProfiles(root);
    else if(screen==='pin') renderPin(root,opts.student);
    else if(screen==='teacher-login') renderTeacherLogin(root);
    else if(screen==='dashboard') renderDashboard(root);
    else if(screen==='week') renderWeek(root,opts.subject);
    else if(screen==='activity') renderActivity(root,opts.activityId,opts.subject);
    else if(screen==='badges') renderBadges(root);
    else if(screen==='avatars') renderAvatarPicker(root);
    else if(screen==='mini-hub') renderMiniHub(root);
    else if(screen==='game-memory') renderMemoryMatch(root, opts);
    else if(screen==='game-math') renderQuickMath(root, opts);
    else if(screen==='store') renderStore(root);
    else if(screen==='orders') renderOrders(root);
    else if(screen==='teacher') renderTeacher(root);
    else renderHome(root); // unknown screen → safe fallback
  }catch(err){
    console.error('[KidQuest] Render error on screen "'+screen+'":',err);
    // Fall back to home on any render failure
    if(screen !== 'home'){
      root.innerHTML='';
      try{ renderHome(root); }catch(e){ console.error('[KidQuest] Home render also failed:',e); }
    }
  }
}

/* ========== REPORT CARD ==========
   Calculates a performance level per subject and generates personalized
   encouraging comments. Levels: 1=Growing, 2=Developing, 3=Strong, 4=Excellent.
   Scoring blends: completion ratio + accuracy (perfect activities / completed). */
const RC_LEVELS = [
  {lv:1, emoji:'🌱', name:'Growing',    cls:'lv1'},
  {lv:2, emoji:'🌿', name:'Developing', cls:'lv2'},
  {lv:3, emoji:'🌟', name:'Strong',     cls:'lv3'},
  {lv:4, emoji:'🚀', name:'Excellent',  cls:'lv4'},
];
const RC_LEGEND = [
  {lv:1, emoji:'🌱', name:'Growing',    desc:'Just getting started — practice builds strength.', cls:'lv1'},
  {lv:2, emoji:'🌿', name:'Developing', desc:'Improving and understanding the basics — still needs some help.', cls:'lv2'},
  {lv:3, emoji:'🌟', name:'Strong',     desc:'Working well independently — good understanding of skills.', cls:'lv3'},
  {lv:4, emoji:'🚀', name:'Excellent',  desc:'Very confident and accurate — ready for bigger challenges!', cls:'lv4'},
];
const RC_SKILL_NOTES = {
  reading: ['Reads sentences and finds meaning','Understands main ideas and details'],
  writing: ['Writes clear sentences','Uses descriptive words and punctuation'],
  math:    ['Solves number problems','Applies math to word problems'],
  logic:   ['Finds patterns and connections','Reasons step by step'],
  french:  ['Recognizes French words','Understands simple phrases'],
  science: ['Observes and explains natural world','Connects cause and effect in experiments'],
  social:  ['Knows Canadian geography and symbols','Understands communities and rules'],
};

function computeSubjectStats(sid, subjId){
  const ud = getStudentData(sid);
  const acts = getWeekActivities(sid, subjId);
  const total = acts.length || 1;
  let done = 0, perfect = 0;
  acts.forEach(a=>{
    if(ud.completedActivities[a.id]) done++;
    if(ud.perfectActivities[a.id]) perfect++;
  });
  const completion = done/total;
  const accuracy = done ? perfect/done : 0;
  // Blend: 60% completion + 40% accuracy
  const score = completion*0.6 + accuracy*0.4;
  let lv = 1;
  if(score >= 0.85) lv = 4;
  else if(score >= 0.55) lv = 3;
  else if(score >= 0.25) lv = 2;
  else lv = 1;
  // Special case: if nothing done yet, stay at Growing
  if(done === 0) lv = 1;
  return {done, perfect, total, completion, accuracy, score, lv, pct:Math.round(completion*100)};
}

function generateSubjectComment(name, subjId, stats){
  const subjName = {reading:'reading',writing:'writing',math:'math',logic:'logic puzzles',french:'French',science:'science',social:'social studies'}[subjId] || subjId;
  if(stats.done === 0){
    const opts = [
      `${name} hasn't started ${subjName} this week — a fresh adventure awaits!`,
      `Ready to dive into ${subjName}, ${name}? Start any lesson to begin growing.`,
      `${name}, your first ${subjName} lesson is waiting — you've got this!`,
    ];
    return opts[Math.floor(Math.random()*opts.length)];
  }
  if(stats.lv === 4){
    const opts = [
      `Wow, ${name}! ${stats.perfect} perfect score${stats.perfect===1?'':'s'} in ${subjName} — truly excellent work!`,
      `${name} is shining in ${subjName} — ${stats.pct}% complete with amazing accuracy!`,
      `Outstanding ${subjName} skills, ${name}! Keep pushing for bigger challenges.`,
    ];
    return opts[Math.floor(Math.random()*opts.length)];
  }
  if(stats.lv === 3){
    const opts = [
      `Great job, ${name}! You're doing ${subjName} all by yourself — keep it up!`,
      `${name} is showing strong ${subjName} skills — ${stats.done} of ${stats.total} done!`,
      `Solid work in ${subjName}, ${name} — confidence is building every day.`,
    ];
    return opts[Math.floor(Math.random()*opts.length)];
  }
  if(stats.lv === 2){
    const opts = [
      `${name} is making steady progress in ${subjName} — keep practicing to get even stronger!`,
      `Nice start in ${subjName}, ${name}! A few more lessons and you'll feel super confident.`,
      `${name} is building ${subjName} skills step by step — every try counts.`,
    ];
    return opts[Math.floor(Math.random()*opts.length)];
  }
  const opts = [
    `${name} is just beginning ${subjName} — practice makes progress!`,
    `Every expert started here, ${name}. Try a lesson in ${subjName} to keep growing.`,
    `${name}, ${subjName} is a great adventure — take it one lesson at a time.`,
  ];
  return opts[Math.floor(Math.random()*opts.length)];
}

function computeOverallLevel(sid){
  // Iterate every subject that's in SUBJECTS — auto-includes new subjects.
  // Subjects with no content for this student are skipped (don't drag down avg).
  let sum = 0, count = 0;
  SUBJECTS.forEach(sub=>{
    const acts = getWeekActivities(sid, sub.id);
    if(acts.length){ sum += computeSubjectStats(sid, sub.id).lv; count++; }
  });
  const avg = count ? sum/count : 1;
  const lv = Math.max(1, Math.min(4, Math.round(avg)));
  return RC_LEVELS[lv-1];
}

/* ========== WEEK VIEW ========== */
function renderWeek(root,subId){
  if(!currentUser||!state){go('home');return}
  const sub=SUBJECTS.find(s=>s.id===subId);if(!sub){go('dashboard');return}
  const acts=getWeekActivities(currentUser,subId);
  root.appendChild(h('div',{class:'week-head'},[
    h('h2',{},[h('span',{style:'font-size:24px;margin-right:8px'},sub.emoji),h('span',{},'Week '+currentWeek+' · '+sub.name)]),
    h('button',{class:'back-btn',onclick:()=>go('dashboard')},'← Back'),
  ]));

  // --- Cross-subject gating status banner (only when student has an
  //     upcoming batch but hasn't finished current batch in all subjects) ---
  const unlockedBatch = maxUnlockedBatch(currentUser);
  const gateInfo = activitiesUntilNextBatch(currentUser);

  const list=h('div',{class:'levels stagger'});
  acts.forEach((a,i)=>{
    const levelNum = i+1;                                  // 1-indexed level
    const actBatch = Math.floor(i / BATCH_SIZE) + 1;       // which batch (1, 2, 3...)
    const batchLocked = actBatch > unlockedBatch;           // entire batch gated by other subjects
    const done=isActivityDone(currentUser,a.id);
    // Sequential unlock WITHIN a batch: first of each batch is always open once batch unlocks
    const firstOfBatch = (i % BATCH_SIZE) === 0;
    const prevDone = firstOfBatch || isActivityDone(currentUser,acts[i-1].id);
    const locked = batchLocked || (!done && !prevDone);
    const isCurrent = !done && !locked;
    const cls='level-card'+(done?' done':'')+(isCurrent?' current':'')+(locked?' locked':'');
    const numCls='l-num'+(done?' done':'')+(isCurrent?' current':'')+(locked?' locked':'');
    const statusText = done ? 'Completed ✓'
                     : batchLocked ? '🔒 Finish Level '+(actBatch-1)*BATCH_SIZE+' in all subjects to unlock'
                     : locked ? '🔒 Locked'
                     : 'Ready to start!';
    list.appendChild(h('button',{class:cls,onclick:()=>{if(!locked)go('activity',{activityId:a.id,subject:subId})}},[
      h('div',{class:numCls},done?'✓':String(levelNum)),
      h('div',{class:'l-info'},[
        h('div',{class:'l-title'},a.title),
        h('div',{class:'l-status'}, statusText),
      ]),
      h('div',{class:'l-emoji'},a.emoji),
    ]));
  });

  // --- "Coming soon" card: appears AFTER the last activity if the student
  //     has finished this subject's current batch but can't progress further
  //     either because (a) other subjects need catching up, or (b) no more
  //     content has been authored yet. Keeps motivation clear. ---
  const subjectDone = countDone(currentUser, subId);
  const atEndOfBatch = subjectDone >= Math.min(unlockedBatch * BATCH_SIZE, acts.length);
  const hasMoreAuthored = acts.length > unlockedBatch * BATCH_SIZE;
  if(acts.length && subjectDone >= acts.length){
    // All authored levels finished → show a "next batch coming" card
    if(gateInfo.remaining > 0){
      // Blocked by other subjects
      const missingList = gateInfo.perSubject.map(p=>p.subject.name+' ('+p.need+')').join(', ');
      list.appendChild(h('div',{class:'level-card locked',style:'cursor:default'},[
        h('div',{class:'l-num locked'},'?'),
        h('div',{class:'l-info'},[
          h('div',{class:'l-title'},'More levels coming soon!'),
          h('div',{class:'l-status'},'🔒 Finish Level '+gateInfo.currentBatch*BATCH_SIZE+' in: '+missingList),
        ]),
        h('div',{class:'l-emoji'},'🌟'),
      ]));
    } else {
      // Everything in tier is done, ready for next batch content to be written
      list.appendChild(h('div',{class:'level-card locked',style:'cursor:default'},[
        h('div',{class:'l-num locked'},'✨'),
        h('div',{class:'l-info'},[
          h('div',{class:'l-title'},'New levels coming soon!'),
          h('div',{class:'l-status'},'You\'ve mastered this week. Check back for Level '+(acts.length+1)+'+!'),
        ]),
        h('div',{class:'l-emoji'},'🚀'),
      ]));
    }
  }

  root.appendChild(list);
}

/* ========== TIMER SYSTEM ==========
   Age-appropriate seconds per question. Write questions get extra time.
   Lesson screens have no timer. When time runs out, auto-advance. */
const TIMER_SECS = { nishan:45, akaran:40, rushan:35, akshayan:30 };
const WRITE_TIMER = 120; // 2 min for free-write
let timerInterval = null;
let timerLeft = 0;

function startTimer(secs){
  clearTimer();
  timerLeft = secs;
  const bar = $('#timerBar');
  const txt = $('#timerTxt');
  if(!bar||!txt) return;
  bar.style.width='100%'; bar.className='';
  txt.textContent=secs+'s'; txt.className='timer-text';
  timerInterval = setInterval(()=>{
    timerLeft--;
    if(timerLeft<0){clearTimer();timeUp();return}
    const pct = (timerLeft/secs)*100;
    bar.style.width=pct+'%';
    txt.textContent=timerLeft+'s';
    if(timerLeft<=5){bar.className='danger';txt.className='timer-text danger'}
    else if(timerLeft<=10){bar.className='warn';txt.className='timer-text warn'}
  },1000);
}
function clearTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}
function timeUp(){
  if(!quiz||quiz.locked)return;
  quiz.locked=true;
  // Mark wrong + show feedback
  const fb=$('#fb');if(fb){fb.className='feedback no';fb.textContent='⏰ Time\'s up!'}
  // Lock all choices
  document.querySelectorAll('.choice,.emoji-btn,.write-submit,.order-chip,.match-item').forEach(el=>el.classList.add('locked'));
  showNext();
}
