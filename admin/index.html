<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- KidQuest admin dashboard
     ------------------------
     Operator-only console for managing tenants. Auth model:
       1. Operator types ADMIN_TOKEN once → stored in localStorage
       2. Every API call sends `Authorization: Bearer <token>`
       3. Token is the same secret used by /provision, set via:
            wrangler secret put ADMIN_TOKEN
       4. Logout button wipes localStorage
     The token is NEVER in markup, query strings, or referrers.
     This page is intentionally noindex/nofollow and CSP-locked. -->
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
<title>KidQuest — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0EEFF;
  --card:#FFFFFF;
  --ink:#1A1035;
  --ink2:#5B5580;
  --ink3:#9B95B0;
  --line:rgba(26,16,53,.08);
  --primary:#6C5CE7;
  --primary-dark:#5a4bd1;
  --primary2:#A29BFE;
  --mint:#00CEC9;
  --sun:#FDCB6E;
  --rose:#F43F5E;
  --green:#22C55E;
  --amber:#F59E0B;
  --shadow:0 6px 24px rgba(26,16,53,.08),0 2px 4px rgba(26,16,53,.04);
  --shadow-lg:0 20px 50px rgba(108,92,231,.18),0 8px 20px rgba(26,16,53,.1);
  --font:'DM Sans',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
.wrap{max-width:1280px;margin:0 auto;padding:24px}

/* HEADER */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;color:var(--ink)}
.brand-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:var(--shadow)}
.brand-sub{color:var(--ink3);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-left:6px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;font-weight:700;font-size:13px;border-radius:999px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;border:none}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(108,92,231,.32)}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn-ghost:hover{background:#f7f5ff}
.btn-danger{background:var(--rose);color:#fff}
.btn-danger:hover{background:#e11d48}
.btn-sm{padding:6px 10px;font-size:12px}
.btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}

/* AUTH GATE */
.gate{max-width:460px;margin:80px auto;background:var(--card);border-radius:24px;padding:36px;box-shadow:var(--shadow-lg);text-align:center}
.gate h1{font-size:24px;margin-bottom:8px}
.gate p{color:var(--ink2);font-size:14px;margin-bottom:22px;line-height:1.5}
.gate input{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);font-size:14px;font-family:var(--mono);margin-bottom:14px;background:#fafafa}
.gate input:focus{outline:none;border-color:var(--primary);background:#fff}
.gate .err{color:var(--rose);font-size:13px;margin-top:10px;font-weight:600}

/* STATS STRIP */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--card);border-radius:14px;padding:14px 16px;border:1px solid var(--line);box-shadow:var(--shadow)}
.stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:4px}
.stat-value{font-size:24px;font-weight:800;line-height:1.1;color:var(--ink)}
.stat-sub{font-size:12px;color:var(--ink2);margin-top:2px}
.stat.danger .stat-value{color:var(--rose)}
.stat.warn .stat-value{color:var(--amber)}

/* CONTROLS */
.controls{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:11px 16px 11px 38px;border-radius:12px;border:1.5px solid var(--line);font-size:14px;background:#fff}
.search input:focus{outline:none;border-color:var(--primary)}
.search::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.6}
.filter{display:inline-flex;background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:3px;gap:0}
.filter button{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;color:var(--ink2);background:transparent}
.filter button.active{background:var(--primary);color:#fff}

/* TABLE */
.tablecard{background:var(--card);border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{text-align:left;padding:14px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);background:#faf9ff;border-bottom:1.5px solid var(--line)}
tbody td{padding:14px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr:hover{background:#faf9ff}
tbody tr:last-child td{border-bottom:none}
.code{font-family:var(--mono);font-size:13px;color:var(--ink);font-weight:600;background:#f7f5ff;padding:2px 8px;border-radius:6px;display:inline-block}
.email{color:var(--ink2);font-size:13px}
.label-cell{font-weight:700;color:var(--ink)}
.label-cell .planType{display:block;color:var(--ink3);font-size:12px;font-weight:600;text-transform:capitalize;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.badge-ok{background:#dcfce7;color:#166534}
.badge-suspended{background:#fee2e2;color:#991b1b}
.badge-trial{background:#fef3c7;color:#92400e}
.badge-demo{background:#e0f2fe;color:#075985}
.badge-legacy{background:#fde68a;color:#78350f}
.actions-cell{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* PAGINATION + EMPTY STATE */
.foot{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;color:var(--ink2);font-size:13px;border-top:1px solid var(--line);background:#faf9ff}
.empty{padding:60px 24px;text-align:center;color:var(--ink2)}
.empty .emoji{font-size:42px;margin-bottom:10px}
.empty h3{font-size:18px;margin-bottom:6px;color:var(--ink)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,16,53,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:24px;padding:30px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h2{font-size:20px;margin-bottom:6px}
.modal .sub{color:var(--ink2);font-size:13px;margin-bottom:20px;font-family:var(--mono)}
.modal .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;gap:12px}
.modal .row:last-of-type{border-bottom:none}
.modal .row .k{color:var(--ink3);font-weight:600}
.modal .row .v{color:var(--ink);font-family:var(--mono);font-size:13px;text-align:right;word-break:break-all;max-width:60%}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px;padding-top:20px;border-top:1px solid var(--line)}
.modal-close{position:absolute;top:14px;right:14px;background:transparent;color:var(--ink2);font-size:20px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#f0f0f0}

/* TOAST */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s ease;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.toast.error{background:var(--rose)}
.toast.success{background:var(--green)}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(108,92,231,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row td{padding:40px;text-align:center;color:var(--ink2)}
.hidden{display:none}
.warn-banner{background:#fef3c7;border:1.5px solid #f59e0b;color:#78350f;padding:12px 16px;border-radius:14px;margin-bottom:16px;font-size:14px;font-weight:600;display:flex;gap:10px;align-items:center}
.warn-banner .emoji{font-size:18px}

/* DEMO PINS PANEL — sits between stats and the tenants table. */
.panel{background:var(--card);border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:24px;overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:#faf9ff;gap:12px;flex-wrap:wrap}
.panel-head h2{font-size:15px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.panel-head h2 .count{background:var(--primary);color:#fff;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.4px}
.panel-body{padding:14px 18px}
.demo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.demo-pin-card{background:#fafafa;border:1.5px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
.demo-pin-card.expiring{border-color:var(--amber);background:#fffbeb}
.demo-pin-card.fresh{border-color:var(--green)}
.demo-pin-code{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--primary);background:#fff;padding:8px 12px;border-radius:10px;text-align:center;border:1.5px dashed var(--primary);letter-spacing:.04em;cursor:pointer;user-select:all;transition:background .15s ease}
.demo-pin-code:hover{background:#f7f5ff}
.demo-pin-meta{font-size:12px;color:var(--ink2);line-height:1.45}
.demo-pin-meta .who{font-weight:700;color:var(--ink)}
.demo-pin-meta .src{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;background:#f0e8ff;color:var(--primary);padding:2px 8px;border-radius:999px;margin-left:6px}
.demo-pin-meta .src.admin{background:#fef3c7;color:#92400e}
.demo-pin-expires{font-size:11px;font-weight:700;color:var(--ink2);display:flex;align-items:center;gap:6px}
.demo-pin-expires .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.demo-pin-card.expiring .demo-pin-expires .dot{background:var(--amber)}
.demo-empty{padding:30px 20px;text-align:center;color:var(--ink2);font-size:14px}
.demo-empty .emoji{font-size:32px;margin-bottom:8px}

@media (max-width:768px){
  .stat{padding:10px 12px}
  .stat-value{font-size:20px}
  thead{display:none}
  tbody td{display:block;padding:6px 14px;border:none}
  tbody tr{display:block;padding:14px 0;border-bottom:1px solid var(--line)}
  .actions-cell{justify-content:flex-start;padding-top:10px !important}
  .demo-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ============ AUTH GATE ============ -->
<!-- Shown when no admin token in localStorage. -->
<div id="gate" class="gate hidden">
  <div class="brand" style="justify-content:center;margin-bottom:18px">
    <div class="brand-mark">🌟</div>
    <div>KidQuest <span class="brand-sub">Admin</span></div>
  </div>
  <h1>Sign in</h1>
  <p>Paste your <code>ADMIN_TOKEN</code> to continue. The token never leaves your browser except as a Bearer header on API calls.</p>
  <input id="gate-token" type="password" placeholder="ADMIN_TOKEN" autocomplete="off" autocapitalize="off" spellcheck="false">
  <button class="btn btn-primary" id="gate-submit" style="width:100%;padding:14px;font-size:14px">Unlock dashboard</button>
  <div class="err hidden" id="gate-err"></div>
</div>

<!-- ============ MAIN APP ============ -->
<div id="app" class="wrap hidden">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">🌟</div>
      <div>KidQuest <span class="brand-sub">Admin</span></div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-sm" id="refresh-btn" title="Refresh data">🔄 Refresh</button>
      <button class="btn btn-ghost btn-sm" id="logout-btn" title="Forget the admin token on this device">🚪 Sign out</button>
    </div>
  </div>

  <div id="warn-banner" class="warn-banner hidden">
    <span class="emoji">⚠️</span>
    <span id="warn-text"></span>
  </div>

  <!-- Stats strip -->
  <div class="stats" id="stats">
    <!-- populated by JS -->
  </div>

  <!-- Active Demo PINs panel. Shows codes generated via the marketing
       contact form (and the manual "generate" button) that are still
       within their 24h validity window. Each PIN auto-deletes from KV
       on expiry — no cron job needed. -->
  <div class="panel" id="demo-panel">
    <div class="panel-head">
      <h2>🎮 Active Demo PINs <span class="count" id="demo-count">0</span></h2>
      <button class="btn btn-primary btn-sm" id="demo-generate-btn">+ Generate manual PIN</button>
    </div>
    <div class="panel-body" id="demo-body">
      <div class="demo-empty"><span class="spinner"></span> Loading demo PINs…</div>
    </div>
  </div>

  <!-- Controls (search + filter) -->
  <div class="controls">
    <div class="search">
      <input type="search" id="search-input" placeholder="Search by code, label, email, or tenant ID…" autocomplete="off">
    </div>
    <div class="filter" id="filter-bar">
      <button data-f="all" class="active">All</button>
      <button data-f="active">Active</button>
      <button data-f="suspended">Suspended</button>
      <button data-f="demo">Demo</button>
      <button data-f="legacy">Legacy PW</button>
    </div>
  </div>

  <!-- Tenants table -->
  <div class="tablecard">
    <table>
      <thead>
        <tr>
          <th>Label / Plan</th>
          <th>Code</th>
          <th>Customer</th>
          <th>Status</th>
          <th>Created</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="tenants-body">
        <tr class="loading-row"><td colspan="6"><span class="spinner"></span> Loading tenants…</td></tr>
      </tbody>
    </table>
    <div class="foot">
      <span id="foot-count">—</span>
      <span id="foot-meta"></span>
    </div>
  </div>
</div>

<!-- ============ TENANT DETAIL MODAL ============ -->
<div id="modal-bg" class="modal-bg" role="dialog" aria-modal="true">
  <div class="modal" style="position:relative">
    <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    <h2 id="modal-title">Tenant</h2>
    <div class="sub" id="modal-sub">—</div>
    <div id="modal-body">
      <div style="text-align:center;padding:30px"><span class="spinner"></span></div>
    </div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  // Worker base URL — same as the rest of the app/marketing site uses.
  // Resolve to a full URL so the page works whether served from the
  // marketing origin or locally during development.
  var BACKEND = 'https://kidquest-ai-proxy.rhahavy-b.workers.dev';

  // Token storage. localStorage is fine — same machine the operator
  // works from, never sent over the network except as Authorization
  // header on Worker calls (which are HTTPS-only).
  var TOKEN_KEY = 'kidquest_admin_token';
  function getToken(){ return localStorage.getItem(TOKEN_KEY) || ''; }
  function setToken(t){ localStorage.setItem(TOKEN_KEY, t); }
  function clearToken(){ localStorage.removeItem(TOKEN_KEY); }

  // -------- API --------
  async function api(path, opts){
    opts = opts || {};
    var token = getToken();
    if(!token) throw new Error('no_token');
    var headers = Object.assign({'Authorization':'Bearer '+token}, opts.headers || {});
    if(opts.body && typeof opts.body !== 'string'){
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    var url = BACKEND.replace(/\/+$/,'') + path;
    var r = await fetch(url, {method: opts.method || 'GET', headers: headers, body: opts.body});
    var data = null;
    try { data = await r.json(); } catch(e){}
    if(r.status === 401){
      clearToken();
      showGate('Your token was rejected. Sign in again.');
      throw new Error('unauthorized');
    }
    if(!r.ok){
      var msg = (data && data.error) ? data.error : ('http_' + r.status);
      throw new Error(msg + (data && data.detail ? ': '+data.detail : ''));
    }
    return data;
  }

  // -------- UI helpers --------
  var $gate    = document.getElementById('gate');
  var $app     = document.getElementById('app');
  var $body    = document.getElementById('tenants-body');
  var $stats   = document.getElementById('stats');
  var $warn    = document.getElementById('warn-banner');
  var $warnT   = document.getElementById('warn-text');
  var $count   = document.getElementById('foot-count');
  var $meta    = document.getElementById('foot-meta');
  var $search  = document.getElementById('search-input');
  var $filter  = document.getElementById('filter-bar');
  var $toast   = document.getElementById('toast');
  var $modalBg = document.getElementById('modal-bg');
  var $modalT  = document.getElementById('modal-title');
  var $modalS  = document.getElementById('modal-sub');
  var $modalB  = document.getElementById('modal-body');
  var $modalA  = document.getElementById('modal-actions');

  function showGate(errMsg){
    $app.classList.add('hidden');
    $gate.classList.remove('hidden');
    var $err = document.getElementById('gate-err');
    if(errMsg){ $err.textContent = errMsg; $err.classList.remove('hidden'); }
    else $err.classList.add('hidden');
  }
  function showApp(){
    $gate.classList.add('hidden');
    $app.classList.remove('hidden');
  }

  var toastTimer = null;
  function toast(msg, kind){
    $toast.textContent = msg;
    $toast.className = 'toast show' + (kind ? ' '+kind : '');
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ $toast.className = 'toast'; }, 3200);
  }

  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function formatDate(iso){
    if(!iso) return '—';
    var d = new Date(iso);
    if(isNaN(d.getTime())) return '—';
    var now = Date.now();
    var diff = now - d.getTime();
    if(diff < 60000) return 'just now';
    if(diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if(diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    if(diff < 7*86400000) return Math.floor(diff/86400000) + 'd ago';
    return d.toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'});
  }

  // -------- State --------
  var tenants = [];
  var currentFilter = 'all';
  var searchQ = '';

  // -------- Render --------
  function renderStats(s){
    $stats.innerHTML = [
      ['Total tenants', s.total, ''],
      ['New (7d)', s.last7d, '+'+s.last7d+' this week'],
      ['Active', s.total - s.suspended, ''],
      ['Suspended', s.suspended, '', 'danger'],
      ['Family plans', s.family, ''],
      ['Classroom plans', s.classroom, ''],
      ['Demo accounts', s.demo, ''],
      ['Legacy PW', s.legacyPwd, 'need migration', s.legacyPwd > 0 ? 'warn' : ''],
    ].map(function(row){
      var label = row[0], value = row[1], sub = row[2], cls = row[3] || '';
      return '<div class="stat '+cls+'">'+
        '<div class="stat-label">'+escapeHtml(label)+'</div>'+
        '<div class="stat-value">'+escapeHtml(String(value))+'</div>'+
        (sub ? '<div class="stat-sub">'+escapeHtml(sub)+'</div>' : '')+
        '</div>';
    }).join('');
  }

  function applyFilter(t){
    if(currentFilter === 'active' && t.suspended) return false;
    if(currentFilter === 'suspended' && !t.suspended) return false;
    if(currentFilter === 'demo' && !t.isDemo) return false;
    if(currentFilter === 'legacy' && !t.hasLegacyPlaintextPassword) return false;
    if(searchQ){
      var hay = (t.code+' '+t.label+' '+(t.customerEmail||'')+' '+t.id).toLowerCase();
      if(hay.indexOf(searchQ.toLowerCase()) === -1) return false;
    }
    return true;
  }

  function renderTenants(){
    var visible = tenants.filter(applyFilter);
    if(!visible.length){
      $body.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="emoji">🔍</div><h3>No tenants match</h3><p>Try clearing the search or filter.</p></div></td></tr>';
      $count.textContent = '0 of '+tenants.length;
      return;
    }
    $body.innerHTML = visible.map(function(t){
      var statusBadge;
      if(t.isDemo) statusBadge = '<span class="badge badge-demo">Demo</span>';
      else if(t.suspended) statusBadge = '<span class="badge badge-suspended">Suspended</span>';
      else if(t.stripeSubscriptionStatus === 'trialing') statusBadge = '<span class="badge badge-trial">Trial</span>';
      else statusBadge = '<span class="badge badge-ok">Active</span>';
      var legacyBadge = t.hasLegacyPlaintextPassword ? ' <span class="badge badge-legacy" title="Plaintext password — needs migration">Legacy PW</span>' : '';

      return '<tr data-id="'+escapeHtml(t.id)+'">'+
        '<td><div class="label-cell">'+escapeHtml(t.label || '(no label)')+'<span class="planType">'+escapeHtml(t.planType||'')+'</span></div></td>'+
        '<td><span class="code">'+escapeHtml((t.code||'').toUpperCase())+'</span></td>'+
        '<td><span class="email">'+escapeHtml(t.customerEmail || '—')+'</span></td>'+
        '<td>'+statusBadge+legacyBadge+'</td>'+
        '<td><span title="'+escapeHtml(t.createdAt||'')+'">'+escapeHtml(formatDate(t.createdAt))+'</span></td>'+
        '<td class="actions-cell">'+
          '<button class="btn btn-ghost btn-sm" data-act="view" data-id="'+escapeHtml(t.id)+'">View</button>'+
          (t.suspended
            ? '<button class="btn btn-primary btn-sm" data-act="unsuspend" data-id="'+escapeHtml(t.id)+'">Unsuspend</button>'
            : '<button class="btn btn-danger btn-sm" data-act="suspend" data-id="'+escapeHtml(t.id)+'">Suspend</button>'
          )+
        '</td>'+
      '</tr>';
    }).join('');
    $count.textContent = visible.length+' of '+tenants.length;
  }

  // -------- Actions --------
  $body.addEventListener('click', async function(e){
    var btn = e.target.closest('button[data-act]');
    if(!btn) return;
    var id = btn.getAttribute('data-id');
    var act = btn.getAttribute('data-act');
    if(act === 'view') return openTenantModal(id);
    if(act === 'suspend') return confirmAndCall(btn, 'suspend this tenant', '/admin/tenant/'+id+'/suspend', 'POST', {}, 'Suspended');
    if(act === 'unsuspend') return confirmAndCall(btn, 'unsuspend this tenant', '/admin/tenant/'+id+'/unsuspend', 'POST', {}, 'Unsuspended');
  });

  async function confirmAndCall(btn, verb, path, method, body, successMsg){
    if(!confirm('Are you sure you want to '+verb+'?')) return;
    var orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = '…';
    try {
      await api(path, {method: method, body: body});
      toast('✓ '+successMsg, 'success');
      await loadTenants();
    } catch(e){
      toast('Error: '+e.message, 'error');
      btn.disabled = false;
      btn.textContent = orig;
    }
  }

  async function openTenantModal(id){
    $modalT.textContent = 'Loading…';
    $modalS.textContent = id;
    $modalB.innerHTML = '<div style="text-align:center;padding:30px"><span class="spinner"></span></div>';
    $modalA.innerHTML = '';
    $modalBg.classList.add('show');
    try {
      var data = await api('/admin/tenant/'+id);
      var t = data.tenant;
      var s = data.storage;
      $modalT.textContent = t.label || '(no label)';
      $modalS.textContent = t.id;
      $modalB.innerHTML = [
        ['Code', '<span class="code">'+escapeHtml((t.code||'').toUpperCase())+'</span>'],
        ['Plan', escapeHtml(t.planType || '—')],
        ['Customer email', escapeHtml(t.customerEmail || '—')],
        ['Stripe customer', escapeHtml(t.stripeCustomerId || '—')],
        ['Stripe subscription', escapeHtml(t.stripeSubscriptionId || '—')],
        ['Subscription status', escapeHtml(t.stripeSubscriptionStatus || '—')],
        ['Suspended', t.suspended ? '<span class="badge badge-suspended">Yes</span>' : '<span class="badge badge-ok">No</span>'],
        ['Demo', t.isDemo ? 'Yes' : 'No'],
        ['Teacher password', escapeHtml(t.teacherPasswordHash || t.teacherPassword || '—')],
        ['Created', escapeHtml(t.createdAt || '—')],
        ['Updated', escapeHtml(t.updatedAt ? new Date(t.updatedAt).toISOString() : '—')],
        ['Storage', escapeHtml(((s.totalBytes/1024).toFixed(1))+' KB ('+(s.dataBytes)+' data + '+(s.snapshotsBytes)+' snapshots)')],
      ].map(function(r){
        return '<div class="row"><span class="k">'+escapeHtml(r[0])+'</span><span class="v">'+r[1]+'</span></div>';
      }).join('');

      var actions = [];
      if(t.customerEmail){
        actions.push('<button class="btn btn-ghost btn-sm" id="m-resend">📧 Resend code email</button>');
      }
      actions.push('<button class="btn btn-ghost btn-sm" id="m-resend-other">📧 Resend to different email…</button>');
      if(t.suspended){
        actions.push('<button class="btn btn-primary btn-sm" id="m-unsuspend">Unsuspend</button>');
      } else {
        actions.push('<button class="btn btn-danger btn-sm" id="m-suspend">Suspend</button>');
      }
      $modalA.innerHTML = actions.join('');

      var $r = document.getElementById('m-resend');
      if($r) $r.addEventListener('click', async function(){
        try { var x = await api('/admin/tenant/'+id+'/resend-code', {method:'POST', body:{}}); toast('✓ Sent to '+x.sentTo, 'success'); }
        catch(e){ toast('Error: '+e.message, 'error'); }
      });
      var $ro = document.getElementById('m-resend-other');
      if($ro) $ro.addEventListener('click', async function(){
        var e2 = prompt('Send the code to which email address?\n(This will also update the tenant\'s email on file.)', t.customerEmail || '');
        if(!e2 || !e2.includes('@')) return;
        try { var x = await api('/admin/tenant/'+id+'/resend-code', {method:'POST', body:{email:e2.trim()}}); toast('✓ Sent to '+x.sentTo, 'success'); await loadTenants(); }
        catch(e){ toast('Error: '+e.message, 'error'); }
      });
      var $s2 = document.getElementById('m-suspend');
      if($s2) $s2.addEventListener('click', function(){
        if(!confirm('Suspend this tenant? They will be locked out until you unsuspend.')) return;
        api('/admin/tenant/'+id+'/suspend', {method:'POST', body:{}}).then(function(){ toast('✓ Suspended', 'success'); $modalBg.classList.remove('show'); loadTenants(); }).catch(function(e){ toast('Error: '+e.message, 'error'); });
      });
      var $u = document.getElementById('m-unsuspend');
      if($u) $u.addEventListener('click', function(){
        api('/admin/tenant/'+id+'/unsuspend', {method:'POST', body:{}}).then(function(){ toast('✓ Unsuspended', 'success'); $modalBg.classList.remove('show'); loadTenants(); }).catch(function(e){ toast('Error: '+e.message, 'error'); });
      });
    } catch(e){
      $modalB.innerHTML = '<div class="empty"><div class="emoji">⚠️</div><h3>Failed to load</h3><p>'+escapeHtml(e.message)+'</p></div>';
    }
  }

  document.getElementById('modal-close').addEventListener('click', function(){ $modalBg.classList.remove('show'); });
  $modalBg.addEventListener('click', function(e){ if(e.target === $modalBg) $modalBg.classList.remove('show'); });

  // -------- Filter / search wiring --------
  $filter.addEventListener('click', function(e){
    var b = e.target.closest('button[data-f]');
    if(!b) return;
    Array.prototype.forEach.call($filter.querySelectorAll('button'), function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    currentFilter = b.getAttribute('data-f');
    renderTenants();
  });
  $search.addEventListener('input', function(){
    searchQ = $search.value.trim();
    renderTenants();
  });

  // -------- Demo PINs panel --------
  // Active demo PINs auto-expire from KV after 24h. We refresh every
  // time the operator clicks Refresh OR hits the Generate button.
  // Countdown text is recomputed from the server's expiresAt — we
  // don't trust the client clock.
  var $demoBody  = document.getElementById('demo-body');
  var $demoCount = document.getElementById('demo-count');

  function fmtRemaining(secsLeft){
    if(secsLeft <= 0) return 'expired';
    var h = Math.floor(secsLeft / 3600);
    var m = Math.floor((secsLeft % 3600) / 60);
    if(h >= 1) return h+'h '+m+'m left';
    if(m >= 1) return m+'m left';
    return 'under 1m';
  }

  function renderDemoPins(pins){
    $demoCount.textContent = pins.length;
    if(!pins.length){
      $demoBody.innerHTML = '<div class="demo-empty"><div class="emoji">🎯</div>No active demo PINs. Click <strong>+ Generate manual PIN</strong> above, or wait for someone to request one from the marketing page.</div>';
      return;
    }
    $demoBody.innerHTML = '<div class="demo-grid">'+pins.map(function(p){
      var expClass = p.secondsLeft < 3600 ? 'expiring' : (p.secondsLeft > 20*3600 ? 'fresh' : '');
      var srcLabel = p.source === 'admin-manual' ? 'Manual' : 'Form';
      var srcClass = p.source === 'admin-manual' ? 'src admin' : 'src';
      var who = p.requestedBy
        ? '<span class="who">'+escapeHtml(p.requestedByName || p.requestedBy)+'</span>'+(p.requestedByName ? ' &lt;'+escapeHtml(p.requestedBy)+'&gt;' : '')
        : '<span class="who">'+escapeHtml(p.label || 'Manual demo')+'</span>';
      return '<div class="demo-pin-card '+expClass+'">'+
        '<div class="demo-pin-code" title="Click to select, then copy">'+escapeHtml((p.code||'').toUpperCase())+'</div>'+
        '<div class="demo-pin-meta">'+who+'<span class="'+srcClass+'">'+srcLabel+'</span></div>'+
        (p.message ? '<div class="demo-pin-meta" style="font-style:italic;color:var(--ink2);">"'+escapeHtml(p.message.length > 80 ? p.message.slice(0,80)+'…' : p.message)+'"</div>' : '')+
        '<div class="demo-pin-expires"><span class="dot"></span>'+escapeHtml(fmtRemaining(p.secondsLeft))+'</div>'+
      '</div>';
    }).join('')+'</div>';
  }

  async function loadDemoPins(){
    try {
      var data = await api('/admin/demo-pins');
      renderDemoPins(data.pins || []);
    } catch(e){
      if(e.message === 'unauthorized') return;
      $demoBody.innerHTML = '<div class="demo-empty"><div class="emoji">⚠️</div>Failed to load: '+escapeHtml(e.message)+'</div>';
    }
  }

  document.getElementById('demo-generate-btn').addEventListener('click', async function(){
    var label = prompt('Label for this demo PIN (e.g. "Maker Faire booth"):', 'Manual demo');
    if(label === null) return;
    label = (label || '').trim().slice(0, 80) || 'Manual demo';
    var btn = this;
    var orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Generating…';
    try {
      var r = await api('/admin/demo-pins/generate', {method: 'POST', body: {label: label}});
      var code = (r && r.pin && r.pin.code || '').toUpperCase();
      // Show + offer to copy. window.prompt() doubles as a copyable
      // dialog on every browser without needing clipboard permissions.
      window.prompt('✓ New demo PIN — valid 24h. Copy and hand it off:', code);
      await loadDemoPins();
      toast('✓ Generated '+code, 'success');
    } catch(e){
      toast('Error: '+e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  });

  // Click-to-select on a code chip — kid-friendly to copy.
  $demoBody.addEventListener('click', function(e){
    var el = e.target.closest('.demo-pin-code');
    if(!el) return;
    var range = document.createRange();
    range.selectNodeContents(el);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(el.textContent.trim()).then(function(){ toast('Copied '+el.textContent.trim(), 'success'); }).catch(function(){});
    }
  });

  // -------- Loaders --------
  async function loadStats(){
    try {
      var s = await api('/admin/stats');
      renderStats(s);
      if(s.legacyPwd > 0){
        $warn.classList.remove('hidden');
        $warnT.textContent = s.legacyPwd + ' tenant(s) still have plaintext passwords. Use the "Legacy PW" filter to find them — they migrate automatically on next login.';
      } else {
        $warn.classList.add('hidden');
      }
    } catch(e){
      // silently fail; stats are nice-to-have
    }
  }
  async function loadTenants(){
    try {
      $body.innerHTML = '<tr class="loading-row"><td colspan="6"><span class="spinner"></span> Loading tenants…</td></tr>';
      var data = await api('/admin/tenants');
      tenants = data.tenants || [];
      $meta.textContent = data.listComplete ? 'all loaded' : 'first '+tenants.length+' (more available)';
      renderTenants();
      loadStats();
      loadDemoPins();
    } catch(e){
      if(e.message === 'unauthorized') return; // gate already shown
      $body.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="emoji">⚠️</div><h3>Failed to load</h3><p>'+escapeHtml(e.message)+'</p></div></td></tr>';
    }
  }

  // -------- Top-bar buttons --------
  document.getElementById('refresh-btn').addEventListener('click', loadTenants);
  document.getElementById('logout-btn').addEventListener('click', function(){
    if(!confirm('Sign out of admin? You\'ll need your token to sign back in.')) return;
    clearToken();
    showGate();
  });

  // -------- Gate wiring --------
  document.getElementById('gate-submit').addEventListener('click', tryUnlock);
  document.getElementById('gate-token').addEventListener('keydown', function(e){
    if(e.key === 'Enter') tryUnlock();
  });
  async function tryUnlock(){
    var t = document.getElementById('gate-token').value.trim();
    if(!t) return;
    setToken(t);
    document.getElementById('gate-token').value = '';
    document.getElementById('gate-err').classList.add('hidden');
    showApp();
    await loadTenants();
  }

  // -------- Boot --------
  if(getToken()){
    showApp();
    loadTenants();
  } else {
    showGate();
  }
})();
</script>
</body>
</html>
