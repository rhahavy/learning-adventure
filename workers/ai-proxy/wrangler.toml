# Solvix AI Proxy — Cloudflare Worker config
# ------------------------------------------------------------------
# Fronts Anthropic / OpenAI / etc. for every AI feature on the site.
# All secrets (API keys) live in `wrangler secret`, NOT here. See
# README.md for the activation ladder.
#
# Default state: AI_ENABLED = "false", every FEATURE_* flag = "false".
# Nothing calls a paid API until a human flips a flag and redeploys.
# You can deploy this Worker right now and it will cost $0/month
# until then.

name = "kidquest-ai-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

[vars]
# ----- MASTER SWITCH --------------------------------------------
# When "false", every endpoint returns 503 "ai_globally_disabled"
# regardless of the per-feature flags below. This is the one-line
# kill switch for "something's going wrong, shut it all off now".
AI_ENABLED = "false"

# ----- PER-FEATURE FLAGS ----------------------------------------
# Flip to "true" one at a time as you activate each phase.
# Order matches the phasing plan in README.md.

# Phase A (cheap, high-value, ship first)
FEATURE_PLAN_PARSE         = "false"  # tutor notes → toggle JSON
FEATURE_EXPLAIN            = "false"  # "why was I wrong?" on quizzes
FEATURE_FEEDBACK           = "false"  # rubric-based writing feedback
FEATURE_SIMPLIFY           = "false"  # ESL / early-reader rewrites

# Phase B (content depth, reuses Phase A infra)
FEATURE_GENERATE_QUESTIONS = "false"  # stretch-mode harder variants
FEATURE_WORKED_EXAMPLE     = "false"  # step-by-step walkthroughs

# Phase C (parent/teacher facing)
FEATURE_TEACHER_SUMMARY    = "false"  # weekly teacher dashboard card
FEATURE_PARENT_REPORT      = "false"  # weekly parent email/PDF
FEATURE_VOICE_CLONE        = "false"  # ElevenLabs parent-voice clone

# Phase D (high-effort, high-risk — do last)
FEATURE_SIDEKICK           = "false"  # chat buddy (heavily capped)
FEATURE_PHOTO_EXTRACT      = "false"  # homework photo → quiz

# ----- CORS / SECURITY ------------------------------------------
# Same allow-list shape as tts-proxy. Update when you add a custom
# domain. Comma-separated, no spaces required.
ALLOWED_ORIGINS = "https://rhahavy.github.io,https://kidquest.fun,https://kidquest.rhahavy.com,http://localhost:8080,http://127.0.0.1:8080"

# ----- COST CAPS ------------------------------------------------
# Per-student daily call ceiling. Once a kid hits this, every AI
# endpoint returns 429 for the rest of the UTC day. This is the
# single most important knob for bounding cost per student — a
# runaway kid can't cost more than DAILY_CAP_PER_STUDENT * avg
# per-call cost per day. Start conservative; raise only if real
# usage shows you need to.
DAILY_CAP_PER_STUDENT = "50"

# Max request body length in characters. Prevents runaway prompts
# and megabyte uploads. Most real requests are well under 2000.
MAX_INPUT_CHARS = "4000"

# ----- MODEL SELECTION ------------------------------------------
# Which Claude model the text handlers should call. Surfaced here as
# an env var so you can swap to a newer/cheaper Haiku (or move to
# Sonnet for a given endpoint via code branching) without editing
# worker.js. The worker falls back to "claude-haiku-4-5" if unset.
ANTHROPIC_MODEL = "claude-haiku-4-5"

# ----- EMAIL (RESEND) -------------------------------------------
# Powers three things:
#   1. Customer welcome email — sent from the Stripe webhook the
#      moment a checkout completes. Contains the tenant code, so this
#      is now the CANONICAL way users receive their login credential.
#      The thank-you page no longer echoes the code (security: Stripe
#      session ids leak via Referer / browser history / screenshots).
#   2. Operator signup notification — sent to OWNER_EMAIL on every
#      new tenant so you know about each signup in real time.
#   3. Resend-code recovery — POST /stripe/resend-code re-sends the
#      welcome email to the same address Stripe has on file (never
#      to a user-supplied destination — that would let a session-id
#      holder hijack the credential).
#
# Setup:
#   1. resend.com → create account → verify your sending domain (SPF
#      + DKIM records they provide). Without verification, sends 403.
#   2. Create an API key, then:
#        wrangler secret put RESEND_API_KEY
#        <paste re_xxx when prompted>
#   3. Set EMAIL_FROM and OWNER_EMAIL below to your verified addresses.
#
# All three vars are OPTIONAL at the wrangler level — if any is unset
# the email path silently no-ops and provisioning still succeeds.
# The thank-you page surfaces a clear error in that case.
EMAIL_FROM      = "Solvix <admin@kidquest.fun>"
EMAIL_REPLY_TO  = "admin@kidquest.fun"
OWNER_EMAIL     = "admin@kidquest.fun"
APP_URL         = "https://kidquest.fun/app/"

# ----- OBSERVABILITY --------------------------------------------
# Free Cloudflare dashboard metrics. No log body persistence.
[observability]
enabled = true

# ----- KV BINDING (REQUIRED FOR DATA BACKEND, OPTIONAL FOR AI) --
# Used for:
#   • Phase 0a data backend: stores the student-data + snapshots
#     blobs that used to live on textdb.dev. REQUIRED — without KV,
#     /data and /snapshots return 500 "kv_not_bound".
#   • AI cache + per-student daily counter + audit log. Optional;
#     AI handlers fail-open without KV.
#
# Before first activation:
#   cd workers/ai-proxy
#   wrangler kv:namespace create AI_CACHE
# Paste the returned id below, then uncomment the block.
#
# Even though it's now required for /data, kept the binding name "KV"
# (not "DATA_KV") because the AI handlers also use it — keys are
# namespaced (`data:prod`, `data:dev`, `snapshots:prod`, etc.) so
# collisions are impossible.
#

# ----- ADMIN TOKEN (REQUIRED FOR /provision) --------------------
# Phase 0b multi-tenant auth. The ADMIN_TOKEN gates the /provision
# endpoint that mints new tenant codes — it is NEVER shipped to the
# client. Only the operator (you) ever holds it.
#
# Set via:
#   wrangler secret put ADMIN_TOKEN
#   <paste a long random string when prompted>
#
# Generate one with:
#   openssl rand -base64 48
#
# Tenant codes (the per-family/per-classroom secret typed by the user)
# are looked up against KV with no static client-side token at all —
# nothing in view-source identifies any tenant. Each family/classroom
# has its own code; revoking a code instantly cuts off that tenant.
#
# Rotate the admin token by:
#   1. wrangler secret put ADMIN_TOKEN
#   2. Re-source the new token in any provisioning script you run
# (No client-side change required — it never knew the admin token.)

[[kv_namespaces]]
binding = "KV"
id = "7707dae3cedf4daaa255ffd1c9fac33f"
